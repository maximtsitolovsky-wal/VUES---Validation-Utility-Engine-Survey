<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Global Coverage · VUES</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <!-- Try multiple CDNs for COBE -->
  <script src="https://unpkg.com/cobe@0.6.3/dist/cobe.umd.js" onerror="loadCobeFallback()"></script>
  <script>
    function loadCobeFallback() {
      console.warn('[Globe] unpkg failed, trying jsdelivr...');
      var s = document.createElement('script');
      s.src = 'https://cdn.jsdelivr.net/npm/cobe@0.6.3/dist/cobe.umd.js';
      s.onerror = function() {
        console.error('[Globe] All CDNs failed');
        document.getElementById('loadingState').innerHTML = '<span style="color:#FF6B81;">CDN blocked - try VPN/Eagle WiFi</span>';
      };
      document.head.appendChild(s);
    }
  </script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #060914;
      --panel: rgba(9, 16, 31, 0.88);
      --panel-border: rgba(120, 160, 255, 0.22);
      --text: #E8F0FF;
      --text-soft: #9EB1D4;
      --cyan: #5AE4FF;
      --blue: #4D8DFF;
      --purple: #9B7CFF;
      --amber: #FFC857;
      --green: #45E6A5;
      --red: #FF6B81;
      --pink: #FF5FD2;
    }
    body { 
      font-family: 'Inter', system-ui, sans-serif; 
      background: var(--bg); 
      color: var(--text); 
      min-height: 100vh; 
      line-height: 1.5;
      overflow-x: hidden;
    }
    body::before { 
      content: ''; position: fixed; inset: 0; 
      background: radial-gradient(circle at 30% 20%, rgba(90,228,255,0.08), transparent 35%), 
                  radial-gradient(circle at 70% 80%, rgba(155,124,255,0.06), transparent 35%),
                  radial-gradient(ellipse at 50% 50%, rgba(69,230,165,0.04), transparent 50%),
                  linear-gradient(180deg, #04070F 0%, #070C18 50%, #050914 100%); 
      z-index: -2; 
    }

    .container { max-width: 1500px; margin: 0 auto; padding: 20px; }
    
    .back-link { 
      display: inline-flex; align-items: center; gap: 8px; 
      padding: 10px 16px; border-radius: 999px; 
      border: 1px solid rgba(255,255,255,0.08); 
      background: rgba(255,255,255,0.03); 
      color: var(--text); font-size: 13px; font-weight: 600; 
      text-decoration: none; margin-bottom: 16px; transition: all 0.18s; 
    }
    .back-link:hover { background: rgba(90,228,255,0.1); border-color: rgba(90,228,255,0.3); }

    .header { 
      display: flex; justify-content: space-between; align-items: flex-start; 
      gap: 20px; margin-bottom: 20px; flex-wrap: wrap; 
    }
    .header-left h1 { font-size: 28px; font-weight: 900; letter-spacing: -0.02em; margin-bottom: 6px; }
    .header-left p { color: var(--text-soft); font-size: 14px; }
    .header-right { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    
    .pill { padding: 6px 14px; border-radius: 999px; font-size: 11px; font-weight: 700; }
    .pill-green { background: rgba(69,230,165,0.12); border: 1px solid rgba(69,230,165,0.35); color: #D9FFE8; }

    /* Mode Tabs */
    .mode-tabs {
      display: flex; gap: 4px;
      background: rgba(255,255,255,0.04);
      padding: 4px; border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.08);
    }
    .mode-tab {
      padding: 10px 20px; border-radius: 10px;
      font-size: 13px; font-weight: 700;
      cursor: pointer; transition: all 0.2s;
      color: var(--text-soft); background: transparent; border: none;
    }
    .mode-tab:hover { color: var(--text); background: rgba(255,255,255,0.05); }
    .mode-tab.active.scout { background: rgba(155,124,255,0.2); color: var(--purple); }
    .mode-tab.active.survey { background: rgba(90,228,255,0.2); color: var(--cyan); }
    
    .btn { 
      padding: 10px 18px; border-radius: 12px; font-size: 13px; font-weight: 700; 
      cursor: pointer; transition: all 0.2s; 
      border: 1px solid rgba(255,255,255,0.1); 
      background: rgba(255,255,255,0.05); color: var(--text); 
      text-decoration: none; display: inline-flex; align-items: center; gap: 8px; 
    }
    .btn:hover { background: rgba(255,255,255,0.1); transform: translateY(-1px); }

    /* Stats Row */
    .stats-row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; margin-bottom: 20px; }
    .stat-card { 
      background: var(--panel); border: 1px solid var(--panel-border); 
      border-radius: 16px; padding: 16px; text-align: center;
      transition: all 0.2s;
    }
    .stat-card:hover { transform: translateY(-2px); border-color: rgba(90,228,255,0.4); }
    .stat-value { font-size: 32px; font-weight: 900; }
    .stat-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-soft); margin-top: 4px; }

    /* Main Layout */
    .main-grid { display: grid; grid-template-columns: 1fr 340px; gap: 20px; }
    
    .panel { 
      background: var(--panel); border: 1px solid var(--panel-border); 
      border-radius: 20px; overflow: hidden; 
    }
    .panel-header { 
      padding: 14px 18px; border-bottom: 1px solid rgba(255,255,255,0.06); 
      display: flex; justify-content: space-between; align-items: center; 
    }
    .panel-title { font-weight: 700; font-size: 15px; display: flex; align-items: center; gap: 8px; }
    .panel-body { padding: 16px; }

    /* Globe Container */
    .globe-container { 
      position: relative; 
      display: flex; 
      align-items: center; 
      justify-content: center;
      padding: 20px;
      min-height: 520px;
    }
    
    .globe-wrap {
      position: relative;
      width: 100%;
      max-width: 500px;
      aspect-ratio: 1;
    }
    
    #globe-canvas {
      width: 100%;
      height: 100%;
      cursor: grab;
      opacity: 0;
      transition: opacity 1.2s ease;
      border-radius: 50%;
      touch-action: none;
    }
    #globe-canvas.loaded { opacity: 1; }
    #globe-canvas:active { cursor: grabbing; }

    /* Marker Tooltips */
    .marker-tooltip {
      position: absolute;
      display: flex;
      align-items: baseline;
      gap: 0.4rem;
      padding: 8px 12px;
      background: rgba(0,0,0,0.9);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 10px;
      pointer-events: none;
      white-space: nowrap;
      opacity: 0;
      transform: translate(-50%, 0) scale(0.9);
      transition: opacity 0.25s, transform 0.25s;
      z-index: 100;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    }
    .marker-tooltip.visible {
      opacity: 1;
      transform: translate(-50%, 0) scale(1);
    }
    .marker-tooltip .vendor-name {
      font-family: 'Inter', monospace;
      font-size: 13px;
      font-weight: 700;
      color: #fff;
      letter-spacing: -0.02em;
    }
    .marker-tooltip .site-count {
      font-family: 'Inter', monospace;
      font-size: 18px;
      font-weight: 900;
      letter-spacing: -0.02em;
    }
    .marker-tooltip .trend {
      font-family: 'Inter', monospace;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.02em;
    }
    .marker-tooltip .trend.up { color: #34d399; }
    .marker-tooltip .trend.down { color: #f87171; }

    /* Vendor Legend */
    .vendor-legend { display: flex; flex-direction: column; gap: 10px; }
    .vendor-item { 
      display: flex; align-items: center; gap: 12px; 
      padding: 14px; border-radius: 14px; 
      background: rgba(255,255,255,0.03); 
      border: 1px solid rgba(255,255,255,0.06); 
      cursor: pointer; transition: all 0.2s; 
    }
    .vendor-item:hover { 
      background: rgba(255,255,255,0.06); 
      transform: translateX(4px); 
      border-color: var(--vendor-color);
    }
    .vendor-item.active { 
      border-color: var(--vendor-color); 
      background: color-mix(in srgb, var(--vendor-color) 15%, transparent); 
    }
    .vendor-dot { 
      width: 18px; height: 18px; border-radius: 50%; 
      background: var(--vendor-color); 
      box-shadow: 0 0 16px var(--vendor-color); 
      flex-shrink: 0; 
    }
    .vendor-info { flex: 1; }
    .vendor-name-label { font-weight: 700; font-size: 14px; }
    .vendor-sub { font-size: 11px; color: var(--text-soft); }
    .vendor-count { font-size: 24px; font-weight: 900; color: var(--vendor-color); }

    /* Velocity Panel */
    .velocity-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
    .velocity-card {
      padding: 14px;
      border-radius: 12px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
      text-align: center;
    }
    .velocity-value { font-size: 22px; font-weight: 800; }
    .velocity-label { font-size: 9px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-soft); margin-top: 4px; }

    /* Region breakdown */
    .region-list { display: flex; flex-direction: column; gap: 6px; max-height: 200px; overflow-y: auto; }
    .region-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px; border-radius: 10px;
      background: rgba(255,255,255,0.02);
      font-size: 12px;
    }
    .region-name { flex: 1; font-weight: 600; }
    .region-bar { 
      width: 80px; height: 6px; border-radius: 3px; 
      background: rgba(255,255,255,0.1); overflow: hidden; 
    }
    .region-bar-fill { height: 100%; border-radius: 3px; transition: width 0.4s; }
    .region-count { font-weight: 700; min-width: 30px; text-align: right; }

    /* Loading */
    .loading-state {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 16px;
      color: var(--text-soft);
    }
    .spinner {
      width: 40px; height: 40px;
      border: 3px solid rgba(90,228,255,0.2);
      border-top-color: var(--cyan);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Responsive */
    @media (max-width: 1000px) {
      .main-grid { grid-template-columns: 1fr; }
      .stats-row { grid-template-columns: repeat(3, 1fr); }
    }
    @media (max-width: 600px) {
      .stats-row { grid-template-columns: repeat(2, 1fr); }
      .velocity-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="container">
    <a href="routing.html" class="back-link">← Back to Routing</a>

    <header class="header">

      </div>

      <div style="display:flex;flex-direction:column;gap:16px;">
        <div class="panel">
          <div class="panel-header"><span class="panel-title" id="legendTitle">◈ Vendors</span></div>
          <div class="panel-body">
            <div class="vendor-legend" id="vendorLegend"></div>
          </div>
        </div>
        
        <div class="panel">
          <div class="panel-header"><span class="panel-title" id="velocityTitle">🚀 Velocity</span></div>
          <div class="panel-body">
            <div class="velocity-grid" id="velocityGrid"></div>
          </div>
        </div>

        <div class="panel" style="flex:1;">
          <div class="panel-header"><span class="panel-title">📍 Top Regions</span></div>
          <div class="panel-body">
            <div class="region-list" id="regionList"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

<script>
// === COLOR SCHEMES ===

// === STATE ===
const PROGRAM_WEEK = 3;

  'NM':[34.84,-106.25],'NY':[42.17,-74.95],'NC':[35.63,-79.81],'ND':[47.53,-99.78],'OH':[40.39,-82.76],
  'OK':[35.57,-96.93],'OR':[44.57,-122.07],'PA':[40.59,-77.21],'RI':[41.68,-71.51],'SC':[33.86,-80.95],
  'SD':[44.30,-99.44],'TN':[35.75,-86.69],'TX':[31.05,-97.56],'UT':[40.15,-111.86],'VT':[44.05,-72.71],
  'VA':[37.77,-78.17],'WA':[47.40,-121.49],'WV':[38.99,-80.65],'WI':[44.27,-89.62],'WY':[42.76,-107.30],'DC':[38.90,-77.04]
};

// Embedded fallback for Scout data (file:// protocol)
const SCOUT_FALLBACK = {

// === DATA LOADING ===
async function loadData() {
  // Load Scout data
  try {
    const res = await fetch('vendor_locations.json?t=' + Date.now());
    if (!res.ok) throw new Error('Fetch failed');
    scoutData = await res.json();
  } catch (e) {
    console.warn('[Globe] Using scout fallback:', e.message);
    scoutData = SCOUT_FALLBACK;
  }

  // Load Survey data
  try {
    const res = await fetch('survey_routing_data.json?t=' + Date.now());
    if (!res.ok) throw new Error('Fetch failed');
    const raw = await res.json();
    surveyData = processSurveyData(raw);
  } catch (e) {
    console.warn('[Globe] Survey data unavailable:', e.message);
    surveyData = buildFallbackSurveyData();
  }

  setupModeTabs();
  renderUI();
  initGlobe();
}

function processSurveyData(raw) {
  const byState = {};
  const byVendor = {};
  const statusCounts = { 'Completed': 0, 'Pending': 0, 'No Survey': 0 };

  raw.surveys.forEach(s => {
    const state = s.state || 'Unknown';
    const vendor = s.vendor || 'Unknown';
    const status = s.survey_status === 'Completed' ? 'Completed' : 
                   (s.survey_status === 'Not Started' || !s.survey_status) ? 'No Survey' : 'Pending';
    
    if (!byState[state]) byState[state] = { 'Completed': 0, 'Pending': 0, 'No Survey': 0, total: 0 };
    byState[state][status]++;
    byState[state].total++;

    if (!byVendor[vendor]) byVendor[vendor] = { 'Completed': 0, 'Pending': 0, 'No Survey': 0, total: 0 };
    byVendor[vendor][status]++;
    byVendor[vendor].total++;

    statusCounts[status]++;
  });

  // Build markers
  const markers = [];
  Object.entries(byState).forEach(([state, data]) => {
    const coord = STATE_COORDS[state];
    if (!coord) return;
    ['Completed', 'Pending', 'No Survey'].forEach((status, i) => {
      if (data[status] > 0) {
        markers.push({
          id: `${state}-${status}`,
          status, state,
          location: [coord[0] + (i - 1) * 0.8, coord[1] + (i - 1) * 0.5],
          count: data[status]
        });
      }
    });
  });

  return { markers, byState, byVendor, statusCounts, total: raw.surveys.length };
}

function buildFallbackSurveyData() {
  // Fallback if survey data can't load
  return {
    markers: [
      { id: 'TX-Completed', status: 'Completed', state: 'TX', location: [31.05, -97.56], count: 45 },
      { id: 'TX-Pending', status: 'Pending', state: 'TX', location: [31.85, -97.06], count: 15 },
      { id: 'FL-Completed', status: 'Completed', state: 'FL', location: [27.77, -81.69], count: 38 },
      { id: 'CA-Completed', status: 'Completed', state: 'CA', location: [36.62, -119.38], count: 28 },
      { id: 'PA-Completed', status: 'Completed', state: 'PA', location: [40.59, -77.21], count: 25 }
    ],
    byState: { 'TX': { 'Completed': 45, 'Pending': 15, 'No Survey': 9, total: 69 } },
    byVendor: { 'CEI': { 'Completed': 200, 'Pending': 80, 'No Survey': 62, total: 342 } },
    statusCounts: { 'Completed': 450, 'Pending': 180, 'No Survey': 128 },
    total: 758
  };
}

// === MODE TABS ===
function setupModeTabs() {
  document.querySelectorAll('.mode-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      const mode = tab.dataset.mode;
      if (mode === activeMode) return;
      
      activeMode = mode;
      activeFilter = null;
      
      // Update tab styles
      document.querySelectorAll('.mode-tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      
      // Update page title
      if (mode === 'scout') {
        document.getElementById('pageTitle').innerHTML = '🌍 Scout Coverage';
        document.getElementById('pageSubtitle').textContent = 'Interactive 3D visualization of scout program distribution';
        document.getElementById('globeTitle').textContent = '🌐 Scout Distribution';
        document.getElementById('legendTitle').textContent = '◈ Vendors';
        document.getElementById('velocityTitle').textContent = '🚀 Velocity';
      } else {
        document.getElementById('pageTitle').innerHTML = '📊 Survey Status';
        document.getElementById('pageSubtitle').textContent = 'Survey completion tracking across all scout locations';
        document.getElementById('globeTitle').textContent = '🌐 Survey Distribution';
        document.getElementById('legendTitle').textContent = '◈ Status';
        document.getElementById('velocityTitle').textContent = '📈 Rates';
      }
      
      renderUI();
      initGlobe();
    });
  });
}

// === GLOBE ===
function initGlobe() {
  const canvas = document.getElementById('globe-canvas');
  const loadingEl = document.getElementById('loadingState');
  
  if (!canvas) {
    console.error('[Globe] Canvas not found');
    return;
  }

  // Check if COBE is loaded
  if (typeof createGlobe === 'undefined') {
    console.error('[Globe] COBE library not loaded');
    loadingEl.innerHTML = '<span style="color:var(--red);">Globe library failed to load</span>';
    return;
  }

  const width = canvas.offsetWidth;
  if (width === 0) {
    requestAnimationFrame(initGlobe);
    return;
  }

  // Build markers based on mode
  let markers = [];
  try {
    if (activeMode === 'scout' && scoutData && scoutData.markers) {
      markers = scoutData.markers
        .filter(m => !activeFilter || m.vendor === activeFilter)
        .map(m => ({
          location: m.location,
          size: Math.min(0.12, 0.03 + (m.count / 100) * 0.08),
          color: VENDOR_COLORS[m.vendor] || [0.5, 0.5, 0.5]
        }));
    } else if (activeMode === 'survey' && surveyData && surveyData.markers) {
      markers = surveyData.markers
        .filter(m => !activeFilter || m.status === activeFilter)
        .map(m => ({
          location: m.location,
          size: Math.min(0.12, 0.025 + (m.count / 80) * 0.08),
          color: SURVEY_COLORS[m.status] || [0.5, 0.5, 0.5]
        }));
    }
  } catch (e) {
    console.error('[Globe] Error building markers:', e);
  }

  if (globe) { globe.destroy(); globe = null; }

  try {
    const glowColor = activeMode === 'scout' ? [0.08, 0.12, 0.2] : [0.05, 0.15, 0.12];
    
    globe = createGlobe(canvas, {
      devicePixelRatio: Math.min(window.devicePixelRatio || 1, 2),
      width: width * 2, height: width * 2,
      phi: 0, theta: 0.3, dark: 1, diffuse: 1.2,
      mapSamples: 16000, mapBrightness: 6,
      baseColor: [0.3, 0.3, 0.35],
      markerColor: activeMode === 'scout' ? [0.35, 0.85, 0.5] : [0.27, 0.9, 0.63],
      glowColor: glowColor,
      markers: markers,
      onRender: (state) => {
        if (!isDragging) phi += 0.003;
        state.phi = phi + phiOffset + dragOffset.phi;
        state.theta = theta + thetaOffset + dragOffset.theta;
      }
    });

    loadingEl.style.display = 'none';
    canvas.classList.add('loaded');
    setupCanvasEvents(canvas);
    console.log('[Globe] Initialized with', markers.length, 'markers');
  } catch (e) {
    console.error('[Globe] Failed to create globe:', e);
    loadingEl.innerHTML = '<span style="color:var(--red);">Failed to initialize globe</span>';
  }
}

function setupCanvasEvents(canvas) {
  canvas.onpointerdown = (e) => {
    isDragging = true;
    dragStart = { x: e.clientX, y: e.clientY };
    canvas.style.cursor = 'grabbing';
    canvas.setPointerCapture(e.pointerId);
  };
  canvas.onpointermove = (e) => {
    if (isDragging) {
      dragOffset.phi = (e.clientX - dragStart.x) / 200;
      dragOffset.theta = (e.clientY - dragStart.y) / 400;
    }
  };
  canvas.onpointerup = (e) => {
    if (isDragging) {
      phiOffset += dragOffset.phi;
      thetaOffset += dragOffset.theta;
      dragOffset = { phi: 0, theta: 0 };
    }
    isDragging = false;
    canvas.style.cursor = 'grab';
    canvas.releasePointerCapture(e.pointerId);
  };
}

// === UI RENDERING ===
function renderUI() {
  if (activeMode === 'scout') {
    renderScoutUI();
  } else {
    renderSurveyUI();
  }
}

function renderScoutUI() {
  if (!scoutData) return;

  const vendorTotals = scoutData.vendor_totals;
  const stateTotals = scoutData.state_totals;
  const total = Object.values(vendorTotals).reduce((a, b) => a + b, 0);
  const statesCount = Object.keys(stateTotals).length;
  const vendorCount = Object.keys(vendorTotals).length;

  // Stats row
  document.getElementById('statsRow').innerHTML = `
    <div class="stat-card"><div class="stat-value" style="color:var(--cyan)">${total}</div><div class="stat-label">Total Sites</div></div>
    <div class="stat-card"><div class="stat-value" style="color:var(--green)">${statesCount}</div><div class="stat-label">States</div></div>
    <div class="stat-card"><div class="stat-value" style="color:var(--purple)">${vendorCount}</div><div class="stat-label">Vendors</div></div>
    <div class="stat-card"><div class="stat-value" style="color:var(--amber)">${Math.round(total / vendorCount)}</div><div class="stat-label">Avg/Vendor</div></div>
    <div class="stat-card"><div class="stat-value" style="color:var(--pink)">${(total / PROGRAM_WEEK).toFixed(0)}</div><div class="stat-label">Sites/Week</div></div>
  `;

  // Vendor legend
  const legend = document.getElementById('vendorLegend');
  legend.innerHTML = Object.entries(vendorTotals)
    .sort((a, b) => b[1] - a[1])
    .map(([vendor, count]) => {
      const pct = Math.round(count / total * 100);
      const isActive = activeFilter === vendor;
      const color = VENDOR_HEX[vendor] || '#fff';
      return `
        <div class="vendor-item ${isActive ? 'active' : ''}" data-filter="${vendor}" style="--vendor-color: ${color}">
          <div class="vendor-dot"></div>
          <div class="vendor-info"><div class="vendor-name-label">${vendor}</div><div class="vendor-sub">${pct}% coverage</div></div>
          <div class="vendor-count">${count}</div>
        </div>
      `;
    }).join('');
  bindLegendClicks();

  // Velocity grid
  document.getElementById('velocityGrid').innerHTML = Object.entries(vendorTotals)
    .sort((a, b) => b[1] - a[1]).slice(0, 4)
    .map(([vendor, count]) => `
      <div class="velocity-card">
        <div class="velocity-value" style="color:${VENDOR_HEX[vendor]}">${(count / PROGRAM_WEEK).toFixed(0)}</div>
        <div class="velocity-label">${vendor}/wk</div>
      </div>
    `).join('');

  // Region list
  const stateEntries = Object.entries(stateTotals)
    .map(([state, vendors]) => ({ state, total: Object.values(vendors).reduce((a, b) => a + b, 0), dominant: Object.entries(vendors).sort((a, b) => b[1] - a[1])[0] }))
    .sort((a, b) => b.total - a.total).slice(0, 10);
  const maxState = stateEntries[0]?.total || 1;

  document.getElementById('regionList').innerHTML = stateEntries.map(({ state, total, dominant }) => {
    const color = VENDOR_HEX[dominant[0]] || '#fff';
    return `
      <div class="region-item">
        <span class="region-name">${state}</span>
        <div class="region-bar"><div class="region-bar-fill" style="width:${Math.round((total / maxState) * 100)}%;background:${color}"></div></div>
        <span class="region-count" style="color:${color}">${total}</span>
      </div>
    `;
  }).join('');
}

function renderSurveyUI() {
  if (!surveyData) return;

  const { statusCounts, total, byVendor, byState } = surveyData;
  const completed = statusCounts['Completed'] || 0;
  const pending = statusCounts['Pending'] || 0;
  const noSurvey = statusCounts['No Survey'] || 0;
  const completionRate = total > 0 ? Math.round((completed / total) * 100) : 0;

  // Stats row
  document.getElementById('statsRow').innerHTML = `
    <div class="stat-card"><div class="stat-value" style="color:var(--cyan)">${total}</div><div class="stat-label">Total Sites</div></div>
    <div class="stat-card"><div class="stat-value" style="color:var(--green)">${completed}</div><div class="stat-label">Completed</div></div>
    <div class="stat-card"><div class="stat-value" style="color:var(--amber)">${pending}</div><div class="stat-label">Pending</div></div>
    <div class="stat-card"><div class="stat-value" style="color:var(--text-soft)">${noSurvey}</div><div class="stat-label">No Survey</div></div>
    <div class="stat-card"><div class="stat-value" style="color:var(--green)">${completionRate}%</div><div class="stat-label">Complete Rate</div></div>
  `;

  // Status legend
  const legend = document.getElementById('vendorLegend');
  legend.innerHTML = ['Completed', 'Pending', 'No Survey'].map(status => {
    const count = statusCounts[status] || 0;
    const pct = total > 0 ? Math.round(count / total * 100) : 0;
    const isActive = activeFilter === status;
    const color = SURVEY_HEX[status];
    return `
      <div class="vendor-item ${isActive ? 'active' : ''}" data-filter="${status}" style="--vendor-color: ${color}">
        <div class="vendor-dot"></div>
        <div class="vendor-info"><div class="vendor-name-label">${status}</div><div class="vendor-sub">${pct}% of surveys</div></div>
        <div class="vendor-count">${count}</div>
      </div>
    `;
  }).join('');
  bindLegendClicks();

  // Velocity grid - show vendor completion rates
  const vendorRates = Object.entries(byVendor)
    .map(([vendor, data]) => ({ vendor, rate: data.total > 0 ? Math.round((data['Completed'] / data.total) * 100) : 0, total: data.total }))
    .sort((a, b) => b.total - a.total).slice(0, 4);

  document.getElementById('velocityGrid').innerHTML = vendorRates.map(v => `
    <div class="velocity-card">
      <div class="velocity-value" style="color:${v.rate >= 70 ? 'var(--green)' : v.rate >= 40 ? 'var(--amber)' : 'var(--red)'}">${v.rate}%</div>
      <div class="velocity-label">${v.vendor}</div>
    </div>
  `).join('');

  // Region list - top states by completion
  const stateEntries = Object.entries(byState)
    .map(([state, data]) => ({ state, total: data.total, completed: data['Completed'], rate: data.total > 0 ? Math.round((data['Completed'] / data.total) * 100) : 0 }))
    .sort((a, b) => b.total - a.total).slice(0, 10);
  const maxState = stateEntries[0]?.total || 1;

  document.getElementById('regionList').innerHTML = stateEntries.map(({ state, total, completed, rate }) => {
    const color = rate >= 70 ? 'var(--green)' : rate >= 40 ? 'var(--amber)' : 'var(--red)';
    return `
      <div class="region-item">
        <span class="region-name">${state}</span>
        <div class="region-bar"><div class="region-bar-fill" style="width:${Math.round((total / maxState) * 100)}%;background:${color}"></div></div>
        <span class="region-count" style="color:${color}">${rate}%</span>
      </div>
    `;
  }).join('');
}

function bindLegendClicks() {
  document.querySelectorAll('.vendor-item').forEach(item => {
    item.addEventListener('click', () => {
      const filter = item.dataset.filter;
      activeFilter = activeFilter === filter ? null : filter;
      renderUI();
      initGlobe();
    });
  });
}

// === RESET & RESIZE ===
document.getElementById('resetBtn').addEventListener('click', () => {
  phi = 0; theta = 0.3;
  phiOffset = 0; thetaOffset = 0;
  activeFilter = null;
  renderUI();
  initGlobe();
});

let resizeTimeout;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimeout);
  resizeTimeout = setTimeout(() => {
    if (globe) { globe.destroy(); globe = null; initGlobe(); }
  }, 200);
});

// === INIT ===
// Wait a tick for COBE to be ready
setTimeout(() => {
  if (typeof createGlobe === 'undefined') {
    console.warn('[Globe] Waiting for COBE...');
    setTimeout(loadData, 500);
  } else {
    loadData();
  }
}, 100);
</script>
