<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coverage Globe · VUES</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #050810; --panel: rgba(12, 20, 38, 0.92); --panel-border: rgba(100, 140, 255, 0.15);
      --text: #E8F0FF; --text-soft: #8BA4D0; --cyan: #5AE4FF; --purple: #9B7CFF;
      --green: #45E6A5; --amber: #FFC220; --pink: #FF5FD2;
    }
    body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow: hidden; }
    
    .container { display: grid; grid-template-columns: 1fr 340px; height: 100vh; }
    
    .globe-section { position: relative; display: flex; align-items: center; justify-content: center; }
    .globe-bg { position: absolute; inset: 0; background: radial-gradient(circle at 40% 40%, rgba(90,228,255,0.08) 0%, transparent 50%), radial-gradient(circle at 60% 60%, rgba(155,124,255,0.06) 0%, transparent 40%); }
    
    #globeCanvas { cursor: grab; }
    #globeCanvas:active { cursor: grabbing; }
    
    .globe-overlay { position: absolute; top: 20px; left: 20px; }
    .back-link { display: inline-flex; align-items: center; gap: 8px; padding: 10px 18px; border-radius: 999px; border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.4); backdrop-filter: blur(10px); color: var(--text); font-size: 13px; font-weight: 600; text-decoration: none; transition: all 0.2s; }
    .back-link:hover { background: rgba(90,228,255,0.15); border-color: var(--cyan); }
    
    .mode-toggle { position: absolute; top: 20px; right: 360px; display: flex; gap: 4px; background: rgba(0,0,0,0.5); backdrop-filter: blur(10px); padding: 5px; border-radius: 14px; border: 1px solid rgba(255,255,255,0.1); }
    .mode-btn { padding: 10px 20px; border-radius: 10px; font-size: 13px; font-weight: 700; cursor: pointer; border: none; background: transparent; color: var(--text-soft); transition: all 0.2s; }
    .mode-btn:hover { color: var(--text); background: rgba(255,255,255,0.05); }
    .mode-btn.active.scout { background: rgba(155,124,255,0.3); color: var(--purple); }
    .mode-btn.active.survey { background: rgba(90,228,255,0.3); color: var(--cyan); }
    
    .tooltip { position: fixed; background: rgba(0,0,0,0.9); border: 1px solid rgba(255,255,255,0.2); border-radius: 12px; padding: 14px 18px; pointer-events: none; opacity: 0; transition: opacity 0.15s; z-index: 1000; min-width: 180px; backdrop-filter: blur(10px); }
    .tooltip.visible { opacity: 1; }
    .tooltip-title { font-size: 16px; font-weight: 800; margin-bottom: 10px; }
    .tooltip-row { display: flex; justify-content: space-between; font-size: 12px; padding: 4px 0; }
    .tooltip-dot { width: 8px; height: 8px; border-radius: 50%; margin-right: 8px; display: inline-block; }
    
    .sidebar { background: var(--panel); border-left: 1px solid var(--panel-border); display: flex; flex-direction: column; overflow-y: auto; }
    .sidebar-header { padding: 24px; border-bottom: 1px solid rgba(255,255,255,0.06); }
    .sidebar-header h2 { font-size: 20px; font-weight: 800; margin-bottom: 6px; }
    .sidebar-header p { color: var(--text-soft); font-size: 13px; }
    
    .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 20px; border-bottom: 1px solid rgba(255,255,255,0.06); }
    .stat-box { padding: 16px; border-radius: 14px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); text-align: center; }
    .stat-value { font-size: 28px; font-weight: 900; }
    .stat-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-soft); margin-top: 4px; }
    
    .section { padding: 20px; border-bottom: 1px solid rgba(255,255,255,0.06); }
    .section-title { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-soft); margin-bottom: 14px; }
    
    .vendor-list { display: flex; flex-direction: column; gap: 10px; }
    .vendor-item { display: flex; align-items: center; gap: 12px; padding: 14px; border-radius: 12px; background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05); cursor: pointer; transition: all 0.2s; }
    .vendor-item:hover { background: rgba(255,255,255,0.05); transform: translateX(4px); }
    .vendor-item.active { border-color: var(--vendor-color); background: color-mix(in srgb, var(--vendor-color) 12%, transparent); }
    .vendor-dot { width: 14px; height: 14px; border-radius: 50%; background: var(--vendor-color); box-shadow: 0 0 12px var(--vendor-color); flex-shrink: 0; }
    .vendor-info { flex: 1; }
    .vendor-name { font-weight: 700; font-size: 14px; }
    .vendor-sub { font-size: 11px; color: var(--text-soft); }
    .vendor-count { font-size: 22px; font-weight: 900; color: var(--vendor-color); }
    
    .legend-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; font-size: 13px; }
    .legend-dot { width: 10px; height: 10px; border-radius: 50%; margin-right: 10px; display: inline-block; }
  </style>
</head>
<body>
  <div class="container">
    <div class="globe-section">
      <div class="globe-bg"></div>
      <canvas id="globeCanvas"></canvas>
      <div class="globe-overlay">
        <a href="routing.html" class="back-link">← Back to Routing</a>
      </div>
      <div class="mode-toggle">
        <button class="mode-btn scout active" data-mode="scout">☄ Scout</button>
        <button class="mode-btn survey" data-mode="survey">📋 Survey</button>
      </div>
      <div class="tooltip" id="tooltip"></div>
    </div>
    <div class="sidebar">
      <div class="sidebar-header">
        <h2 id="sidebarTitle">🌍 Scout Coverage</h2>
        <p id="sidebarSub">Vendor distribution across the US</p>
      </div>
      <div class="stats-grid" id="statsGrid"></div>
      <div class="section">
        <div class="section-title" id="vendorTitle">Vendors</div>
        <div class="vendor-list" id="vendorList"></div>
      </div>
      <div class="section" style="flex:1;">
        <div class="section-title">Legend</div>
        <div id="legend"></div>
      </div>
    </div>
  </div>

<script>
// === CONFIG ===
const VENDOR_HEX = { 'CEI': '#5AE4FF', 'Wachter': '#9B7CFF', 'Techwise': '#FF5FD2', 'Everon': '#45E6A5', 'SAS': '#FFC857' };
const STATUS_HEX = { 'Complete': '#45E6A5', 'Pending': '#FFC857', 'No Survey': '#FF6B81' };

// US State centroids
const STATE_COORDS = {
  'AL':[32.8,-86.8],'AK':[61.4,-152.4],'AZ':[33.7,-111.4],'AR':[35,-92.4],'CA':[36.1,-119.7],
  'CO':[39.1,-105.3],'CT':[41.6,-72.8],'DE':[39.3,-75.5],'FL':[27.8,-81.7],'GA':[33,-83.6],
  'HI':[21.1,-157.5],'ID':[44.2,-114.5],'IL':[40.3,-89],'IN':[39.8,-86.3],'IA':[42,-93.2],
  'KS':[38.5,-96.7],'KY':[37.7,-84.7],'LA':[31.2,-91.9],'ME':[44.7,-69.4],'MD':[39.1,-76.8],
  'MA':[42.2,-71.5],'MI':[43.3,-84.5],'MN':[45.7,-93.9],'MS':[32.7,-89.7],'MO':[38.5,-92.3],
  'MT':[46.9,-110.5],'NE':[41.1,-98.3],'NV':[38.3,-117.1],'NH':[43.5,-71.6],'NJ':[40.3,-74.5],
  'NM':[34.8,-106.2],'NY':[42.2,-75],'NC':[35.6,-79.8],'ND':[47.5,-99.8],'OH':[40.4,-82.8],
  'OK':[35.6,-96.9],'OR':[44.6,-122.1],'PA':[40.6,-77.2],'RI':[41.7,-71.5],'SC':[33.9,-80.9],
  'SD':[44.3,-99.4],'TN':[35.7,-86.7],'TX':[31.1,-97.6],'UT':[40.2,-111.9],'VT':[44,-72.7],
  'VA':[37.8,-78.2],'WA':[47.4,-121.5],'WV':[38.5,-81],'WI':[44.3,-89.6],'WY':[42.8,-107.3],
  'DC':[38.9,-77],'PR':[18.2,-66.6]
};

// === STATE ===
let canvas, ctx, width, height;
let rotation = { x: 0.4, y: -1.8 }; // Start focused on US
let targetRotation = { ...rotation };
let isDragging = false, lastMouse = { x: 0, y: 0 };
let activeMode = 'scout', activeFilter = null;
let scoutData = null, surveyData = null;
let markers = [];
let hoveredMarker = null;
let animationId = null;

// === INIT ===
async function init() {
  canvas = document.getElementById('globeCanvas');
  ctx = canvas.getContext('2d');
  resize();
  window.addEventListener('resize', resize);
  
  // Mouse events
  canvas.addEventListener('mousedown', onMouseDown);
  canvas.addEventListener('mousemove', onMouseMove);
  canvas.addEventListener('mouseup', onMouseUp);
  canvas.addEventListener('mouseleave', onMouseUp);
  canvas.addEventListener('wheel', onWheel);
  
  // Mode toggle
  document.querySelectorAll('.mode-btn').forEach(btn => {
    btn.onclick = () => {
      if (btn.dataset.mode === activeMode) return;
      activeMode = btn.dataset.mode;
      activeFilter = null;
      document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      updateUI();
      buildMarkers();
    };
  });
  
  // Load data
  await loadData();
  buildMarkers();
  updateUI();
  animate();
}

function resize() {
  const rect = canvas.parentElement.getBoundingClientRect();
  width = rect.width;
  height = rect.height;
  canvas.width = width * devicePixelRatio;
  canvas.height = height * devicePixelRatio;
  canvas.style.width = width + 'px';
  canvas.style.height = height + 'px';
  ctx.scale(devicePixelRatio, devicePixelRatio);
}

async function loadData() {
  try {
    const [scoutRes, surveyRes] = await Promise.all([
      fetch('vendor_locations.json?t=' + Date.now()),
      fetch('survey_routing_data.json?t=' + Date.now())
    ]);
    if (scoutRes.ok) scoutData = await scoutRes.json();
    if (surveyRes.ok) surveyData = await surveyRes.json();
  } catch (e) { console.error('Load error:', e); }
}

// === MARKERS ===
function buildMarkers() {
  markers = [];
  
  if (activeMode === 'scout' && scoutData?.markers) {
    scoutData.markers.forEach(m => {
      if (!m.location || m.location.length < 2) return;
      markers.push({
        lat: m.location[0] * Math.PI / 180,
        lon: m.location[1] * Math.PI / 180,
        size: Math.min(12, 4 + Math.sqrt(m.count) * 1.5),
        color: m.color || VENDOR_HEX[m.vendor] || '#ffffff',
        vendor: m.vendor,
        state: m.state,
        count: m.count,
        label: `${m.state}: ${m.vendor}`
      });
    });
  } else if (activeMode === 'survey' && surveyData?.summary?.vendor_breakdown) {
    // Create markers from vendor breakdown
    const vb = surveyData.summary.vendor_breakdown;
    Object.entries(vb).forEach(([vendor, data]) => {
      if (vendor === 'unassigned' || !data.total) return;
      // Spread markers across states for this vendor
      const states = Object.keys(STATE_COORDS).slice(0, Math.min(10, data.total / 20));
      states.forEach((state, i) => {
        const coords = STATE_COORDS[state];
        if (!coords) return;
        const count = Math.floor(data.total / states.length);
        const complete = Math.floor(data.complete / states.length);
        markers.push({
          lat: coords[0] * Math.PI / 180,
          lon: coords[1] * Math.PI / 180,
          size: Math.min(10, 4 + Math.sqrt(count) * 0.8),
          color: complete > 0 ? STATUS_HEX['Complete'] : STATUS_HEX['Pending'],
          vendor,
          state,
          count,
          complete,
          label: `${vendor}: ${complete}/${count}`
        });
      });
    });
  }
}

// === 3D PROJECTION ===
function project(lat, lon, radius) {
  // Apply rotation
  const cosY = Math.cos(rotation.y), sinY = Math.sin(rotation.y);
  const cosX = Math.cos(rotation.x), sinX = Math.sin(rotation.x);
  
  // Spherical to Cartesian
  let x = Math.cos(lat) * Math.sin(lon);
  let y = Math.sin(lat);
  let z = Math.cos(lat) * Math.cos(lon);
  
  // Rotate Y (horizontal)
  let x1 = x * cosY - z * sinY;
  let z1 = x * sinY + z * cosY;
  
  // Rotate X (vertical)
  let y2 = y * cosX - z1 * sinX;
  let z2 = y * sinX + z1 * cosX;
  
  // Project to 2D
  const scale = 1 / (1 + z2 * 0.3);
  return {
    x: width / 2 + x1 * radius * scale,
    y: height / 2 - y2 * radius * scale,
    z: z2,
    scale
  };
}

// === DRAWING ===
function draw() {
  ctx.clearRect(0, 0, width, height);
  
  const radius = Math.min(width, height) * 0.38;
  const cx = width / 2, cy = height / 2;
  
  // Globe glow
  const glow = ctx.createRadialGradient(cx - radius * 0.3, cy - radius * 0.3, 0, cx, cy, radius * 1.5);
  glow.addColorStop(0, 'rgba(90, 228, 255, 0.15)');
  glow.addColorStop(0.5, 'rgba(90, 228, 255, 0.05)');
  glow.addColorStop(1, 'transparent');
  ctx.fillStyle = glow;
  ctx.beginPath();
  ctx.arc(cx, cy, radius * 1.5, 0, Math.PI * 2);
  ctx.fill();
  
  // Globe body
  const gradient = ctx.createRadialGradient(cx - radius * 0.3, cy - radius * 0.3, 0, cx, cy, radius);
  gradient.addColorStop(0, '#1a2a4a');
  gradient.addColorStop(0.7, '#0a1525');
  gradient.addColorStop(1, '#050a15');
  ctx.fillStyle = gradient;
  ctx.beginPath();
  ctx.arc(cx, cy, radius, 0, Math.PI * 2);
  ctx.fill();
  
  // Globe edge highlight
  ctx.strokeStyle = 'rgba(90, 228, 255, 0.2)';
  ctx.lineWidth = 2;
  ctx.stroke();
  
  // Latitude lines
  ctx.strokeStyle = 'rgba(255, 255, 255, 0.06)';
  ctx.lineWidth = 0.5;
  for (let lat = -60; lat <= 60; lat += 30) {
    ctx.beginPath();
    for (let lon = 0; lon <= 360; lon += 5) {
      const p = project(lat * Math.PI / 180, lon * Math.PI / 180, radius);
      if (p.z < 0) continue;
      if (lon === 0) ctx.moveTo(p.x, p.y);
      else ctx.lineTo(p.x, p.y);
    }
    ctx.stroke();
  }
  
  // Longitude lines
  for (let lon = 0; lon < 360; lon += 30) {
    ctx.beginPath();
    for (let lat = -90; lat <= 90; lat += 5) {
      const p = project(lat * Math.PI / 180, lon * Math.PI / 180, radius);
      if (p.z < 0) continue;
      if (lat === -90) ctx.moveTo(p.x, p.y);
      else ctx.lineTo(p.x, p.y);
    }
    ctx.stroke();
  }
  
  // Sort markers by z (back to front)
  const sortedMarkers = markers
    .map(m => ({ ...m, proj: project(m.lat, m.lon, radius) }))
    .filter(m => m.proj.z > -0.2)
    .sort((a, b) => a.proj.z - b.proj.z);
  
  // Draw markers
  hoveredMarker = null;
  sortedMarkers.forEach(m => {
    const { x, y, z, scale } = m.proj;
    const size = m.size * scale * (0.6 + z * 0.4);
    const alpha = Math.max(0.3, 0.5 + z * 0.5);
    
    // Check if filtered
    if (activeFilter && m.vendor !== activeFilter) {
      ctx.globalAlpha = 0.15;
    } else {
      ctx.globalAlpha = alpha;
    }
    
    // Glow
    const glowGrad = ctx.createRadialGradient(x, y, 0, x, y, size * 3);
    glowGrad.addColorStop(0, m.color + '60');
    glowGrad.addColorStop(1, 'transparent');
    ctx.fillStyle = glowGrad;
    ctx.beginPath();
    ctx.arc(x, y, size * 3, 0, Math.PI * 2);
    ctx.fill();
    
    // Marker
    ctx.fillStyle = m.color;
    ctx.beginPath();
    ctx.arc(x, y, size, 0, Math.PI * 2);
    ctx.fill();
    
    // Check hover
    const dx = lastMouse.x - x, dy = lastMouse.y - y;
    if (Math.sqrt(dx*dx + dy*dy) < size + 5) {
      hoveredMarker = m;
    }
  });
  
  ctx.globalAlpha = 1;
  
  // Update tooltip
  updateTooltip();
}

function updateTooltip() {
  const tooltip = document.getElementById('tooltip');
  if (hoveredMarker && !isDragging) {
    tooltip.classList.add('visible');
    tooltip.style.left = (lastMouse.x + 15) + 'px';
    tooltip.style.top = (lastMouse.y + 15) + 'px';
    
    if (activeMode === 'scout') {
      tooltip.innerHTML = `
        <div class="tooltip-title">${hoveredMarker.state}</div>
        <div class="tooltip-row"><span><span class="tooltip-dot" style="background:${hoveredMarker.color}"></span>${hoveredMarker.vendor}</span><span style="font-weight:700">${hoveredMarker.count}</span></div>`;
    } else {
      tooltip.innerHTML = `
        <div class="tooltip-title">${hoveredMarker.vendor}</div>
        <div class="tooltip-row"><span>Complete</span><span style="font-weight:700;color:var(--green)">${hoveredMarker.complete || 0}</span></div>
        <div class="tooltip-row"><span>Total</span><span style="font-weight:700">${hoveredMarker.count}</span></div>`;
    }
  } else {
    tooltip.classList.remove('visible');
  }
}

// === ANIMATION ===
function animate() {
  // Auto-rotate if not dragging
  if (!isDragging) {
    rotation.y += 0.002;
  }
  
  // Smooth rotation
  rotation.x += (targetRotation.x - rotation.x) * 0.1;
  rotation.y += (targetRotation.y - rotation.y) * 0.1;
  
  draw();
  animationId = requestAnimationFrame(animate);
}

// === MOUSE EVENTS ===
function onMouseDown(e) {
  isDragging = true;
  lastMouse = { x: e.offsetX, y: e.offsetY };
  canvas.style.cursor = 'grabbing';
}

function onMouseMove(e) {
  const x = e.offsetX, y = e.offsetY;
  
  if (isDragging) {
    const dx = x - lastMouse.x, dy = y - lastMouse.y;
    targetRotation.y += dx * 0.005;
    targetRotation.x = Math.max(-1, Math.min(1, targetRotation.x + dy * 0.005));
  }
  
  lastMouse = { x, y };
}

function onMouseUp() {
  isDragging = false;
  canvas.style.cursor = 'grab';
}

function onWheel(e) {
  e.preventDefault();
  // Could add zoom here
}

// === UI ===
function updateUI() {
  if (activeMode === 'scout') {
    document.getElementById('sidebarTitle').textContent = '🌍 Scout Coverage';
    document.getElementById('sidebarSub').textContent = 'Vendor distribution across the US';
    document.getElementById('vendorTitle').textContent = 'Vendors';
    renderScoutUI();
  } else {
    document.getElementById('sidebarTitle').textContent = '📋 Survey Status';
    document.getElementById('sidebarSub').textContent = 'Completion tracking by vendor';
    document.getElementById('vendorTitle').textContent = 'Status';
    renderSurveyUI();
  }
}

function renderScoutUI() {
  if (!scoutData?.vendor_totals) return;
  const vt = scoutData.vendor_totals;
  const total = Object.values(vt).reduce((a, b) => a + b, 0);
  const states = Object.keys(scoutData.state_totals || {}).length;
  
  document.getElementById('statsGrid').innerHTML = `
    <div class="stat-box"><div class="stat-value" style="color:var(--cyan)">${total}</div><div class="stat-label">Sites</div></div>
    <div class="stat-box"><div class="stat-value" style="color:var(--green)">${states}</div><div class="stat-label">States</div></div>
    <div class="stat-box"><div class="stat-value" style="color:var(--purple)">${Object.keys(vt).length}</div><div class="stat-label">Vendors</div></div>
    <div class="stat-box"><div class="stat-value" style="color:var(--amber)">${Math.round(total/Object.keys(vt).length)}</div><div class="stat-label">Avg/Vendor</div></div>`;
  
  document.getElementById('vendorList').innerHTML = Object.entries(vt).sort((a,b) => b[1] - a[1]).map(([v, c]) => `
    <div class="vendor-item ${activeFilter === v ? 'active' : ''}" data-vendor="${v}" style="--vendor-color:${VENDOR_HEX[v]}">
      <div class="vendor-dot"></div>
      <div class="vendor-info"><div class="vendor-name">${v}</div><div class="vendor-sub">${Math.round(c/total*100)}% of total</div></div>
      <div class="vendor-count">${c}</div>
    </div>`).join('');
  
  document.getElementById('legend').innerHTML = Object.entries(VENDOR_HEX).map(([v, c]) => `
    <div class="legend-row"><span><span class="legend-dot" style="background:${c}"></span>${v}</span><span style="color:${c};font-weight:700">${vt[v] || 0}</span></div>`).join('');
  
  bindVendorClicks();
}

function renderSurveyUI() {
  if (!surveyData?.summary) return;
  const s = surveyData.summary;
  const complete = s.surveys_complete || 0;
  const required = s.surveys_required || 0;
  const pending = required - complete;
  const rate = required > 0 ? Math.round((complete / required) * 100) : 0;
  
  document.getElementById('statsGrid').innerHTML = `
    <div class="stat-box"><div class="stat-value" style="color:var(--cyan)">${s.total_sites}</div><div class="stat-label">Total</div></div>
    <div class="stat-box"><div class="stat-value" style="color:var(--green)">${complete}</div><div class="stat-label">Complete</div></div>
    <div class="stat-box"><div class="stat-value" style="color:var(--amber)">${pending}</div><div class="stat-label">Pending</div></div>
    <div class="stat-box"><div class="stat-value" style="color:${rate >= 10 ? 'var(--green)' : 'var(--amber)'}">${rate}%</div><div class="stat-label">Rate</div></div>`;
  
  const vb = s.vendor_breakdown || {};
  document.getElementById('vendorList').innerHTML = Object.entries(vb).filter(([v]) => v !== 'unassigned').sort((a,b) => b[1].total - a[1].total).map(([v, d]) => {
    const vendorRate = d.survey_required > 0 ? Math.round((d.complete / d.survey_required) * 100) : 0;
    const color = VENDOR_HEX[v] || '#ffffff';
    return `<div class="vendor-item ${activeFilter === v ? 'active' : ''}" data-vendor="${v}" style="--vendor-color:${color}">
      <div class="vendor-dot"></div>
      <div class="vendor-info"><div class="vendor-name">${v}</div><div class="vendor-sub">${d.complete}/${d.survey_required} complete</div></div>
      <div class="vendor-count" style="font-size:16px;color:${vendorRate >= 10 ? 'var(--green)' : 'var(--amber)'}">${vendorRate}%</div>
    </div>`;
  }).join('');
  
  document.getElementById('legend').innerHTML = `
    <div class="legend-row"><span><span class="legend-dot" style="background:${STATUS_HEX['Complete']}"></span>Complete</span><span style="color:var(--green);font-weight:700">${complete}</span></div>
    <div class="legend-row"><span><span class="legend-dot" style="background:${STATUS_HEX['Pending']}"></span>Pending</span><span style="color:var(--amber);font-weight:700">${pending}</span></div>
    <div class="legend-row"><span><span class="legend-dot" style="background:${STATUS_HEX['No Survey']}"></span>No Survey Req</span><span style="font-weight:700">${s.total_sites - required}</span></div>`;
  
  bindVendorClicks();
}

function bindVendorClicks() {
  document.querySelectorAll('.vendor-item').forEach(el => {
    el.onclick = () => {
      const vendor = el.dataset.vendor;
      activeFilter = activeFilter === vendor ? null : vendor;
      updateUI();
      buildMarkers();
    };
  });
}

init();
</script>
</body>
</html>
