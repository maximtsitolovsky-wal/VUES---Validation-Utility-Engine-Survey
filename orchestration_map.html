<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>SiteOwlQA · Neural Map</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#060c18;overflow:hidden;font-family:'Segoe UI',system-ui,sans-serif}
canvas{display:block;position:fixed;top:48px;left:0;cursor:crosshair}

#hud{position:fixed;top:0;left:0;right:0;height:48px;
  background:rgba(6,12,24,.9);backdrop-filter:blur(12px);
  border-bottom:1px solid rgba(0,83,226,.3);
  display:flex;align-items:center;justify-content:space-between;padding:0 24px;z-index:20}
#hud-left{display:flex;flex-direction:column;gap:1px}
#hud-title{font-size:12px;font-weight:700;color:#93b4f5;letter-spacing:.1em;text-transform:uppercase}
#hud-sub{font-size:10px;color:#2a4a7a}
#hud-stats{display:flex;gap:24px}
.stat-blk{text-align:right}
.stat-n{font-size:18px;font-weight:800;color:#0053e2;line-height:1}
.stat-l{font-size:9px;color:#2a4a7a;text-transform:uppercase;letter-spacing:.1em}

#panel{position:fixed;top:64px;right:20px;width:265px;
  background:rgba(6,12,24,.92);backdrop-filter:blur(18px);
  border:1px solid rgba(0,83,226,.2);border-radius:12px;padding:18px;
  z-index:20;transition:opacity .18s,transform .18s}
#panel.off{opacity:0;pointer-events:none;transform:translateX(8px)}
#pname{font-size:15px;font-weight:700;color:#fff;margin-bottom:5px}
#ptype{display:inline-block;font-size:9px;font-weight:700;letter-spacing:.1em;
  text-transform:uppercase;padding:2px 9px;border-radius:9999px;margin-bottom:11px}
#pdesc{font-size:12px;color:#7a9abf;line-height:1.65;margin-bottom:11px}
#pconns{font-size:11px;color:#2a4a7a;display:flex;flex-direction:column;gap:3px}
#pconns span{color:#4d8eff}

#legend{position:fixed;bottom:16px;left:20px;
  background:rgba(6,12,24,.88);backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,.06);border-radius:10px;
  padding:11px 15px;z-index:20;
  display:grid;grid-template-columns:1fr 1fr;gap:4px 18px}
.leg{display:flex;align-items:center;gap:7px;font-size:10px;color:#7a9abf}
.leg-d{width:8px;height:8px;border-radius:50%;flex-shrink:0}

#hint{position:fixed;bottom:18px;right:20px;font-size:10px;color:#1a2a40;z-index:20}
</style>
</head>
<body>

<div id="hud">
  <div id="hud-left">
    <div id="hud-title">SiteOwlQA · Neural Orchestration Map</div>
    <div id="hud-sub">Hover any node to explore · Watch data flow · See the learning loop</div>
  </div>
  <div id="hud-stats">
    <div class="stat-blk"><div class="stat-n">23</div><div class="stat-l">Nodes</div></div>
    <div class="stat-blk"><div class="stat-n">25</div><div class="stat-l">Edges</div></div>
    <div class="stat-blk"><div class="stat-n" id="clock">—</div><div class="stat-l">Live</div></div>
  </div>
</div>

<div id="panel" class="off">
  <div id="pname">—</div>
  <div id="ptype">—</div>
  <div id="pdesc">—</div>
  <div id="pconns"></div>
</div>

<canvas id="cv" aria-label="SiteOwlQA neural orchestration diagram — hover nodes for details"></canvas>

<div id="legend">
  <div class="leg"><div class="leg-d" style="background:#0053e2"></div>Core / Phase</div>
  <div class="leg"><div class="leg-d" style="background:#ffc220"></div>Memory / Learn</div>
  <div class="leg"><div class="leg-d" style="background:#2a8703"></div>PASS</div>
  <div class="leg"><div class="leg-d" style="background:#ea1100"></div>FAIL</div>
  <div class="leg"><div class="leg-d" style="background:#7c3aed"></div>Review</div>
  <div class="leg"><div class="leg-d" style="background:#74767c"></div>Async</div>
</div>
<div id="hint">Hover nodes to explore</div>

<script>
// ── Color tokens ──────────────────────────────────────────────────────────────
const NC = {
  core:   {fill:'#0a1e5e',stroke:'#0053e2',glow:'#4d8eff',text:'#fff'},
  phase:  {fill:'#0f1f4a',stroke:'#2563eb',glow:'#60a5fa',text:'#93b4f5'},
  module: {fill:'#0d1a40',stroke:'#1e40af',glow:'#3b6fd4',text:'#93b4f5'},
  memory: {fill:'#2a1500',stroke:'#d97706',glow:'#ffc220',text:'#fbbf24'},
  review: {fill:'#1e0a40',stroke:'#7c3aed',glow:'#a78bfa',text:'#c4b5fd'},
  pass:   {fill:'#052a0d',stroke:'#2a8703',glow:'#4ade80',text:'#86efac'},
  fail:   {fill:'#2a0505',stroke:'#ea1100',glow:'#f87171',text:'#fca5a5'},
  async:  {fill:'#121218',stroke:'#6b7280',glow:'#9ca3af',text:'#c4c6cb'},
  correct:{fill:'#062a12',stroke:'#2a8703',glow:'#4ade80',text:'#86efac'},
};
const EC = {
  primary:{s:'#2563eb',g:'#60a5fa',w:2.5,a:.75},
  normal: {s:'#1e3a8a',g:'#3b82f6',w:1.5,a:.5},
  flow:   {s:'#0053e2',g:'#60a5fa',w:2.2,a:.85},
  memory: {s:'#d97706',g:'#fbbf24',w:2,  a:.75},
  pass:   {s:'#166534',g:'#4ade80',w:1.5,a:.65},
  fail:   {s:'#991b1b',g:'#f87171',w:1.5,a:.65},
  review: {s:'#6d28d9',g:'#a78bfa',w:1.5,a:.65},
  async:  {s:'#374151',g:'#9ca3af',w:1.5,a:.4},
  loop:   {s:'#d97706',g:'#ffc220',w:2.5,a:1},
};

// ── Node definitions (bx/by = base offset from canvas centre) ────────────────
const NODES = [
  {id:'main',    label:'main.py',              sub:'Entry point · Poll Loop 60s · never crashes · signal handling',         type:'core',   r:32, bx:0,    by:0   },
  // Inner phase ring
  {id:'pval',    label:'Validate & Recall',    sub:'Critical field validation + Memory Recall before any processing starts',type:'phase',  r:23, bx:-85,  by:-148},
  {id:'pproc',   label:'Process',             sub:'Download attachment → Normalize headers → Fetch SQL reference rows',    type:'phase',  r:23, bx:85,   by:-148},
  {id:'pgrade',  label:'Grade & Decide',       sub:'Python grader · canonical header compare · status_from_score() is the single source of truth',type:'phase',r:23,bx:170,by:0},
  {id:'pout',    label:'Output',              sub:'Send result email (if SMTP) · PATCH Airtable — all fields always written',type:'phase',  r:23, bx:85,   by:148 },
  {id:'parc',    label:'Archive & Learn',      sub:'Store raw file · Internal review · Archive execution · Extract lesson', type:'phase',  r:23, bx:-85,  by:148 },
  {id:'pasync',  label:'Async Worker',         sub:'MetricsRefreshWorker · mark_dirty() flag · never blocks main pipeline', type:'async',  r:23, bx:-170, by:0   },
  // Outer module ring — validate cluster
  {id:'memory',  label:'memory.py',            sub:'Tag+keyword lesson retrieval · surfaces known risk patterns · feeds every run',type:'memory',r:17,bx:-210,by:-210},
  {id:'pollorch',label:'poll_airtable.py',     sub:'15-step per-record orchestrator · catches all exceptions at record level',type:'module',r:17,bx:-78,  by:-292},
  // Process cluster
  {id:'dlattach',label:'airtable_client.py',   sub:'Downloads XLSX/CSV attachment to temp/ · RISK-003 RESOLVED via mirror script',type:'module',r:17,bx:78,by:-292},
  {id:'fileproc',label:'file_processor.py',    sub:'Case-insensitive header normalization · ProjectID always ← Airtable Site Number',type:'module',r:17,bx:195,by:-230},
  {id:'sqlmod',  label:'sql.py',               sub:'ALL SQL — site-scoped reference rows only · read-only · hard boundary',type:'module',r:17,bx:248,by:-172},
  // Grade cluster
  {id:'grader',  label:'python_grader.py',     sub:'Canonical header comparison · fingerprint matching · numeric score 0–100',type:'module',r:17,bx:292,by:-78},
  {id:'passout', label:'PASS',                 sub:'score ≥ threshold · triggers post-pass correction pipeline at ≥95',     type:'pass',   r:22, bx:340,  by:0   },
  {id:'failout', label:'FAIL',                 sub:'score < threshold · lesson extracted · generalized rule → archive',     type:'fail',   r:22, bx:283,  by:104 },
  // Output cluster
  {id:'emailer', label:'emailer.py',           sub:'PASS/FAIL/ERROR email templates · bypassed when SMTP_ENABLED=false',    type:'module', r:17, bx:212,  by:212 },
  {id:'airtable',label:'airtable_client.py',   sub:'PATCH status · True Score · Score% · Fail Summary · Notes — always all fields, never blank',type:'module',r:17,bx:104,by:283},
  // Archive cluster
  {id:'archpy',  label:'archive.py',           sub:'Append-only JSON · raw file storage · lesson extraction — nothing ever deleted',type:'memory',r:17,bx:-78,by:292},
  {id:'correct', label:'post_pass_correction', sub:'PASS + score≥95 only · outputs RAW/CORRECTED/LOG · never re-grades · never touches Airtable',type:'correct',r:17,bx:-136,by:287},
  {id:'reviewer',label:'reviewer.py',          sub:'Internal audit · issues classified CRITICAL/HIGH/LOW · never mutates pipeline state',type:'review',r:17,bx:-195,by:230},
  {id:'lesson',  label:'Extract Lesson',       sub:'Generalized rule · confidence 0.75 · tags lesson in archive → feeds next memory.recall()',type:'memory',r:17,bx:-248,by:172},
  // Async cluster
  {id:'metrics', label:'metrics.py',           sub:'Compute + export 3 CSVs · MetricsRefreshWorker · async, non-blocking',  type:'async',  r:17, bx:-296, by:52  },
  {id:'dashbd',  label:'dashboard.py',         sub:'2 HTML dashboards from CSVs · refresh only when dirty flag is set',      type:'async',  r:17, bx:-296, by:-52 },
];

// ── Edge definitions ──────────────────────────────────────────────────────────
const EDGES = [
  // Core to phases
  {f:'main',   t:'pval',    et:'primary'},{f:'main',    t:'pproc',   et:'primary'},
  {f:'main',   t:'pgrade',  et:'primary'},{f:'main',    t:'pout',    et:'primary'},
  {f:'main',   t:'parc',    et:'primary'},{f:'main',    t:'pasync',  et:'async', dash:1},
  // Phase flow spine
  {f:'pval',   t:'pproc',   et:'flow'},  {f:'pproc',   t:'pgrade',  et:'flow'},
  {f:'pgrade', t:'pout',    et:'flow'},  {f:'pout',    t:'parc',    et:'flow'},
  // Validate cluster
  {f:'pval',   t:'memory',  et:'memory'},{f:'pval',    t:'pollorch',et:'normal'},
  // Process cluster
  {f:'pproc',  t:'dlattach',et:'normal'},{f:'pproc',   t:'fileproc',et:'normal'},
  {f:'pproc',  t:'sqlmod',  et:'normal'},
  // Grade cluster
  {f:'pgrade', t:'grader',  et:'normal'},{f:'pgrade',  t:'passout', et:'pass'},
  {f:'pgrade', t:'failout', et:'fail'},
  // Output cluster
  {f:'pout',   t:'emailer', et:'normal'},{f:'pout',    t:'airtable',et:'normal'},
  // Archive cluster
  {f:'parc',   t:'archpy',  et:'memory'},{f:'parc',    t:'correct', et:'pass',dash:1},
  {f:'parc',   t:'reviewer',et:'review'},{f:'parc',    t:'lesson',  et:'memory'},
  // Async cluster
  {f:'pasync', t:'metrics', et:'async', dash:1},{f:'pasync',t:'dashbd', et:'async',dash:1},
  // THE LEARNING LOOP — lesson feeds back into memory
  {f:'lesson', t:'memory',  et:'loop'},
];

// ── Canvas setup ──────────────────────────────────────────────────────────────
const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');
let W, H, CX, CY, hovered = null, t = 0, last = 0;
const particles = [];

// Assign float params to each node for organic movement
NODES.forEach(n => {
  n.fp = Math.random() * Math.PI * 2;
  n.fa = 4 + Math.random() * 6;
  n.fs = 5e-4 + Math.random() * 8e-4;
});

function resize() {
  W = cv.width = window.innerWidth;
  H = cv.height = window.innerHeight - 48;
  CX = W / 2; CY = H / 2;
}

// ── Position helpers ──────────────────────────────────────────────────────────
function nodePos(n) {
  return {
    x: CX + n.bx + Math.sin(t * n.fs + n.fp) * n.fa,
    y: CY + n.by + Math.cos(t * n.fs * .7 + n.fp + 1) * n.fa * .7,
  };
}
function hitPos(n) { return { x: CX + n.bx, y: CY + n.by }; }

// ── Bezier helpers ────────────────────────────────────────────────────────────
function cp(fx, fy, tx, ty, b = .22) {
  const mx=(fx+tx)/2, my=(fy+ty)/2, dx=tx-fx, dy=ty-fy;
  const l=Math.sqrt(dx*dx+dy*dy)||1;
  return {x: mx-(dy/l)*l*b, y: my+(dx/l)*l*b};
}
function bezAt(fx,fy,cpx,cpy,tx,ty,p) {
  const q=1-p;
  return {x:q*q*fx+2*q*p*cpx+p*p*tx, y:q*q*fy+2*q*p*cpy+p*p*ty};
}

// ── Particles init ────────────────────────────────────────────────────────────
function initParticles() {
  EDGES.forEach((e, ei) => {
    const cnt = e.et==='loop'?6 : e.et==='flow'?5 : 3;
    for(let i=0;i<cnt;i++)
      particles.push({ei, p:i/cnt, spd:.0014+Math.random()*.001});
  });
}

// ── Draw background ───────────────────────────────────────────────────────────
function drawBg() {
  const g = ctx.createRadialGradient(CX, CY, 0, CX, CY, Math.max(W,H)*.72);
  g.addColorStop(0,'#0c1a3a'); g.addColorStop(1,'#060c18');
  ctx.fillStyle = g; ctx.fillRect(0,0,W,H);
  ctx.fillStyle = 'rgba(255,255,255,.016)';
  for(let gx=0;gx<W;gx+=40)
    for(let gy=0;gy<H;gy+=40){
      ctx.beginPath(); ctx.arc(gx,gy,1,0,Math.PI*2); ctx.fill();
    }
}

// ── Draw edges ────────────────────────────────────────────────────────────────
function drawEdges() {
  EDGES.forEach(e => {
    const fn=NODES.find(n=>n.id===e.f), tn=NODES.find(n=>n.id===e.t);
    if(!fn||!tn) return;
    const fp=nodePos(fn), tp=nodePos(tn);
    const bend = e.et==='loop'?.48 : e.et==='flow'?.12 : .22;
    const {x:cpx,y:cpy} = cp(fp.x,fp.y,tp.x,tp.y,bend);
    const ec = EC[e.et]||EC.normal;
    const hot = hovered&&(hovered.id===e.f||hovered.id===e.t);
    const dim = hovered&&!hot;

    ctx.save();
    ctx.shadowColor=ec.g; ctx.shadowBlur = hot?18:5;
    ctx.globalAlpha = dim ? ec.a*.18 : hot ? Math.min(ec.a*1.6,1) : ec.a;
    ctx.strokeStyle = hot?ec.g:ec.s;
    ctx.lineWidth = hot?ec.w*1.8:ec.w;
    if(e.dash) ctx.setLineDash([5,9]);
    ctx.beginPath(); ctx.moveTo(fp.x,fp.y);
    ctx.quadraticCurveTo(cpx,cpy,tp.x,tp.y);
    ctx.stroke(); ctx.restore();
  });
}

// ── Draw particles ────────────────────────────────────────────────────────────
function drawParticles() {
  particles.forEach(pt => {
    const e=EDGES[pt.ei];
    const fn=NODES.find(n=>n.id===e.f), tn=NODES.find(n=>n.id===e.t);
    if(!fn||!tn) return;
    const fp=nodePos(fn), tp=nodePos(tn);
    const bend = e.et==='loop'?.48:e.et==='flow'?.12:.22;
    const {x:cpx,y:cpy}=cp(fp.x,fp.y,tp.x,tp.y,bend);
    const pos=bezAt(fp.x,fp.y,cpx,cpy,tp.x,tp.y,pt.p);
    const ec=EC[e.et]||EC.normal;
    const hot=hovered&&(hovered.id===e.f||hovered.id===e.t);
    const dim=hovered&&!hot;

    ctx.save();
    ctx.globalAlpha=dim?.1:hot?1:.8;
    ctx.shadowColor=ec.g; ctx.shadowBlur=hot?14:7;
    ctx.fillStyle=ec.g;
    ctx.beginPath(); ctx.arc(pos.x,pos.y,hot?3.2:2,0,Math.PI*2); ctx.fill();
    ctx.restore();
  });
}

// ── Draw nodes ────────────────────────────────────────────────────────────────
function drawNodes() {
  NODES.forEach(n => {
    const p=nodePos(n);
    const c=NC[n.type]||NC.module;
    const hot=hovered&&hovered.id===n.id;
    const dim=hovered&&!hot;
    const r=hot?n.r*1.25:n.r;

    ctx.save();
    ctx.globalAlpha=dim?.35:1;
    // glow ring
    ctx.shadowColor=c.glow; ctx.shadowBlur=hot?34:16;
    ctx.beginPath(); ctx.arc(p.x,p.y,r,0,Math.PI*2);
    ctx.fillStyle=c.fill; ctx.fill();
    ctx.strokeStyle=c.stroke; ctx.lineWidth=hot?2.5:1.8; ctx.stroke();
    // pulse ring
    ctx.globalAlpha=(dim?.08:.18)+.12*Math.sin(t*.0018+n.fp);
    ctx.shadowBlur=8;
    ctx.lineWidth=1; ctx.strokeStyle=c.glow;
    ctx.beginPath(); ctx.arc(p.x,p.y,r+7,0,Math.PI*2); ctx.stroke();
    ctx.restore();
  });
}

// ── Draw labels ───────────────────────────────────────────────────────────────
function drawLabels() {
  NODES.forEach(n => {
    const p=nodePos(n);
    const c=NC[n.type]||NC.module;
    const hot=hovered&&hovered.id===n.id;
    const dim=hovered&&!hot;
    const lbl=n.label.length>13?n.label.slice(0,12)+'…':n.label;

    ctx.save();
    ctx.globalAlpha=dim?.2:hot?1:.82;
    ctx.fillStyle=hot?'#fff':c.text;
    ctx.font=`${hot?700:600} ${hot?12:10}px 'Segoe UI',system-ui,sans-serif`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.shadowColor='#000'; ctx.shadowBlur=5;
    ctx.fillText(lbl,p.x,p.y);
    ctx.restore();
  });
}

// ── Animation loop ────────────────────────────────────────────────────────────
function loop(ts) {
  const dt=ts-last; last=ts; t=ts;
  particles.forEach(pt=>{
    pt.p+=pt.spd*(dt/16);
    if(pt.p>=1) pt.p-=1;
  });
  drawBg(); drawEdges(); drawParticles(); drawNodes(); drawLabels();
  requestAnimationFrame(loop);
}

// ── Panel ─────────────────────────────────────────────────────────────────────
const panel=document.getElementById('panel');
function showPanel(n) {
  if(!n){panel.classList.add('off');return;}
  panel.classList.remove('off');
  const c=NC[n.type]||NC.module;
  document.getElementById('pname').textContent=n.label;
  const pt=document.getElementById('ptype');
  pt.textContent=n.type.toUpperCase();
  pt.style.background=c.stroke+'28'; pt.style.color=c.glow;
  document.getElementById('pdesc').textContent=n.sub;
  const conns=EDGES.filter(e=>e.f===n.id||e.t===n.id);
  document.getElementById('pconns').innerHTML=conns.map(e=>{
    const other=e.f===n.id?NODES.find(x=>x.id===e.t):NODES.find(x=>x.id===e.f);
    const dir=e.f===n.id?'→':'←';
    return `<div><span>${dir} ${other?.label||'?'}</span> <em style="color:#1a3a6a;font-style:normal">[${e.et}]</em></div>`;
  }).join('')||'<div style="color:#1a3a6a">No edges</div>';
}

// ── Interaction ───────────────────────────────────────────────────────────────
cv.addEventListener('mousemove',e=>{
  const r=cv.getBoundingClientRect();
  const mx=e.clientX-r.left, my=e.clientY-r.top;
  let found=null, minD=Infinity;
  NODES.forEach(n=>{
    const hp=hitPos(n);
    const d=Math.hypot(mx-hp.x,my-hp.y);
    if(d<n.r+14&&d<minD){minD=d;found=n;}
  });
  hovered=found;
  cv.style.cursor=found?'pointer':'crosshair';
  showPanel(found);
});
cv.addEventListener('mouseleave',()=>{hovered=null;showPanel(null);});

// ── Clock ─────────────────────────────────────────────────────────────────────
function tick(){
  document.getElementById('clock').textContent=
    new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
}
setInterval(tick,1000); tick();

// ── Init ──────────────────────────────────────────────────────────────────────
window.addEventListener('resize',resize);
resize(); initParticles(); requestAnimationFrame(loop);
</script>
</body>
</html>
