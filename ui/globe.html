<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vendor Assignment Map · VUES</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #060914;
      --panel: rgba(9, 16, 31, 0.88);
      --panel-border: rgba(120, 160, 255, 0.22);
      --text: #E8F0FF;
      --text-soft: #9EB1D4;
      --cyan: #5AE4FF;
      --blue: #4D8DFF;
      --purple: #9B7CFF;
      --amber: #FFC857;
      --green: #45E6A5;
      --red: #FF6B81;
      --pink: #FF5FD2;
    }
    body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; line-height: 1.5; }
    body::before { content: ''; position: fixed; inset: 0; background: radial-gradient(circle at 30% 20%, rgba(90,228,255,0.12), transparent 25%), radial-gradient(circle at 70% 80%, rgba(155,124,255,0.10), transparent 25%), linear-gradient(180deg, #04070F 0%, #070C18 50%, #050914 100%); z-index: -2; }

    .container { max-width: 1500px; margin: 0 auto; padding: 20px; }
    .back-link { display: inline-flex; align-items: center; gap: 8px; padding: 10px 16px; border-radius: 999px; border: 1px solid rgba(255,255,255,0.08); background: rgba(255,255,255,0.03); color: var(--text); font-size: 13px; font-weight: 600; text-decoration: none; margin-bottom: 16px; transition: all 0.18s; }
    .back-link:hover { background: rgba(90,228,255,0.1); border-color: rgba(90,228,255,0.3); }

    .header { display: flex; justify-content: space-between; align-items: flex-start; gap: 20px; margin-bottom: 20px; flex-wrap: wrap; }
    .header-left h1 { font-size: 28px; font-weight: 900; letter-spacing: -0.02em; margin-bottom: 6px; }
    .header-left p { color: var(--text-soft); font-size: 14px; }
    .header-right { display: flex; gap: 10px; align-items: center; }
    .btn { padding: 10px 18px; border-radius: 12px; font-size: 13px; font-weight: 700; cursor: pointer; transition: all 0.2s; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.05); color: var(--text); text-decoration: none; display: inline-flex; align-items: center; gap: 8px; }
    .btn:hover { background: rgba(255,255,255,0.1); }

    .main-grid { display: grid; grid-template-columns: 1fr 340px; gap: 20px; }
    .panel { background: var(--panel); border: 1px solid var(--panel-border); border-radius: 20px; overflow: hidden; }
    .panel-header { padding: 14px 18px; border-bottom: 1px solid rgba(255,255,255,0.06); display: flex; justify-content: space-between; align-items: center; }
    .panel-title { font-weight: 700; font-size: 15px; display: flex; align-items: center; gap: 8px; }
    .panel-body { padding: 16px; }

    /* Map Container */
    .map-container { position: relative; padding: 20px; min-height: 500px; display: flex; align-items: center; justify-content: center; }
    #us-map { width: 100%; max-width: 900px; height: auto; }
    #us-map path { stroke: rgba(255,255,255,0.15); stroke-width: 0.5; transition: all 0.2s; cursor: pointer; }
    #us-map path:hover { stroke: var(--cyan); stroke-width: 1.5; filter: brightness(1.3); }

    .map-tooltip { position: absolute; background: rgba(0,0,0,0.9); border: 1px solid rgba(255,255,255,0.2); border-radius: 12px; padding: 12px 16px; pointer-events: none; opacity: 0; transition: opacity 0.15s; z-index: 100; min-width: 180px; }
    .map-tooltip.visible { opacity: 1; }
    .tooltip-state { font-size: 16px; font-weight: 800; margin-bottom: 8px; }
    .tooltip-vendors { display: flex; flex-direction: column; gap: 6px; }
    .tooltip-vendor { display: flex; justify-content: space-between; align-items: center; font-size: 12px; }
    .tooltip-vendor-dot { width: 8px; height: 8px; border-radius: 50%; margin-right: 8px; }

    /* Stats */
    .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 20px; }
    .stat-card { background: var(--panel); border: 1px solid var(--panel-border); border-radius: 16px; padding: 14px; text-align: center; }
    .stat-value { font-size: 28px; font-weight: 800; }
    .stat-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-soft); margin-top: 4px; }

    /* Vendor Legend */
    .vendor-legend { display: flex; flex-direction: column; gap: 8px; }
    .vendor-item { display: flex; align-items: center; gap: 12px; padding: 12px; border-radius: 14px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); cursor: pointer; transition: all 0.2s; }
    .vendor-item:hover { background: rgba(255,255,255,0.06); transform: translateX(4px); }
    .vendor-item.active { border-color: var(--vendor-color); background: color-mix(in srgb, var(--vendor-color) 15%, transparent); }
    .vendor-dot { width: 16px; height: 16px; border-radius: 50%; background: var(--vendor-color); box-shadow: 0 0 12px var(--vendor-color); flex-shrink: 0; }
    .vendor-info { flex: 1; }
    .vendor-name { font-weight: 700; font-size: 14px; }
    .vendor-sub { font-size: 11px; color: var(--text-soft); }
    .vendor-count { font-size: 22px; font-weight: 900; color: var(--vendor-color); }

    /* State List */
    .state-list { max-height: 280px; overflow-y: auto; display: flex; flex-direction: column; gap: 4px; }
    .state-item { display: grid; grid-template-columns: 36px 1fr auto; align-items: center; gap: 10px; padding: 8px 10px; border-radius: 10px; background: rgba(255,255,255,0.02); font-size: 12px; }
    .state-code { font-weight: 800; color: var(--text-soft); }
    .state-bar-wrap { height: 8px; border-radius: 4px; background: rgba(255,255,255,0.08); overflow: hidden; display: flex; }
    .state-bar-seg { height: 100%; }
    .state-count { font-weight: 700; min-width: 30px; text-align: right; }

    @media (max-width: 1000px) {
      .main-grid { grid-template-columns: 1fr; }
      .stats-row { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>
  <div class="container">
    <a href="routing.html" class="back-link">← Back to Routing</a>

    <header class="header">
      <div class="header-left">
        <h1>🗺️ Vendor Assignment Map</h1>
        <p>Scout program coverage across the United States</p>
      </div>
      <div class="header-right">
        <button class="btn" id="btnAll">Show All</button>
        <a href="routing.html" class="btn">📋 Table View</a>
      </div>
    </header>

    <div class="stats-row" id="statsRow"></div>

    <div class="main-grid">
      <div class="panel">
        <div class="panel-header"><span class="panel-title">🇺🇸 Coverage Map</span><span style="color:var(--text-soft);font-size:11px;">Hover states for details</span></div>
        <div class="map-container">
          <svg id="us-map" viewBox="0 0 959 593" xmlns="http://www.w3.org/2000/svg"></svg>
          <div class="map-tooltip" id="tooltip"></div>
        </div>
      </div>

      <div style="display:flex;flex-direction:column;gap:16px;">
        <div class="panel">
          <div class="panel-header"><span class="panel-title">◈ Vendors</span></div>
          <div class="panel-body">
            <div class="vendor-legend" id="vendorLegend"></div>
          </div>
        </div>
        <div class="panel" style="flex:1;">
          <div class="panel-header"><span class="panel-title">📍 By State</span></div>
          <div class="panel-body">
            <div class="state-list" id="stateList"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

let locationData = null;
let activeVendor = null;

async function loadData() {
  try {
    const response = await fetch('vendor_locations.json?t=' + Date.now());
    locationData = await response.json();
    renderMap();
    renderUI();
  } catch (error) {
    console.error('Failed to load location data:', error);
  }
}

function renderMap() {
  const svg = document.getElementById('us-map');
  svg.innerHTML = '';
  
  // Create paths for each state
  Object.entries(STATE_PATHS).forEach(([state, path]) => {
    const el = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    el.setAttribute('d', path);
    el.setAttribute('id', `state-${state}`);
    el.dataset.state = state;
    
    // Get state data
    const stateData = locationData?.state_totals?.[state];
    if (stateData) {
      // Color based on dominant vendor
      const dominant = Object.entries(stateData).sort((a, b) => b[1] - a[1])[0];
      const color = VENDOR_COLORS[dominant[0]] || '#4D8DFF';
      el.setAttribute('fill', color);
      el.style.fillOpacity = activeVendor ? (stateData[activeVendor] ? 0.8 : 0.15) : 0.6;
    } else {
      el.setAttribute('fill', 'rgba(255,255,255,0.08)');
    }
    
    // Tooltip events
    el.addEventListener('mouseenter', (e) => showTooltip(e, state, stateData));
    el.addEventListener('mousemove', (e) => moveTooltip(e));
    el.addEventListener('mouseleave', hideTooltip);
    
    svg.appendChild(el);
  });
}

function showTooltip(e, state, stateData) {
  const tooltip = document.getElementById('tooltip');
  if (!stateData) {
    tooltip.innerHTML = `<div class="tooltip-state">${state}</div><div style="color:var(--text-soft);font-size:12px;">No assignments</div>`;
  } else {
    const vendorRows = Object.entries(stateData)
      .sort((a, b) => b[1] - a[1])
      .map(([vendor, count]) => `
        <div class="tooltip-vendor">
          <span><span class="tooltip-vendor-dot" style="background:${VENDOR_COLORS[vendor]};display:inline-block;"></span>${vendor}</span>
          <span style="font-weight:700;">${count}</span>
        </div>
      `).join('');
    
    const total = Object.values(stateData).reduce((a, b) => a + b, 0);
    tooltip.innerHTML = `<div class="tooltip-state">${state} — ${total} sites</div><div class="tooltip-vendors">${vendorRows}</div>`;
  }
  tooltip.classList.add('visible');
  moveTooltip(e);
}

function moveTooltip(e) {
  const tooltip = document.getElementById('tooltip');
  tooltip.style.left = (e.clientX + 15) + 'px';
  tooltip.style.top = (e.clientY + 15) + 'px';
}

function hideTooltip() {
  document.getElementById('tooltip').classList.remove('visible');
}

function renderUI() {
  if (!locationData) return;
  
  const total = Object.values(locationData.vendor_totals).reduce((a, b) => a + b, 0);
  const statesCount = Object.keys(locationData.state_totals).length;
  
  // Stats row
  document.getElementById('statsRow').innerHTML = `
    <div class="stat-card"><div class="stat-value" style="color:var(--cyan)">${total}</div><div class="stat-label">Total Sites</div></div>
    <div class="stat-card"><div class="stat-value" style="color:var(--green)">${statesCount}</div><div class="stat-label">States</div></div>
    <div class="stat-card"><div class="stat-value" style="color:var(--purple)">${Object.keys(locationData.vendor_totals).length}</div><div class="stat-label">Vendors</div></div>
    <div class="stat-card"><div class="stat-value" style="color:var(--amber)">${Math.round(total / statesCount)}</div><div class="stat-label">Avg/State</div></div>
  `;
  
  // Vendor legend
  const legend = document.getElementById('vendorLegend');
  legend.innerHTML = Object.entries(locationData.vendor_totals)
    .sort((a, b) => b[1] - a[1])
    .map(([vendor, count]) => {
      const pct = Math.round(count / total * 100);
      const isActive = activeVendor === vendor;
      return `
        <div class="vendor-item ${isActive ? 'active' : ''}" data-vendor="${vendor}" style="--vendor-color: ${VENDOR_COLORS[vendor] || '#fff'}">
          <div class="vendor-dot"></div>
          <div class="vendor-info">
            <div class="vendor-name">${vendor}</div>
            <div class="vendor-sub">${pct}% of total</div>
          </div>
          <div class="vendor-count">${count}</div>
        </div>
      `;
    }).join('');
  
  // Click handlers
  legend.querySelectorAll('.vendor-item').forEach(item => {
    item.addEventListener('click', () => {
      const vendor = item.dataset.vendor;
      activeVendor = activeVendor === vendor ? null : vendor;
      renderMap();
      renderUI();
    });
  });
  
  // State list
  const stateList = document.getElementById('stateList');
  const stateEntries = Object.entries(locationData.state_totals)
    .map(([state, vendors]) => ({ state, total: Object.values(vendors).reduce((a, b) => a + b, 0), vendors }))
    .sort((a, b) => b.total - a.total);
  
  const maxState = stateEntries[0]?.total || 1;
  
  stateList.innerHTML = stateEntries.map(({ state, total, vendors }) => {
    const barSegments = Object.entries(vendors)
      .sort((a, b) => b[1] - a[1])
      .map(([vendor, count]) => {
        const width = (count / total) * 100;
        return `<div class="state-bar-seg" style="width:${width}%;background:${VENDOR_COLORS[vendor]}"></div>`;
      }).join('');
    
    return `
      <div class="state-item">
        <span class="state-code">${state}</span>
        <div class="state-bar-wrap" style="width:${(total / maxState) * 100}%">${barSegments}</div>
        <span class="state-count">${total}</span>
      </div>
    `;
  }).join('');
}

// Show all button
document.getElementById('btnAll').addEventListener('click', () => {
  activeVendor = null;
  renderMap();
  renderUI();
});

// Init
loadData();
</script>
