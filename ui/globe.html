<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Global Coverage · VUES</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #060914; --panel: rgba(9, 16, 31, 0.88); --panel-border: rgba(120, 160, 255, 0.22);
      --text: #E8F0FF; --text-soft: #9EB1D4; --cyan: #5AE4FF; --blue: #4D8DFF;
      --purple: #9B7CFF; --amber: #FFC857; --green: #45E6A5; --red: #FF6B81; --pink: #FF5FD2;
    }
    body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; line-height: 1.5; }
    body::before { content: ''; position: fixed; inset: 0; background: radial-gradient(circle at 30% 20%, rgba(90,228,255,0.08), transparent 35%), radial-gradient(circle at 70% 80%, rgba(155,124,255,0.06), transparent 35%), linear-gradient(180deg, #04070F 0%, #070C18 50%, #050914 100%); z-index: -2; }
    .container { max-width: 1500px; margin: 0 auto; padding: 20px; }
    .back-link { display: inline-flex; align-items: center; gap: 8px; padding: 10px 16px; border-radius: 999px; border: 1px solid rgba(255,255,255,0.08); background: rgba(255,255,255,0.03); color: var(--text); font-size: 13px; font-weight: 600; text-decoration: none; margin-bottom: 16px; transition: all 0.18s; }
    .back-link:hover { background: rgba(90,228,255,0.1); border-color: rgba(90,228,255,0.3); }
    .header { display: flex; justify-content: space-between; align-items: flex-start; gap: 20px; margin-bottom: 20px; flex-wrap: wrap; }
    .header-left h1 { font-size: 28px; font-weight: 900; letter-spacing: -0.02em; margin-bottom: 6px; }
    .header-left p { color: var(--text-soft); font-size: 14px; }
    .header-right { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    .mode-tabs { display: flex; gap: 4px; background: rgba(255,255,255,0.04); padding: 4px; border-radius: 14px; border: 1px solid rgba(255,255,255,0.08); }
    .mode-tab { padding: 10px 20px; border-radius: 10px; font-size: 13px; font-weight: 700; cursor: pointer; transition: all 0.2s; color: var(--text-soft); background: transparent; border: none; }
    .mode-tab:hover { color: var(--text); background: rgba(255,255,255,0.05); }
    .mode-tab.active.scout { background: rgba(155,124,255,0.2); color: var(--purple); }
    .mode-tab.activeckground: rgba(90,228,255,0.2); color: var(--cyan); }
    .pill { padding: 6px 14px; border-radius: 999px; font-size: 11px; font-weight: 700; }
    .pill-green { background: rgba(69,230,165,0.12); border: 1px solid rgba(69,230,165,0.35); color: #D9FFE8; }
    .btn { padding: 10px 18px; border-radius: 12px; font-size: 13px; font-weight: 700; cursor: pointer; transition: all 0.2s; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.05); color: var(--text); text-decoration: none; display: inline-flex; align-items: center; gap: 8px; }
    .btn:hover { background: rgba(255,255,255,0.1); }
    .stats-row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; margin-bottom: 20px; }
    .stat-card { background: var(--panel); border: 1px solid var(--panel-border); border-radius: 16px; padding: 16px; text-align: center; transition: all 0.2s; }
    .stat-card:hover { transform: translateY(-2px); border-color: rgba(90,228,255,0.4); }
    .stat-value { font-size: 32px; font-weight: 900; }
    .stat-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-soft); margin-top: 4px; }
    .main-grid { display: grid; grid-template-columns: 1fr 340px; gap: 20px; }
    .panel { background: var(--panel); border: 1px solid var(--panel-border); border-radius: 20px; overflow: hidden; }
    .panel-header { padding: 14px 18px; border-bottom: 1px solid rgba(255,255,255,0.06); display: flex; justify-content: s-between; align-items: center; }
    .panel-title { font-weight: 700; font-size: 15px; display: flex; align-items: center; gap: 8px; }
    .panel-body { padding: 16px; }
    .globe-container { position: relative; display: flex; align-items: center; justify-content: center; padding: 20px; min-height: 480px; }
    .globe-wrap { position: relative; width: 100%; max-width: 440px; aspect-ratio: 1; }
    #globe-canvas { width: 100%; height: 100%; cursor: grab; border-radius: 50%; touch-action: none; }
    #globe-canvas:active { cursor: grabbing; }
    .vendor-legend { display: flex; flex-direction: column; gap: 10px; }
    .vendor-item { display: flex; align-items: center; gap: 12px; padding: 14px; border-radius: 14px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); cursor: pointer; transition: all 0.2s; }
    .vendor-item:hover { background: rgba(255,255,255,0.06); transform: translateX(4px); border-color: var(--vendor-color); }
    .vendor-item.active { border-color: var(--vendor-color); background: color-mix(in srgb, var(--vendor-color) 15%, transparent); }
    .vendor-dot { width: 18px; height: 18px; border-radius: 50%; background: var(--vendor-color); box-shadow: 0 0 16px var(--vendor-color); flex-shrink: 0; }
    .vendor-info { flex: 1; }
    .vendor-name-label { font-weight: 700; font-size: 14px; }
    .vendor-sub { font-size: 11px; color: var(--text-soft); }
    .vendor-count { font-size: 24px; font-weight: 900; color: var(--vendor-color); }
    .velocity-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
    .velocity-card { padding: 14px; border-radius: 12px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); text-align: center; }
    .velocity-value { font-size: 22px; font-weight: 800; }
    .velocity-label { font-size: 9px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-soft); margin-top: 4px; }
    .region-list { display: flex; flex-direction: column; gap: 6px; max-height: 200px; overflow-y: auto; }
    .region-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 10px; background: rgba(255,255,255,0.02); font-size: 12px; }
    .region-name { flex: 1; font-weight: 600; }
    .region-bar { width: 80px; height: 6px; border-radius: 3px; background: rgba(255,255,255,0.1); overflow: hidden; }
    .region-bar-fill { height: 100%; border-radius: 3px; transition: width 0.4s; }
    .region-count { font-weight: 700; min-width: 30px; text-align: right; }
    @media (max-width: 1000px) { .main-grid { grid-template-columns: 1fr; } .stats-row { grid-template-columns: repeat(3, 1fr); } }
    @media (max-width: 600px) { .stats-row { grid-template-columns: repeat(2, 1fr); } }
  </style>
</head>
<body>
  <div class="container">
    <a href="routing.html" class="back-link">← Back to Routing</a>
    <header class="header">
      <div class="header-left">
        <h1 id="pageTitle">🌍 Scout Coverage</h1>
        <p id="pageSubtitle">Interactive visualization of scout program distribution</p>
      </div>
      <div class="header-right">
        <div class="mode-tabs">
          <button class="mode-tab scout active" data-mode="scout">☄ Scout</button>
          <button class="mode-tab survey" data-mode="survey">✈ Survey</button>
        </div>
        <span class="pill pill-green">● Live</span>
        <button class="btn" id="resetBtn">🔄 Reset</button>
      </div>
    </header>
    <div class="stats-row" id="statsRow"></div>
    <div class="main-grid">
      <div class="panel">
        <div class="panel-header">
          <span class="panel-title" id="globeTitle">🌐 Scout Distribution</span>
          <span style="color:var(--text-soft);font-size:11px;">Drag to rotate • Click legend to filter</span>
        </div>
        <div class="globe-container">
          <div class="globe-wrap"><canvas id="globe-canvas"></canvas></div>
        </div>
      </div>
      <div style="display:flex;flex-direction:column;gap:16px;">
        <div class="panel">
          <div class="panel-header"><span class="panel-title" id="legendTitle">◈ Vendors</span></div>
          <div class="panel-body"><div class="vendor-legend" id="vendorLegend"></div></div>
        </div>
        <div class="panel">
          <div class="panel-header"><span class="panel-title" id="velocityTitle">🚀 Velocity</span></div>
          <div class="panel-body"><div class="velocity-grid" id="velocityGrid"></div></div>
        </div>
        <div class="panel" style="flex:1;">
          <div class="panel-header"><span class="panel-title">📍 Top Regions</span></div>
          <div class="panel-body"><div class="region-list" id="regionList"></div></div>
        </div>
      </div>
    </div>
  </div>

<script>
// === PURE CANVAS GLOBE - NO EXTERNAL DEPENDENCIES ===
const VENDOR_HEX = { 'CEI': '#5AE4FF', 'Wachter': '#9B7CFF', 'Techwise': '#FF5FD2', 'Everon': '#45E6A5', 'SAS': '#FFC857' };
const SURVEY_HEX = { 'Completed': '#45E6A5', 'Pending': '#FFC857', 'No Survey': '#888899' };
const PROGRAM_WEEK = 3;

// State coordinates [lat, lon]
const STATE_COORDS = {
  'AL':[32.81,-86.79],'AK':[64.07,-152.28],'AZ':[33.73,-111.43],'AR':[34.97,-92.37],'CA':[36.62,-119.38],
  'CO':[39.06,-105.31],'CT':[41.60,-72.76],'DE':[39.32,-75.51],'FL':[27.77,-81.69],'GA':[33.04,-83.64],
  'HI':[19.74,-155.84],'ID':[44.24,-114.48],'IL':[40.85,-88.69],'IN':[39.85,-86.26],'IA':[42.01,-93.21],
  'KS':[38.53,-96.73],'KY':[37.84,-84.27],'LA':[31.17,-91.87],'ME':[44.69,-69.38],'MD':[39.06,-76.80],
  'MA':[42.23,-71.53],'MI':[43.33,-84.54],'MN':[45.69,-93.90],'MS':[32.74,-89.68],'MO':[38.46,-92.29],
  'MT':[46.92,-110.45],'NE':[41.13,-98.27],'NV':[38.31,-117.06],'NH':[43.45,-71.56],'NJ':[40.30,-74.52],
  'NM':[34.84,-106.25],'NY':[42.17,-74.95],'NC':[35.63,-79.81],'ND':[47.53,-99.78],'OH':[40.39,-82.76],
  'OK':[35.57,-96.93],'OR':[44.57,-122.07],'PA':[40.59,-77.21],'RI':[41.68,-71.51],'SC':[33.86,-80.95],
  'SD':[44.30,-99.44],'TN':[35.75,-86.69],'TX':[31.05,-97.56],'UT':[40.15,-111.86],'VT':[44.05,-72.71],
  'VA':[37.77,-78.17],'WA':[47.40,-121.49],'WV':[38.99,-80.65],'WI':[44.27,-89.62],'WY':[42.76,-107.30],'DC':[38.90,-77.04]
};

let scoutData = null, surveyData = null;
let activeMode = 'scout', activeFilter = null;
let rotation = 0, isDragging = false, lastX = 0;

// Fallback data
const SCOUT_FALLBACK = {
  markers: [
    {vendor:'CEI',state:'TX',location:[31.05,-97.56],count:69},{vendor:'CEI',state:'FL',location:[27.77,-81.69],count:52},
    {vendor:'Wachter',state:'PA',location:[40.59,-77.21],count:38},{vendor:'Techwise',state:'NC',location:[35.63,-79.81],count:33},
    {vendor:'Wachter',state:'OH',location:[40.39,-82.76],count:31},{vendor:'Wachter',state:'NY',location:[42.17,-74.95],count:24},
    {vendor:'CEI',state:'GA',location:[33.04,-83.64],count:23},{vendor:'Everon',state:'IL',location:[40.85,-88.69],count:22},
    {vendor:'CEI',state:'AL',location:[32.81,-86.79],count:22},{vendor:'CEI',state:'TN',location:[35.75,-86.69],count:22},
    {vendor:'CEI',state:'CA',location:[36.62,-119.38],count:21},{vendor:'Wachter',state:'IN',location:[39.85,-86.26],count:20},
    {vendor:'Wachter',state:'NJ',location:[40.30,-74.52],count:20},{vendor:'CEI',state:'OK',location:[35.57,-96.93],count:20},
    {vendor:'CEI',state:'AZ',location:[33.73,-111.43],count:18},{vendor:'Techwise',state:'VA',location:[37.77,-78.17],count:17},
    {vendor:'Everon',state:'WA',location:[47.40,-121.49],count:11},{vendor:'Everon',state:'CO',location:[39.06,-105.31],count:10}
  ],
  vendor_totals: {CEI:342,Wachter:176,Everon:154,Techwise:78,SAS:8},
  state_totals: {TX:{CEI:69},FL:{CEI:52},PA:{Wachter:38},NC:{Techwise:33},OH:{Wachter:31},NY:{Wachter:24},GA:{CEI:23},IL:{Everon:22},AL:{CEI:22},TN:{CEI:22},CA:{CEI:21},IN:{Wachter:20},NJ:{Wachter:20},OK:{CEI:20},AZ:{CEI:18},VA:{Techwise:17},WA:{Everon:11},CO:{Everon:10}}
};

// === CANVAS GLOBE ===
function initGlobe() {
  const canvas = document.getElementById('globe-canvas');
  const ctx = canvas.getContext('2d');
  const size = Math.min(canvas.parentElement.offsetWidth, 440);
  canvas.width = size * 2;
  canvas.height = size * 2;
  canvas.style.width = size + 'px';
  canvas.style.height = size + 'px';
  ctx.scale(2, 2);

  const cx = size / 2, cy = size / 2, radius = size / 2 - 20;

  // Drag handling
  canvas.onpointerdown = e => { isDragging = true; lastX = e.clientX; canvas.setPointerCapture(e.pointerId); };
  canvas.onpointermove = e => { if (isDragging) { rotation += (e.clientX - lastX) * 0.01; lastX = e.clientX; } };
  canvas.onpointerup = e => { isDragging = false; canvas.releasePointerCapture(e.pointerId); };

  function latLonTo2D(lat, lon, rot) {
    const phi = (90 - lat) * Math.PI / 180;
    const theta = (lon + rot * 180 / Math.PI) * Math.PI / 180;
    const x = Math.sin(phi) * Math.cos(theta);
    const z = Math.sin(phi) * Math.sin(theta);
    const y = Math.cos(phi);
    if (z < -0.1) return null; // behind globe
    return { x: cx + x * radius * 0.95, y: cy - y * radius * 0.95, depth: z };
  }

  function draw() {
    ctx.clearRect(0, 0, size, size);

    // Globe background with gradient
    const grad = ctx.createRadialGradient(cx - radius*0.3, cy - radius*0.3, 0, cx, cy, radius);
    grad.addColorStop(0, '#1a2a4a');
    grad.addColorStop(0.7, '#0d1525');
    grad.addColorStop(1, '#060914');
    ctx.beginPath();
    ctx.arc(cx, cy, radius, 0, Math.PI * 2);
    ctx.fillStyle = grad;
    ctx.fill();

    // Globe edge glow
    ctx.beginPath();
    ctx.arc(cx, cy, radius, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(90,228,255,0.3)';
    ctx.lineWidth = 2;
    ctx.stroke();

    // Grid lines (latitude)
    ctx.strokeStyle = 'rgba(255,255,255,0.08)';
    ctx.lineWidth = 1;
    for (let lat = -60; lat <= 60; lat += 30) {
      ctx.beginPath();
      for (let lon = -180; lon <= 180; lon += 5) {
        const p = latLonTo2D(lat, lon, rotation);
        if (p) { if (lon === -180) ctx.moveTo(p.x, p.y); else ctx.lineTo(p.x, p.y); }
      }
      ctx.stroke();
    }
    // Grid lines (longitude)
    for (let lon = -180; lon < 180; lon += 30) {
      ctx.beginPath();
      for (let lat = -90; lat <= 90; lat += 5) {
        const p = latLonTo2D(lat, lon, rotation);
        if (p) { if (lat === -90) ctx.moveTo(p.x, p.y); else ctx.lineTo(p.x, p.y); }
      }
      ctx.stroke();
    }

    // Draw markers
    const data = activeMode === 'scout' ? scoutData : surveyData;
    if (!data || !data.markers) { requestAnimationFrame(draw); return; }

    const markers = data.markers
      .filter(m => !activeFilter || (activeMode === 'scout' ? m.vendor === activeFilter : m.status === activeFilter))
      .map(m => {
        const p = latLonTo2D(m.location[0], m.location[1], rotation);
        if (!p) return null;
        const color = activeMode === 'scout' ? VENDOR_HEX[m.vendor] : SURVEY_HEX[m.status];
        const size = Math.min(16, 4 + (m.count / 20) * 4);
        return { ...m, ...p, color, markerSize: size };
      })
      .filter(Boolean)
      .sort((a, b) => a.depth - b.depth); // Draw back-to-front

    markers.forEach(m => {
      const alpha = 0.4 + m.depth * 0.6;
      // Glow
      ctx.beginPath();
      ctx.arc(m.x, m.y, m.markerSize + 4, 0, Math.PI * 2);
      ctx.fillStyle = m.color.replace(')', `,${alpha * 0.3})`).replace('rgb', 'rgba').replace('#', 'rgba(').replace(/([0-9a-f]{2})([0-9a-f]{2})([0-9a-f]{2})/i, (_, r, g, b) => `${parseInt(r,16)},${parseInt(g,16)},${parseInt(b,16)}`);
      const glowGrad = ctx.createRadialGradient(m.x, m.y, 0, m.x, m.y, m.markerSize + 6);
      glowGrad.addColorStop(0, m.color + '60');
      glowGrad.addColorStop(1, m.color + '00');
      ctx.fillStyle = glowGrad;
      ctx.fill();
      // Marker
      ctx.beginPath();
      ctx.arc(m.x, m.y, m.markerSize, 0, Math.PI * 2);
      ctx.fillStyle = m.color;
      ctx.globalAlpha = alpha;
      ctx.fill();
      ctx.globalAlpha = 1;
    });

    // Auto-rotate when not dragging
    if (!isDragging) rotation += 0.003;
    requestAnimationFrame(draw);
  }

  draw();
}

// === DATA LOADING ===
async function loadData() {
  try {
    const res = await fetch('vendor_locations.json?t=' + Date.now());
    scoutData = res.ok ? await res.json() : SCOUT_FALLBACK;
  } catch { scoutData = SCOUT_FALLBACK; }

  try {
    const res = await fetch('survey_routing_data.json?t=' + Date.now());
    if (res.ok) {
      const raw = await res.json();
      surveyData = processSurveyData(raw);
    } else {
      surveyData = buildFallbackSurvey();
    }
  } catch { surveyData = buildFallbackSurvey(); }

  setupModeTabs();
  renderUI();
  initGlobe();
}

function processSurveyData(raw) {
  const byState = {}, byVendor = {}, statusCounts = { Completed: 0, Pending: 0, 'No Survey': 0 };
  raw.surveys.forEach(s => {
    const state = s.state || 'Unknown', vendor = s.vendor || 'Unknown';
    const status = s.survey_status === 'Completed' ? 'Completed' : (!s.survey_status || s.survey_status === 'Not Started') ? 'No Survey' : 'Pending';
    if (!byState[state]) byState[state] = { Completed: 0, Pending: 0, 'No Survey': 0, total: 0 };
    byState[state][status]++; byState[state].total++;
    if (!byVendor[vendor]) byVendor[vendor] = { Completed: 0, Pending: 0, 'No Survey': 0, total: 0 };
    byVendor[vendor][status]++; byVendor[vendor].total++;
    statusCounts[status]++;
  });
  const markers = [];
  Object.entries(byState).forEach(([state, data]) => {
    const coord = STATE_COORDS[state]; if (!coord) return;
    ['Completed', 'Pending', 'No Survey'].forEach((status, i) => {
      if (data[status] > 0) markers.push({ status, state, location: [coord[0] + (i-1)*0.5, coord[1] + (i-1)*0.3], count: data[status] });
    });
  });
  return { markers, byState, byVendor, statusCounts, total: raw.surveys.length };
}

function buildFallbackSurvey() {
  return {
    markers: [
      { status:'Completed', state:'TX', location:[31.05,-97.56], count:45 },
      { status:'Pending', state:'TX', location:[31.55,-97.26], count:15 },
      { status:'Completed', state:'FL', location:[27.77,-81.69], count:38 },
      { status:'Completed', state:'CA', location:[36.62,-119.38], count:28 }
    ],
    byState: { TX: { Completed:45, Pending:15, 'No Survey':9, total:69 } },
    byVendor: { CEI: { Completed:200, Pending:80, 'No Survey':62, total:342 } },
    statusCounts: { Completed:450, Pending:180, 'No Survey':128 }, total:758
  };
}

// === UI ===
function setupModeTabs() {
  document.querySelectorAll('.mode-tab').forEach(tab => {
    tab.onclick = () => {
      if (tab.dataset.mode === activeMode) return;
      activeMode = tab.dataset.mode;
      activeFilter = null;
      document.querySelectorAll('.mode-tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      document.getElementById('pageTitle').textContent = activeMode === 'scout' ? '🌍 Scout Coverage' : '📊 Survey Status';
      document.getElementById('pageSubtitle').textContent = activeMode === 'scout' ? 'Interactive visualization of scout program distribution' : 'Survey completion tracking across all locations';
      document.getElementById('globeTitle').textContent = activeMode === 'scout' ? '🌐 Scout Distribution' : '🌐 Survey Distribution';
      document.getElementById('legendTitle').textContent = activeMode === 'scout' ? '◈ Vendors' : '◈ Status';
      document.getElementById('velocityTitle').textContent = activeMode === 'scout' ? '🚀 Velocity' : '📈 Rates';
      renderUI();
    };
  });
}

function renderUI() {
  if (activeMode === 'scout') renderScoutUI(); else renderSurveyUI();
}

function renderScoutUI() {
  if (!scoutData) return;
  const vt = scoutData.vendor_totals, st = scoutData.state_totals;
  const total = Object.values(vt).reduce((a,b) => a+b, 0);
  const states = Object.keys(st).length, vendors = Object.keys(vt).length;

  document.getElementById('statsRow').innerHTML = `
    <div class="stat-card"><div class="stat-value" style="color:var(--cyan)">${total}</div><div class="stat-label">Total Sites</div></div>
    <div class="stat-card"><div class="stat-value" style="color:var(--green)">${states}</div><div class="stat-label">States</div></div>
    <div class="stat-card"><div class="stat-value" style="color:var(--purple)">${vendors}</div><div class="stat-label">Vendors</div></div>
    <div class="stat-card"><div class="stat-value" style="color:var(--amber)">${Math.round(total/vendors)}</div><div class="stat-label">Avg/Vendor</div></div>
    <div class="stat-card"><div class="stat-value" style="color:var(--pink)">${Math.round(total/PROGRAM_WEEK)}</div><div class="stat-label">Sites/Week</div></div>`;

  document.getElementById('vendorLegend').innerHTML = Object.entries(vt).sort((a,b) => b[1]-a[1]).map(([v,c]) => `
    <div class="vendor-item ${activeFilter===v?'active':''}" data-filter="${v}" style="--vendor-color:${VENDOR_HEX[v]}">
      <div class="vendor-dot"></div>
      <div class="vendor-info"><div class="vendor-name-label">${v}</div><div class="vendor-sub">${Math.round(c/total*100)}% coverage</div></div>
      <div class="vendor-count">${c}</div>
    </div>`).join('');

  document.getElementById('velocityGrid').innerHTML = Object.entries(vt).sort((a,b) => b[1]-a[1]).slice(0,4).map(([v,c]) => `
    <div class="velocity-card"><div class="velocity-value" style="color:${VENDOR_HEX[v]}">${Math.round(c/PROGRAM_WEEK)}</div><div class="velocity-label">${v}/wk</div></div>`).join('');

  const stateArr = Object.entries(st).map(([s,v]) => ({s, total: Object.values(v).reduce((a,b)=>a+b,0), top: Object.entries(v).sort((a,b)=>b[1]-a[1])[0]})).sort((a,b) => b.total-a.total).slice(0,10);
  const max = stateArr[0]?.total || 1;
  document.getElementById('regionList').innerHTML = stateArr.map(({s,total,top}) => `
    <div class="region-item"><span class="region-name">${s}</span><div class="region-bar"><div class="region-bar-fill" style="width:${Math.round(total/max*100)}%;background:${VENDOR_HEX[top[0]]}"></div></div><span class="region-count" style="color:${VENDOR_HEX[top[0]]}">${total}</span></div>`).join('');

  bindLegend();
}

function renderSurveyUI() {
  if (!surveyData) return;
  const { statusCounts: sc, total, byVendor, byState } = surveyData;
  const rate = total > 0 ? Math.round(sc.Completed/total*100) : 0;

  document.getElementById('statsRow').innerHTML = `
    <div class="stat-card"><div class="stat-value" style="color:var(--cyan)">${total}</div><div class="stat-label">Total Sites</div></div>
    <div class="stat-card"><div class="stat-value" style="color:var(--green)">${sc.Completed}</div><div class="stat-label">Completed</div></div>
    <div class="stat-card"><div class="stat-value" style="color:var(--amber)">${sc.Pending}</div><div class="stat-label">Pending</div></div>
    <div class="stat-card"><div class="stat-value" style="color:var(--text-soft)">${sc['No Survey']}</div><div class="stat-label">No Survey</div></div>
    <div class="stat-card"><div class="stat-value" style="color:var(--green)">${rate}%</div><div class="stat-label">Complete Rate</div></div>`;

  document.getElementById('vendorLegend').innerHTML = ['Completed','Pending','No Survey'].map(status => {
    const c = sc[status] || 0;
    return `<div class="vendor-item ${activeFilter===status?'active':''}" data-filter="${status}" style="--vendor-color:${SURVEY_HEX[status]}">
      <div class="vendor-dot"></div>
      <div class="vendor-info"><div class="vendor-name-label">${status}</div><div class="vendor-sub">${total>0?Math.round(c/total*100):0}% of surveys</div></div>
      <div class="vendor-count">${c}</div>
    </div>`;
  }).join('');

  const vendorRates = Object.entries(byVendor).map(([v,d]) => ({v, rate: d.total>0 ? Math.round(d.Completed/d.total*100) : 0, total: d.total})).sort((a,b) => b.total-a.total).slice(0,4);
  document.getElementById('velocityGrid').innerHTML = vendorRates.map(({v,rate}) => `
    <div class="velocity-card"><div class="velocity-value" style="color:${rate>=70?'var(--green)':rate>=40?'var(--amber)':'var(--red)'}">${rate}%</div><div class="velocity-label">${v}</div></div>`).join('');

  const stateArr = Object.entries(byState).map(([s,d]) => ({s, total: d.total, rate: d.total>0 ? Math.round(d.Completed/d.total*100) : 0})).sort((a,b) => b.total-a.total).slice(0,10);
  const max = stateArr[0]?.total || 1;
  document.getElementById('regionList').innerHTML = stateArr.map(({s,total,rate}) => `
    <div class="region-item"><span class="region-name">${s}</span><div class="region-bar"><div class="region-bar-fill" style="width:${Math.round(total/max*100)}%;background:${rate>=70?'var(--green)':rate>=40?'var(--amber)':'var(--red)'}"></div></div><span class="region-count" style="color:${rate>=70?'var(--green)':rate>=40?'var(--amber)':'var(--red)'}">${rate}%</span></div>`).join('');

  bindLegend();
}

function bindLegend() {
  document.querySelectorAll('.vendor-item').forEach(el => {
    el.onclick = () => { activeFilter = activeFilter === el.dataset.filter ? null : el.dataset.filter; renderUI(); };
  });
}

document.getElementById('resetBtn').onclick = () => { rotation = 0; activeFilter = null; renderUI(); };
window.onresize = () => initGlobe();
loadData();
</script>
</body>
</html>
