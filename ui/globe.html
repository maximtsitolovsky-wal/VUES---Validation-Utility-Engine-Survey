<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coverage Map · VUES</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #060914; --panel: rgba(9, 16, 31, 0.88); --panel-border: rgba(120, 160, 255, 0.22);
      --text: #E8F0FF; --text-soft: #9EB1D4; --cyan: #5AE4FF; --blue: #0053e2;
      --purple: #9B7CFF; --amber: #FFC857; --green: #45E6A5; --red: #FF6B81; --pink: #FF5FD2;
    }
    body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    body::before { content: ''; position: fixed; inset: 0; background: radial-gradient(circle at 30% 20%, rgba(90,228,255,0.08), transparent 35%), radial-gradient(circle at 70% 80%, rgba(155,124,255,0.06), transparent 35%), linear-gradient(180deg, #04070F 0%, #070C18 50%, #050914 100%); z-index: -2; }
    .container { max-width: 1500px; margin: 0 auto; padding: 20px; }
    .back-link { display: inline-flex; align-items: center; gap: 8px; padding: 10px 16px; border-radius: 999px; border: 1px solid rgba(255,255,255,0.08); background: rgba(255,255,255,0.03); color: var(--text); font-size: 13px; font-weight: 600; text-decoration: none; margin-bottom: 16px; transition: all 0.18s; }
    .back-link:hover { background: rgba(90,228,255,0.1); border-color: rgba(90,228,255,0.3); }
    .header { display: flex; justify-content: space-between; align-items: flex-start; gap: 20px; margin-bottom: 20px; flex-wrap: wrap; }
    .header-left h1 { font-size: 28px; font-weight: 900; letter-spacing: -0.02em; margin-bottom: 6px; }
    .header-left p { color: var(--text-soft); font-size: 14px; }
    .header-right { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    .mode-tabs { display: flex; gap: 4px; background: rgba(255,255,255,0.04); padding: 4px; border-radius: 14px; border: 1px solid rgba(255,255,255,0.08); }
    .mode-tab { padding: 10px 20px; border-radius: 10px; font-size: 13px; font-weight: 700; cursor: pointer; transition: all 0.2s; color: var(--text-soft); background: transparent; border: none; }
    .mode-tab:hover { color: var(--text); background: rgba(255,255,255,0.05); }
    .mode-tab.active.scout { background: rgba(155,124,255,0.25); color: var(--purple); }
    .mode-tab.active.survey { background: rgba(90,228,255,0.25); color: var(--cyan); }
    .pill { padding: 6px 14px; border-radius: 999px; font-size: 11px; font-weight: 700; }
    .pill-green { background: rgba(69,230,165,0.15); border: 1px solid rgba(69,230,165,0.4); color: var(--green); }
    .btn { padding: 10px 18px; border-radius: 12px; font-size: 13px; font-weight: 700; cursor: pointer; transition: all 0.2s; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.05); color: var(--text); text-decoration: none; display: inline-flex; align-items: center; gap: 8px; }
    .btn:hover { background: rgba(255,255,255,0.1); }
    
    .stats-row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; margin-bottom: 20px; }
    .stat-card { background: var(--panel); border: 1px solid var(--panel-border); border-radius: 16px; padding: 16px; text-align: center; transition: all 0.2s; }
    .stat-card:hover { transform: translateY(-2px); border-color: rgba(90,228,255,0.4); }
    .stat-value { font-size: 32px; font-weight: 900; }
    .stat-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-soft); margin-top: 4px; }
    .stat-sub { font-size: 11px; color: var(--text-soft); margin-top: 2px; }
    
    .main-grid { display: grid; grid-template-columns: 1fr 340px; gap: 20px; }
    .panel { background: var(--panel); border: 1px solid var(--panel-border); border-radius: 20px; overflow: hidden; }
    .panel-header { padding: 14px 18px; border-bottom: 1px solid rgba(255,255,255,0.06); display: flex; justify-content: space-between; align-items: center; }
    .panel-title { font-weight: 700; font-size: 15px; display: flex; align-items: center; gap: 8px; }
    .panel-body { padding: 16px; }
    
    .map-container { position: relative; padding: 20px; min-height: 480px; display: flex; align-items: center; justify-content: center; }
    #us-map { width: 100%; max-width: 900px; height: auto; }
    #us-map path { stroke: rgba(255,255,255,0.12); stroke-width: 0.5; transition: all 0.2s; cursor: pointer; }
    #us-map path:hover { stroke: var(--cyan); stroke-width: 1.5; filter: brightness(1.3); }
    
    .map-tooltip { position: absolute; background: rgba(0,0,0,0.95); border: 1px solid rgba(255,255,255,0.2); border-radius: 12px; padding: 12px 16px; pointer-events: none; opacity: 0; transition: opacity 0.15s; z-index: 100; min-width: 180px; }
    .map-tooltip.visible { opacity: 1; }
    .tooltip-title { font-size: 16px; font-weight: 800; margin-bottom: 8px; }
    .tooltip-row { display: flex; justify-content: space-between; align-items: center; font-size: 12px; padding: 3px 0; }
    .tooltip-dot { width: 8px; height: 8px; border-radius: 50%; margin-right: 8px; display: inline-block; }
    
    .vendor-legend { display: flex; flex-direction: column; gap: 10px; }
    .vendor-item { display: flex; align-items: center; gap: 12px; padding: 14px; border-radius: 14px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); cursor: pointer; transition: all 0.2s; }
    .vendor-item:hover { background: rgba(255,255,255,0.06); transform: translateX(4px); border-color: var(--vendor-color); }
    .vendor-item.active { border-color: var(--vendor-color); background: color-mix(in srgb, var(--vendor-color) 15%, transparent); }
    .vendor-dot { width: 18px; height: 18px; border-radius: 50%; background: var(--vendor-color); box-shadow: 0 0 12px var(--vendor-color); flex-shrink: 0; }
    .vendor-info { flex: 1; }
    .vendor-name-label { font-weight: 700; font-size: 14px; }
    .vendor-sub { font-size: 11px; color: var(--text-soft); }
    .vendor-count { font-size: 24px; font-weight: 900; color: var(--vendor-color); }
    
    .velocity-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
    .velocity-card { padding: 14px; border-radius: 12px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); text-align: center; }
    .velocity-value { font-size: 22px; font-weight: 800; }
    .velocity-label { font-size: 9px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-soft); margin-top: 4px; }
    
    .region-list { display: flex; flex-direction: column; gap: 6px; max-height: 200px; overflow-y: auto; }
    .region-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 10px; background: rgba(255,255,255,0.02); font-size: 12px; }
    .region-name { flex: 1; font-weight: 600; }
    .region-bar { width: 80px; height: 6px; border-radius: 3px; background: rgba(255,255,255,0.1); overflow: hidden; }
    .region-bar-fill { height: 100%; border-radius: 3px; }
    .region-count { font-weight: 700; min-width: 40px; text-align: right; }
    
    @media (max-width: 1000px) { .main-grid { grid-template-columns: 1fr; } .stats-row { grid-template-columns: repeat(3, 1fr); } }
    @media (max-width: 600px) { .stats-row { grid-template-columns: repeat(2, 1fr); } }
  </style>
</head>
<body>
  <div class="container">
    <a href="routing.html" class="back-link">← Back to Routing</a>
    <header class="header">
      <div class="header-left">
        <h1 id="pageTitle">🗺️ Scout Coverage</h1>
        <p id="pageSubtitle">Vendor assignments across the United States</p>
      </div>
      <div class="header-right">
        <div class="mode-tabs">
          <button class="mode-tab scout active" data-mode="scout">☄ Scout</button>
          <button class="mode-tab survey" data-mode="survey">📋 Survey</button>
        </div>
        <span class="pill pill-green" id="statusPill">● Live Data</span>
        <button class="btn" id="resetBtn">🔄 Reset</button>
      </div>
    </header>
    <div class="stats-row" id="statsRow"></div>
    <div class="main-grid">
      <div class="panel">
        <div class="panel-header">
          <span class="panel-title" id="mapTitle">🇺🇸 US Coverage Map</span>
          <span style="color:var(--text-soft);font-size:11px;">Hover states for details</span>
        </div>
        <div class="map-container">
          <svg id="us-map" viewBox="0 0 959 593"></svg>
          <div class="map-tooltip" id="tooltip"></div>
        </div>
      </div>
      <div style="display:flex;flex-direction:column;gap:16px;">
        <div class="panel">
          <div class="panel-header"><span class="panel-title" id="legendTitle">◈ Vendors</span></div>
          <div class="panel-body"><div class="vendor-legend" id="vendorLegend"></div></div>
        </div>
        <div class="panel">
          <div class="panel-header"><span class="panel-title" id="velocityTitle">🚀 Velocity</span></div>
          <div class="panel-body"><div class="velocity-grid" id="velocityGrid"></div></div>
        </div>
        <div class="panel" style="flex:1;">
          <div class="panel-header"><span class="panel-title">📍 Top States</span></div>
          <div class="panel-body"><div class="region-list" id="regionList"></div></div>
        </div>
      </div>
    </div>
  </div>

// === DATA ===
let scoutData = null, surveyData = null;
let activeMode = 'scout', activeFilter = null;

async function loadData() {
  // Load scout data
  try {
    const res = await fetch('vendor_locations.json?t=' + Date.now());
    scoutData = res.ok ? await res.json() : null;
  } catch { scoutData = null; }

  // Load survey data
  try {
    const res = await fetch('survey_routing_data.json?t=' + Date.now());
    if (res.ok) {
      const raw = await res.json();
      surveyData = {
        summary: raw.summary,
        rows: raw.rows
      };
    }
  } catch { surveyData = null; }

  setupTabs();
  renderMap();
  renderUI();
}

function setupTabs() {
  document.querySelectorAll('.mode-tab').forEach(tab => {
    tab.onclick = () => {
      if (tab.dataset.mode === activeMode) return;
      activeMode = tab.dataset.mode;
      activeFilter = null;
      document.querySelectorAll('.mode-tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      document.getElementById('pageTitle').textContent = activeMode === 'scout' ? '🗺️ Scout Coverage' : '📋 Survey Status';
      document.getElementById('pageSubtitle').textContent = activeMode === 'scout' ? 'Vendor assignments across the United States' : 'Survey completion status by vendor';
      document.getElementById('legendTitle').textContent = activeMode === 'scout' ? '◈ Vendors' : '◈ Status';
      document.getElementById('velocityTitle').textContent = activeMode === 'scout' ? '🚀 Velocity' : '📈 Completion';
      renderMap();
      renderUI();
    };
  });
}

function renderMap() {
  const svg = document.getElementById('us-map');
  svg.innerHTML = '';

  Object.entries(STATE_PATHS).forEach(([state, path]) => {
    const el = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    el.setAttribute('d', path);
    el.setAttribute('id', `state-${state}`);
    el.dataset.state = state;

    let color = 'rgba(255,255,255,0.06)';
    let opacity = 0.6;

    if (activeMode === 'scout' && scoutData?.state_totals?.[state]) {
      const stateData = scoutData.state_totals[state];
      const dominant = Object.entries(stateData).sort((a, b) => b[1] - a[1])[0];
      color = VENDOR_HEX[dominant[0]] || '#4D8DFF';
      opacity = activeFilter ? (stateData[activeFilter] ? 0.8 : 0.15) : 0.6;
    } else if (activeMode === 'survey' && surveyData) {
      // For survey mode, we don't have state-level data, so just show a neutral color
      color = 'rgba(90,228,255,0.3)';
      opacity = 0.4;
    }

    el.setAttribute('fill', color);
    el.style.fillOpacity = opacity;

    el.addEventListener('mouseenter', (e) => showTooltip(e, state));
    el.addEventListener('mousemove', (e) => moveTooltip(e));
    el.addEventListener('mouseleave', hideTooltip);

    svg.appendChild(el);
  });
}

function showTooltip(e, state) {
  const tooltip = document.getElementById('tooltip');
  
  if (activeMode === 'scout') {
    const stateData = scoutData?.state_totals?.[state];
    if (!stateData) {
      tooltip.innerHTML = `<div class="tooltip-title">${state}</div><div style="color:var(--text-soft);font-size:12px;">No assignments</div>`;
    } else {
      const total = Object.values(stateData).reduce((a, b) => a + b, 0);
      const rows = Object.entries(stateData).sort((a, b) => b[1] - a[1]).map(([v, c]) => 
        `<div class="tooltip-row"><span><span class="tooltip-dot" style="background:${VENDOR_HEX[v]}"></span>${v}</span><span style="font-weight:700;">${c}</span></div>`
      ).join('');
      tooltip.innerHTML = `<div class="tooltip-title">${state} — ${total} sites</div>${rows}`;
    }
  } else {
    tooltip.innerHTML = `<div class="tooltip-title">${state}</div><div style="color:var(--text-soft);font-size:12px;">See vendor breakdown →</div>`;
  }
  
  tooltip.classList.add('visible');
  moveTooltip(e);
}

function moveTooltip(e) {
  const tooltip = document.getElementById('tooltip');
  tooltip.style.left = (e.clientX + 15) + 'px';
  tooltip.style.top = (e.clientY + 15) + 'px';
}

function hideTooltip() {
  document.getElementById('tooltip').classList.remove('visible');
}

function renderUI() {
  if (activeMode === 'scout') renderScoutUI();
  else renderSurveyUI();
}

function renderScoutUI() {
  if (!scoutData) return;
  const vt = scoutData.vendor_totals;
  const st = scoutData.state_totals;
  const total = Object.values(vt).reduce((a, b) => a + b, 0);
  const states = Object.keys(st).length;
  const vendors = Object.keys(vt).length;

  document.getElementById('statsRow').innerHTML = `
    <div class="stat-card"><div class="stat-value" style="color:var(--cyan)">${total}</div><div class="stat-label">Total Sites</div></div>
    <div class="stat-card"><div class="stat-value" style="color:var(--green)">${states}</div><div class="stat-label">States</div></div>
    <div class="stat-card"><div class="stat-value" style="color:var(--purple)">${vendors}</div><div class="stat-label">Vendors</div></div>
    <div class="stat-card"><div class="stat-value" style="color:var(--amber)">${Math.round(total/vendors)}</div><div class="stat-label">Avg/Vendor</div></div>
    <div class="stat-card"><div class="stat-value" style="color:var(--pink)">${Math.round(total/3)}</div><div class="stat-label">Sites/Week</div></div>`;

  document.getElementById('vendorLegend').innerHTML = Object.entries(vt).sort((a,b) => b[1]-a[1]).map(([v,c]) => `
    <div class="vendor-item ${activeFilter===v?'active':''}" data-filter="${v}" style="--vendor-color:${VENDOR_HEX[v]}">
      <div class="vendor-dot"></div>
      <div class="vendor-info"><div class="vendor-name-label">${v}</div><div class="vendor-sub">${Math.round(c/total*100)}% of total</div></div>
      <div class="vendor-count">${c}</div>
    </div>`).join('');

  document.getElementById('velocityGrid').innerHTML = Object.entries(vt).sort((a,b) => b[1]-a[1]).slice(0,4).map(([v,c]) => `
    <div class="velocity-card"><div class="velocity-value" style="color:${VENDOR_HEX[v]}">${Math.round(c/3)}</div><div class="velocity-label">${v}/wk</div></div>`).join('');

  const stateArr = Object.entries(st).map(([s,v]) => ({s, total: Object.values(v).reduce((a,b)=>a+b,0), top: Object.entries(v).sort((a,b)=>b[1]-a[1])[0]})).sort((a,b) => b.total-a.total).slice(0,10);
  const max = stateArr[0]?.total || 1;
  document.getElementById('regionList').innerHTML = stateArr.map(({s,total,top}) => `
    <div class="region-item"><span class="region-name">${s}</span><div class="region-bar"><div class="region-bar-fill" style="width:${Math.round(total/max*100)}%;background:${VENDOR_HEX[top[0]]}"></div></div><span class="region-count" style="color:${VENDOR_HEX[top[0]]}">${total}</span></div>`).join('');

  bindLegend();
}

function renderSurveyUI() {
  if (!surveyData?.summary) return;
  const s = surveyData.summary;
  const vb = s.vendor_breakdown;
  
  const totalSites = s.total_sites;
  const complete = s.surveys_complete;
  const pending = s.surveys_required - s.surveys_complete;
  const noSurvey = totalSites - s.surveys_required;
  const rate = s.surveys_required > 0 ? Math.round((complete / s.surveys_required) * 100) : 0;

  document.getElementById('statsRow').innerHTML = `
    <div class="stat-card"><div class="stat-value" style="color:var(--cyan)">${totalSites}</div><div class="stat-label">Total Sites</div><div class="stat-sub">${s.surveys_required} need survey</div></div>
    <div class="stat-card"><div class="stat-value" style="color:var(--green)">${complete}</div><div class="stat-label">Completed</div><div class="stat-sub">${rate}% of required</div></div>
    <div class="stat-card"><div class="stat-value" style="color:var(--amber)">${pending}</div><div class="stat-label">Pending</div><div class="stat-sub">awaiting survey</div></div>
    <div class="stat-card"><div class="stat-value" style="color:var(--text-soft)">${noSurvey}</div><div class="stat-label">No Survey Req</div><div class="stat-sub">full upgrades</div></div>
    <div class="stat-card"><div class="stat-value" style="color:${rate >= 50 ? 'var(--green)' : 'var(--amber)'}">${rate}%</div><div class="stat-label">Complete Rate</div></div>`;

  // Status legend
  document.getElementById('vendorLegend').innerHTML = `
    <div class="vendor-item ${activeFilter==='Complete'?'active':''}" data-filter="Complete" style="--vendor-color:${SURVEY_HEX['Complete']}">
      <div class="vendor-dot"></div>
      <div class="vendor-info"><div class="vendor-name-label">Complete</div><div class="vendor-sub">${Math.round(complete/(complete+pending)*100)}% of surveys</div></div>
      <div class="vendor-count">${complete}</div>
    </div>
    <div class="vendor-item ${activeFilter==='Pending'?'active':''}" data-filter="Pending" style="--vendor-color:${SURVEY_HEX['Pending']}">
      <div class="vendor-dot"></div>
      <div class="vendor-info"><div class="vendor-name-label">Pending</div><div class="vendor-sub">${Math.round(pending/(complete+pending)*100)}% of surveys</div></div>
      <div class="vendor-count">${pending}</div>
    </div>
    <div class="vendor-item ${activeFilter==='No Survey'?'active':''}" data-filter="No Survey" style="--vendor-color:${SURVEY_HEX['No Survey']}">
      <div class="vendor-dot"></div>
      <div class="vendor-info"><div class="vendor-name-label">No Survey Req</div><div class="vendor-sub">full upgrades</div></div>
      <div class="vendor-count">${noSurvey}</div>
    </div>`;

  // Vendor completion rates
  const vendorRates = Object.entries(vb).filter(([v]) => v !== 'unassigned').map(([v, d]) => ({
    v, rate: d.survey_required > 0 ? Math.round((d.complete / d.survey_required) * 100) : 0, complete: d.complete, total: d.total
  })).sort((a, b) => b.total - a.total);

  document.getElementById('velocityGrid').innerHTML = vendorRates.slice(0,4).map(({v, rate, complete}) => `
    <div class="velocity-card">
      <div class="velocity-value" style="color:${rate >= 15 ? 'var(--green)' : rate >= 5 ? 'var(--amber)' : 'var(--red)'}">${rate}%</div>
      <div class="velocity-label">${v} (${complete})</div>
    </div>`).join('');

  // Vendor breakdown list
  document.getElementById('regionList').innerHTML = vendorRates.map(({v, rate, complete, total}) => {
    const color = rate >= 15 ? 'var(--green)' : rate >= 5 ? 'var(--amber)' : 'var(--red)';
    return `<div class="region-item"><span class="region-name">${v}</span><div class="region-bar"><div class="region-bar-fill" style="width:${rate}%;background:${color}"></div></div><span class="region-count" style="color:${color}">${complete}/${total}</span></div>`;
  }).join('');

  bindLegend();
}

function bindLegend() {
  document.querySelectorAll('.vendor-item').forEach(el => {
    el.onclick = () => { 
      activeFilter = activeFilter === el.dataset.filter ? null : el.dataset.filter; 
      renderMap();
      renderUI(); 
    };
  });
}

document.getElementById('resetBtn').onclick = () => { activeFilter = null; renderMap(); renderUI(); };
loadData();
</script>
</body>
