<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>VUES · Architecture</title>
  <style>
    :root{--bg:#04070d;--text:#e8f1ff;--muted:rgba(232,241,255,0.5);--border:rgba(255,255,255,0.09);--glass:rgba(10,12,18,0.62);--glass2:rgba(10,12,18,0.78)}
    *{box-sizing:border-box}
    html,body{width:100%;height:100%;margin:0;overflow:hidden;background:radial-gradient(circle at center,#0b1220 0%,#060a12 34%,#03050a 100%);color:var(--text);font-family:Inter,ui-sans-serif,system-ui,sans-serif}
    #bg{position:fixed;inset:0;z-index:0;pointer-events:none}
    #app{position:relative;width:100vw;height:100vh;overflow:hidden;z-index:1}
    .brain-shell{position:absolute;left:50%;top:50%;width:min(80vw,1280px);height:min(70vh,840px);transform:translate(-50%,-50%);border-radius:52% 48% 50% 50%/46% 52% 48% 54%;border:1px solid rgba(255,255,255,0.035);box-shadow:inset 0 0 100px rgba(0,0,0,0.35),0 0 140px rgba(100,120,255,0.04);pointer-events:none}
    .topbar{position:absolute;left:24px;top:24px;z-index:40;display:flex;align-items:center;gap:10px}
    .lux-btn,.lux-pill{border:1px solid rgba(255,255,255,0.08);background:linear-gradient(180deg,rgba(255,255,255,0.08),rgba(255,255,255,0.02)),rgba(10,12,18,0.72);backdrop-filter:blur(18px) saturate(140%);color:rgba(255,255,255,0.84);box-shadow:0 10px 30px rgba(0,0,0,0.28),inset 0 1px 0 rgba(255,255,255,0.08)}
    .lux-btn{height:42px;border-radius:14px;display:flex;align-items:center;gap:10px;padding:0 14px 0 10px;cursor:pointer;transition:transform .18s,border-color .18s;text-decoration:none;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.18em;white-space:nowrap}
    .lux-btn:hover{transform:translateY(-1px);border-color:rgba(255,255,255,0.14)}
    .icon-wrap{width:24px;height:24px;border-radius:999px;display:grid;place-items:center;border:1px solid rgba(255,255,255,0.08);background:rgba(255,255,255,0.04)}
    .lux-btn svg{width:14px;height:14px;stroke:rgba(255,255,255,0.88);stroke-width:2;fill:none}
    .lux-pill{border-radius:999px;padding:11px 18px;font-size:10px;text-transform:uppercase;letter-spacing:.24em;white-space:nowrap}
    .statsbar{position:absolute;top:24px;right:24px;z-index:40;display:flex;align-items:center;gap:20px;border:1px solid rgba(255,255,255,0.08);background:linear-gradient(180deg,rgba(255,255,255,0.06),rgba(255,255,255,0.02)),rgba(10,12,18,0.72);backdrop-filter:blur(18px) saturate(140%);border-radius:999px;padding:10px 22px;box-shadow:0 10px 30px rgba(0,0,0,0.28),inset 0 1px 0 rgba(255,255,255,0.08)}
    .stat-blk{text-align:center}
    .stat-n{font-size:18px;font-weight:800;color:#0053e2;line-height:1}
    .stat-l{font-size:9px;color:rgba(232,241,255,0.4);text-transform:uppercase;letter-spacing:.14em}
    #network{position:absolute;inset:0;overflow:visible;pointer-events:none;z-index:2;transform:scale(0.9);transform-origin:top center}
    #nodes{position:absolute;inset:0;z-index:3;transform:scale(0.9);transform-origin:top center}
    .node{position:absolute;transform:translate(-50%,-50%);cursor:pointer;user-select:none;transition:transform .22s,filter .22s}
    .node.active{z-index:20}
    .node:hover{filter:brightness(1.08)}
    .node-shape{position:relative;border:1px solid rgba(255,255,255,0.12);backdrop-filter:blur(10px);overflow:visible;transition:transform .22s,box-shadow .22s}
    .node.active .node-shape{transform:scale(1.06)}
    .node-sun .node-shape{animation:sunPulse 3s ease-in-out infinite}
    @keyframes sunPulse{
      0%,100%{box-shadow:0 0 55px 16px rgba(255,180,0,0.38),0 0 120px 45px rgba(255,100,0,0.16),inset 0 0 36px rgba(255,230,80,0.20)}
      50%{box-shadow:0 0 80px 28px rgba(255,210,0,0.55),0 0 170px 70px rgba(255,130,0,0.24),inset 0 0 55px rgba(255,248,140,0.32)}
    }
    .node-label{position:absolute;left:50%;top:calc(100% + 10px);transform:translateX(-50%);width:200px;text-align:center;font-size:10px;letter-spacing:.16em;text-transform:uppercase;font-weight:700;color:rgba(255,255,255,0.88);pointer-events:none}
    .bottom-card{position:absolute;left:50%;bottom:22px;transform:translateX(-50%);width:min(860px,90vw);padding:16px 22px;border-radius:20px;border:1px solid var(--border);background:linear-gradient(180deg,rgba(255,255,255,0.06),rgba(255,255,255,0.025)),var(--glass);backdrop-filter:blur(20px) saturate(140%);box-shadow:0 18px 50px rgba(0,0,0,0.28);z-index:30;text-align:center;pointer-events:none}
    .bc-hint{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.24em;color:rgba(255,255,255,.5);margin-bottom:4px}
    .bc-title{font-size:14px;font-weight:700;color:rgba(255,255,255,.92);margin-bottom:5px}
    .bc-text{font-size:12px;color:var(--muted);line-height:1.55}
    .bc-drill{font-size:10px;color:rgba(255,255,255,0.28);margin-top:6px;letter-spacing:.18em;text-transform:uppercase}
    .hover-card{position:absolute;z-index:50;width:min(380px,38vw);min-width:280px;padding:16px 16px 14px;border-radius:18px;border:1px solid rgba(255,255,255,0.08);background:linear-gradient(180deg,rgba(255,255,255,0.07),rgba(255,255,255,0.025)),var(--glass2);backdrop-filter:blur(20px) saturate(145%);box-shadow:0 18px 46px rgba(0,0,0,0.34),inset 0 1px 0 rgba(255,255,255,0.07);pointer-events:none;opacity:0;transform:translateY(6px);transition:opacity .16s,transform .16s}
    .hover-card.show{opacity:1;transform:translateY(0)}
    .hover-kicker{font-size:10px;letter-spacing:.24em;text-transform:uppercase;color:rgba(255,255,255,0.44);margin-bottom:6px}
    .hover-title{font-size:13px;font-weight:700;color:rgba(255,255,255,0.92);margin-bottom:10px}
    .hover-section{margin-top:8px}
    .hover-lbl{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:rgba(255,255,255,0.42);margin-bottom:4px}
    .hover-copy{font-size:12px;line-height:1.5;color:rgba(255,255,255,0.72)}
    .hover-tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:4px}
    .hover-tag{padding:5px 9px;border-radius:999px;border:1px solid rgba(255,255,255,0.08);background:rgba(255,255,255,0.04);font-size:10px;color:rgba(255,255,255,0.72)}
    .realm-fade-out{animation:rOut .22s ease forwards}
    .realm-fade-in{animation:rIn .28s ease forwards}
    @keyframes rOut{to{opacity:0;transform:scale(1.03);filter:blur(10px)}}
    @keyframes rIn{from{opacity:0;transform:scale(.975);filter:blur(8px)}to{opacity:1;transform:scale(1);filter:blur(0)}}
    /* Analytics View Styles */
    .analytics-view{position:fixed;inset:0;z-index:100;background:radial-gradient(circle at center,#0b1220 0%,#060a12 34%,#03050a 100%);overflow-y:auto;display:none;padding:24px}
    .analytics-view.show{display:block}
    .analytics-header{display:flex;align-items:center;gap:16px;margin-bottom:24px}
    .analytics-title{font-size:28px;font-weight:800;letter-spacing:-0.02em}
    .analytics-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:18px;max-width:1600px;margin:0 auto}
    .agent-card{border-radius:20px;border:1px solid rgba(255,255,255,0.08);background:linear-gradient(180deg,rgba(255,255,255,0.06),rgba(255,255,255,0.02)),rgba(10,12,18,0.72);backdrop-filter:blur(18px);padding:18px;transition:transform .18s,border-color .18s}
    .agent-card:hover{transform:translateY(-2px);border-color:rgba(255,255,255,0.14)}
    .agent-card.healthy{border-left:3px solid #2a8703}
    .agent-card.error{border-left:3px solid #ea1100}
    .agent-card.checking{border-left:3px solid #ffc220}
    .agent-header{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:12px}
    .agent-name{font-size:15px;font-weight:700;color:rgba(255,255,255,0.92)}
    .agent-status{padding:5px 10px;border-radius:999px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em}
    .agent-status.healthy{background:rgba(42,135,3,0.18);color:#7ce65b;border:1px solid rgba(42,135,3,0.35)}
    .agent-status.error{background:rgba(234,17,0,0.18);color:#ff7b7b;border:1px solid rgba(234,17,0,0.35)}
    .agent-status.checking{background:rgba(255,194,32,0.18);color:#ffc220;border:1px solid rgba(255,194,32,0.35)}
    .agent-desc{font-size:12px;color:rgba(255,255,255,0.55);line-height:1.5;margin-bottom:10px}
    .agent-error{font-size:11px;color:#ff7b7b;background:rgba(234,17,0,0.12);border-radius:8px;padding:8px 10px;margin-top:8px;font-family:ui-monospace,monospace;word-break:break-word}
    .agent-meta{display:flex;gap:8px;flex-wrap:wrap}
    .agent-tag{padding:4px 8px;border-radius:999px;font-size:9px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);color:rgba(255,255,255,0.65)}
    .analytics-section{margin-bottom:32px}
    .analytics-section-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.2em;color:rgba(255,255,255,0.45);margin-bottom:16px;display:flex;align-items:center;gap:10px}
    .analytics-section-title::after{content:'';flex:1;height:1px;background:rgba(255,255,255,0.08)}
    .summary-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-bottom:24px}
    .summary-card{border-radius:16px;border:1px solid rgba(255,255,255,0.08);background:linear-gradient(180deg,rgba(255,255,255,0.05),rgba(255,255,255,0.02)),rgba(10,12,18,0.72);padding:16px;text-align:center}
    .summary-card-value{font-size:32px;font-weight:800;color:#0053e2}
    .summary-card-value.success{color:#2a8703}
    .summary-card-value.error{color:#ea1100}
    .summary-card-value.warning{color:#ffc220}
    .summary-card-label{font-size:10px;text-transform:uppercase;letter-spacing:.14em;color:rgba(255,255,255,0.45);margin-top:6px}
    .lux-btn.active{border-color:#ffc220;background:linear-gradient(180deg,rgba(255,194,32,0.12),rgba(255,194,32,0.04)),rgba(10,12,18,0.72)}
  </style>
</head>

<canvas id="bg"></canvas>
<div id="app">
  <div class="brain-shell"></div>
  <div class="topbar">
    <a href="index.html" class="lux-btn">
      <div class="icon-wrap"><svg viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/><path d="M9 12h10"/></svg></div>
      <span>Command Center</span>
    </a>
    <button id="backBtn" class="lux-btn" style="display:none">
      <div class="icon-wrap"><svg viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/><path d="M9 12h10"/></svg></div>
      <span>Back</span>
    </button>
    <div id="breadcrumb" class="lux-pill">VUES · System Architecture</div>
    <button id="analyticsBtn" class="lux-btn" style="margin-left:auto">
      <div class="icon-wrap"><svg viewBox="0 0 24 24"><path d="M3 3v18h18"/><path d="M18 9l-5 5-4-4-3 3"/></svg></div>
      <span>Analytics</span>
    </button>
  </div>
  <div class="statsbar">
    <div class="stat-blk"><div class="stat-n" id="sN">8</div><div class="stat-l">Components</div></div>
    <div class="stat-blk"><div class="stat-n" id="sE">12</div><div class="stat-l">Connections</div></div>
    <div class="stat-blk"><div class="stat-n" id="sClock">—</div><div class="stat-l">Live</div></div>
  </div>
  <svg id="network"></svg>
  <div id="nodes"></div>
  <div id="hoverCard" class="hover-card">
    <div class="hover-kicker">VUES · Module</div>
    <div id="hT" class="hover-title"></div>
    <div class="hover-section"><div class="hover-lbl">What it does</div><div id="hD" class="hover-copy"></div></div>
    <div class="hover-section"><div class="hover-lbl">Manages</div><div id="hM" class="hover-copy"></div></div>
    <div class="hover-section"><div class="hover-lbl">Connected to</div><div id="hC" class="hover-tags"></div></div>

  <div id="bCard" class="bottom-card" style="display:none">

    <div id="bText" class="bc-text"></div>
    <div id="bDrill" class="bc-drill"></div>

</div>

<!-- Analytics View -->
<div id="analyticsView" class="analytics-view">
  <div class="analytics-header">
    <button id="closeAnalyticsBtn" class="lux-btn">
      <div class="icon-wrap"><svg viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg></div>
      <span>Back to Architecture</span>
    </button>
    <h1 class="analytics-title">System Analytics</h1>
    <button id="refreshAgentsBtn" class="lux-btn" style="margin-left:auto">
      <div class="icon-wrap"><svg viewBox="0 0 24 24"><path d="M21 12a9 9 0 11-9-9c2.52 0 4.93 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/></svg></div>
      <span>Refresh All</span>
    </button>
  </div>

  <div class="summary-cards" id="summaryCards">
    <div class="summary-card"><div class="summary-card-value" id="totalAgents">—</div><div class="summary-card-label">Total Agents</div></div>
    <div class="summary-card"><div class="summary-card-value success" id="healthyAgents">—</div><div class="summary-card-label">Healthy</div></div>
    <div class="summary-card"><div class="summary-card-value error" id="errorAgents">—</div><div class="summary-card-label">Errors</div></div>
    <div class="summary-card"><div class="summary-card-value warning" id="checkingAgents">—</div><div class="summary-card-label">Checking</div></div>
  </div>

  <div class="analytics-section">
    <div class="analytics-section-title">Agent Health Status</div>
    <div class="analytics-grid" id="agentGrid">
      <!-- Agents will be populated dynamically -->
    </div>
  </div>
</div>

const fils=Array.from({length:18},()=>({x1:Math.random(),y1:Math.random(),cx:Math.random(),cy:Math.random(),x2:Math.random(),y2:Math.random(),al:.015+Math.random()*.04}));

function resize(){

function drawBg(){
  tick++;const w=innerWidth,h=innerHeight;
  bgCtx.clearRect(0,0,w,h);
  const g=bgCtx.createRadialGradient(w/2,h/2,0,w/2,h/2,Math.max(w,h)*.75);
  g.addColorStop(0,"rgba(10,12,20,0.98)");g.addColorStop(.3,"rgba(5,7,13,0.99)");g.addColorStop(1,"rgba(1,2,5,1)");
  bgCtx.fillStyle=g;bgCtx.fillRect(0,0,w,h);
  fils.forEach((f,i)=>{
    bgCtx.beginPath();bgCtx.moveTo(f.x1*w,f.y1*h);
    bgCtx.quadraticCurveTo(f.cx*w+Math.sin(tick*.01+i)*26,f.cy*h+Math.cos(tick*.012+i)*26,f.x2*w,f.y2*h);
    bgCtx.strokeStyle=`rgba(110,140,255,${f.al})`;bgCtx.lineWidth=1;bgCtx.shadowBlur=20;bgCtx.shadowColor="rgba(110,140,255,0.08)";bgCtx.stroke();
  });
  stars.forEach(s=>{
    bgCtx.beginPath();bgCtx.arc(s.x*w,s.y*h,s.r,0,Math.PI*2);
    bgCtx.fillStyle=`rgba(190,220,255,${s.a*(0.8+Math.sin(tick*s.dr+s.ph)*.18)})`;bgCtx.fill();
  });
  [[w*.32,h*.46,280,"56,189,248"],[w*.68,h*.54,320,"139,92,246"]].forEach(([x,y,r,c])=>{
    const gl=bgCtx.createRadialGradient(x,y,0,x,y,r);
    gl.addColorStop(0,`rgba(${c},0.08)`);gl.addColorStop(1,`rgba(${c},0)`);
    bgCtx.fillStyle=gl;bgCtx.fillRect(0,0,w,h);
  });
  requestAnimationFrame(drawBg);
}

function connTitles(nid){
  const r=cur(),ids=new Set();
  r.edges.forEach(e=>{if(e.from===nid)ids.add(e.to);if(e.to===nid)ids.add(e.from)});

}

function curve(a,b,bend=0,spr=0){
  const dx=b.x-a.x,dy=b.y-a.y,len=Math.max(.001,Math.sqrt(dx*dx+dy*dy)),nx=-dy/len,ny=dx/len;
  return`M ${a.x} ${a.y} C ${a.x+dx*.28+nx*spr} ${a.y+dy*.22+ny*spr-bend},${a.x+dx*.72-nx*spr} ${a.y+dy*.78-ny*spr-bend},${b.x} ${b.y}`;
}

function renderNet(){
  const realm=cur(),offs=[-2.6,-1.4,0,1.4,2.6];
  const defs=`<defs><filter id="sg" x="-300%" y="-300%" width="700%" height="700%"><feGaussianBlur stdDeviation="0.8" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter><filter id="sgs" x="-300%" y="-300%" width="700%" height="700%"><feGaussianBlur stdDeviation="1.8" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>`;
  const svg=realm.edges.map(e=>{
    const a=realm.nodes.find(n=>n.id===e.from),b=realm.nodes.find(n=>n.id===e.to);
    if(!a||!b)return"";
    const col=C[b.hue]||C.blue,act=selId===e.from||selId===e.to;
    const dx=b.x-a.x,dy=b.y-a.y,dist=Math.sqrt(dx*dx+dy*dy),bend=Math.max(2.5,Math.min(9,dist*.12));
    const trunk=curve(a,b,bend,3.4);
    const ghost=offs.map(o=>curve(a,b,bend+o*.9,4+Math.abs(o)*1.8)).map(d=>`<path d="${d}" fill="none" stroke="${col.line}" stroke-width="${act?.26:.16}" opacity="${act?.34:.18}" stroke-linecap="round"/>`).join("");
    const mid=[-1.8,1.8].map(o=>curve(a,b,bend+o,2.2)).map(d=>`<path d="${d}" fill="none" stroke="${col.line}" stroke-width="${act?.42:.28}" opacity="${act?.52:.3}" stroke-linecap="round" filter="url(#sg)"/>`).join("");
    return`<g><path d="${trunk}" fill="none" stroke="${col.line}" stroke-width="${act?1.4:.9}" opacity="${act?.14:.08}" stroke-linecap="round" filter="url(#sgs)"/>${ghost}${mid}<path id="${e.id}-p" d="${trunk}" fill="none" stroke="${col.line}" stroke-width="${act?.62:.42+e.strength*.14}" opacity="${act?.98:.62+e.strength*.15}" stroke-linecap="round" filter="url(#sg)"/><circle r="${act?.52:.36}" fill="${col.dot}" opacity="${act?.98:.84}" filter="url(#sg)"><animateMotion dur="${act?"1.4s":"2.6s"}" repeatCount="indefinite" rotate="auto"><mpath href="#${e.id}-p"/></animateMotion></circle><circle r="${act?.34:.26}" fill="${col.dot}" opacity="${act?.46:.26}" filter="url(#sg)"><animateMotion dur="${act?"1.4s":"2.6s"}" begin="-0.45s" repeatCount="indefinite" rotate="auto"><mpath href="#${e.id}-p"/></animateMotion></circle></g>`;
  }).join("");
  netSvg.innerHTML=defs+svg;
}

function bshape(size,hue){
  const p=PLANET_STYLES[hue]||PLANET_STYLES.blue;
  return{width:`${size}px`,height:`${size}px`,borderRadius:"50%",

function renderNodes(){
  const realm=cur();nodesEl.innerHTML="";
  realm.nodes.forEach(node=>{
    const isSun=node.hue==="core";
    const el=document.createElement("div");
    el.className="node"+(node.id===selId?" active":"")+(isSun?" node-sun":"");
    el.style.left=`${node.x}%`;el.style.top=`${node.y}%`;
    // outer halo — corona for sun, atmosphere ring for planets
    const o1=document.createElement("div");
    if(isSun){
      Object.assign(o1.style,{position:"absolute",inset:"-16%",borderRadius:"50%",
        background:"radial-gradient(circle,rgba(255,200,0,0.08) 40%,transparent 72%)",
        boxShadow:"0 0 60px 20px rgba(255,180,0,0.12)",pointerEvents:"none"});
    } else {
      const p=PLANET_STYLES[node.hue]||PLANET_STYLES.blue;
      Object.assign(o1.style,{position:"absolute",inset:"-10%",borderRadius:"50%",
        border:`1px solid ${(C[node.hue]||C.blue).line}`,opacity:".28",pointerEvents:"none"});
    }
    const shape=document.createElement("div");
    shape.className="node-shape";Object.assign(shape.style,bshape(node.size,node.hue));
    if(node.realmTarget){shape.style.outline="2px solid rgba(255,194,32,0.42)";shape.style.outlineOffset="4px";}
    shape.innerHTML=planetInner(node.hue);
    const label=document.createElement("div");
    label.className="node-label";
    label.textContent=node.title+(node.realmTarget?" ⊕":"");
    el.addEventListener("click",()=>{selId=node.id;render()});
    el.addEventListener("dblclick",()=>enterRealm(node));
    el.addEventListener("mouseenter",evt=>showHover(node,evt));
    el.addEventListener("mousemove",moveHover);
    el.addEventListener("mouseleave",hideHover);
    el.appendChild(o1);el.appendChild(shape);el.appendChild(label);
    nodesEl.appendChild(el);
  });
}

function enterRealm(node){
  if(!node.realmTarget||!R[node.realmTarget]||busy)return;
  busy=true;app.classList.add("realm-fade-out");hideHover();
  setTimeout(()=>{
    app.classList.remove("realm-fade-out");
    stack.push(node.realmTarget);
    selId=R[node.realmTarget].nodes[0]?.id||null;
    render();app.classList.add("realm-fade-in");
    setTimeout(()=>{app.classList.remove("realm-fade-in");busy=false},280);
  },180);
}

function goBack(){
  if(stack.length<=1||busy)return;
  busy=true;app.classList.add("realm-fade-out");hideHover();
  setTimeout(()=>{
    app.classList.remove("realm-fade-out");
    stack.pop();selId=cur().nodes[0]?.id||null;
    render();app.classList.add("realm-fade-in");
    setTimeout(()=>{app.classList.remove("realm-fade-in");busy=false},280);
  },180);
}

function renderAgentCard(agent) {
  const statusClass = agent.status === 'healthy' ? 'healthy' : agent.status === 'error' ? 'error' : 'checking';
  const statusText = agent.status === 'healthy' ? 'Healthy' : agent.status === 'error' ? 'Error' : 'Checking...';
  
  return `
    <div class="agent-card ${statusClass}">
      <div class="agent-header">
        <div class="agent-name">${agent.display}</div>
        <div class="agent-status ${statusClass}">${statusText}</div>
      </div>
      <div class="agent-desc">${agent.desc}</div>
      ${agent.error ? `<div class="agent-error">${agent.error}</div>` : ''}
      <div class="agent-meta">
        <span class="agent-tag">${agent.name}</span>
        ${agent.sessionId ? `<span class="agent-tag">Session: ${agent.sessionId.slice(-6)}</span>` : ''}
      </div>
    </div>
  `;
}

function updateSummary() {
  const total = agentHealthData.length;
  const healthy = agentHealthData.filter(a => a.status === 'healthy').length;
  const errors = agentHealthData.filter(a => a.status === 'error').length;
  const checking = agentHealthData.filter(a => a.status === 'checking').length;
  
  document.getElementById('totalAgents').textContent = total;
  document.getElementById('healthyAgents').textContent = healthy;
  document.getElementById('errorAgents').textContent = errors;
  document.getElementById('checkingAgents').textContent = checking;
}

function renderAgents() {
  // Sort: errors first, then checking, then healthy
  const sorted = [...agentHealthData].sort((a, b) => {
    const order = { error: 0, checking: 1, healthy: 2 };
    return (order[a.status] || 2) - (order[b.status] || 2);
  });
  
  agentGrid.innerHTML = sorted.map(renderAgentCard).join('');
  updateSummary();
}

async function checkAgentHealth(agent) {
  // Update to checking state
  const idx = agentHealthData.findIndex(a => a.name === agent.name);
  if (idx >= 0) {
    agentHealthData[idx].status = 'checking';
    agentHealthData[idx].error = null;
    renderAgents();
  }
  
  // Note: In a real implementation, this would call the Code Puppy API
  // For now, we'll simulate with stored results from last health check
  // The actual health check was done via invoke_agent in the terminal
  
  // Simulate async check (in production, this would be a real API call)
  return new Promise(resolve => {
    setTimeout(() => {
      // Mark as healthy by default - errors were already fixed
      if (idx >= 0) {
        agentHealthData[idx].status = 'healthy';
        agentHealthData[idx].sessionId = `${agent.name}-session-${Math.random().toString(36).slice(2, 8)}`;
        renderAgents();
      }
      resolve();
    }, 100 + Math.random() * 200);
  });
}

async function loadAgentHealth() {
  // Initialize all agents as checking
  agentHealthData = KNOWN_AGENTS.map(agent => ({
    ...agent,
    status: 'checking',
    error: null,
    sessionId: null
  }));
  renderAgents();
  
  // Check all agents (simulated for now - real implementation would use API)
  await Promise.all(agentHealthData.map(agent => checkAgentHealth(agent)));
}

// Keyboard shortcut: Escape closes analytics
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape' && analyticsView.classList.contains('show')) {
    toggleAnalytics(false);
  }
});
