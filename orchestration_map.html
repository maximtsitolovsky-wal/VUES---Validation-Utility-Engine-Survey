<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>SiteOwlQA · Architecture</title>
  <style>
    :root{--bg:#04070d;--bg2:#090f18;--text:#e8f1ff;--muted:rgba(232,241,255,0.5);--border:rgba(255,255,255,0.09);--glass:rgba(10,12,18,0.62);--glass-2:rgba(10,12,18,0.78)}
    *{box-sizing:border-box}
    html,body{width:100%;height:100%;margin:0;overflow:hidden;background:radial-gradient(circle at center,#0b1220 0%,#060a12 34%,#03050a 100%);color:var(--text);font-family:Inter,ui-sans-serif,system-ui,-apple-system,"Segoe UI",sans-serif}
    body::before{content:"";position:fixed;inset:0;opacity:.055;pointer-events:none;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");background-size:180px 180px;z-index:0}
    #bg{position:fixed;inset:0;z-index:0;pointer-events:none}
    #app{position:relative;width:100vw;height:100vh;overflow:hidden;z-index:1}
    .brain-shell{position:absolute;left:50%;top:50%;width:min(80vw,1280px);height:min(70vh,840px);transform:translate(-50%,-50%);border-radius:52% 48% 50% 50%/46% 52% 48% 54%;border:1px solid rgba(255,255,255,0.035);box-shadow:inset 0 0 100px rgba(0,0,0,0.35),0 0 140px rgba(100,120,255,0.04);pointer-events:none}
    .brain-shell::before,.brain-shell::after{content:"";position:absolute;inset:8%;border-radius:50%;border:1px solid rgba(255,255,255,0.04);filter:blur(.2px)}
    .brain-shell::after{inset:18%;border-color:rgba(138,160,255,0.06)}
    /* ── topbar ── */
    .topbar{position:absolute;left:24px;top:24px;z-index:40;display:flex;align-items:center;gap:10px}
    .lux-btn,.lux-pill{border:1px solid rgba(255,255,255,0.08);background:linear-gradient(180deg,rgba(255,255,255,0.08),rgba(255,255,255,0.02)),rgba(10,12,18,0.72);backdrop-filter:blur(18px) saturate(140%);color:rgba(255,255,255,0.84);box-shadow:0 10px 30px rgba(0,0,0,0.28),inset 0 1px 0 rgba(255,255,255,0.08)}
    .lux-btn{height:42px;border-radius:14px;display:flex;align-items:center;gap:10px;padding:0 14px 0 10px;cursor:pointer;transition:transform .18s,box-shadow .18s,border-color .18s;text-decoration:none;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.18em;white-space:nowrap}
    .lux-btn:hover{transform:translateY(-1px);border-color:rgba(255,255,255,0.14);box-shadow:0 12px 36px rgba(0,0,0,0.34),inset 0 1px 0 rgba(255,255,255,0.1)}
    .lux-btn .icon-wrap{width:24px;height:24px;border-radius:999px;display:grid;place-items:center;border:1px solid rgba(255,255,255,0.08);background:rgba(255,255,255,0.04)}
    .lux-btn svg{width:14px;height:14px;stroke:rgba(255,255,255,0.88);stroke-width:2;fill:none}
    .lux-pill{border-radius:999px;padding:11px 18px;font-size:10px;text-transform:uppercase;letter-spacing:.24em;white-space:nowrap}
    /* ── stats bar (top right) ── */
    .statsbar{position:absolute;top:24px;right:24px;z-index:40;display:flex;align-items:center;gap:20px;border:1px solid rgba(255,255,255,0.08);background:linear-gradient(180deg,rgba(255,255,255,0.06),rgba(255,255,255,0.02)),rgba(10,12,18,0.72);backdrop-filter:blur(18px) saturate(140%);border-radius:999px;padding:10px 22px;box-shadow:0 10px 30px rgba(0,0,0,0.28),inset 0 1px 0 rgba(255,255,255,0.08)}
    .stat-blk{text-align:center}
    .stat-n{font-size:18px;font-weight:800;color:#0053e2;line-height:1}
    .stat-l{font-size:9px;color:rgba(232,241,255,0.4);text-transform:uppercase;letter-spacing:.14em}
    /* ── SVG network ── */
    #network{position:absolute;inset:0;overflow:visible;pointer-events:none;z-index:2}
    #nodes{position:absolute;inset:0;z-index:3}
    /* ── node styles ── */
    .node{position:absolute;transform:translate(-50%,-50%);cursor:pointer;user-select:none;transition:transform .22s,filter .22s}
    .node.active{z-index:20}
    .node:hover{filter:brightness(1.08)}
    .node-shape{position:relative;border:1px solid rgba(255,255,255,0.1);background:radial-gradient(circle at 42% 36%,rgba(255,255,255,0.18),transparent 16%),radial-gradient(circle at 58% 44%,rgba(120,140,255,0.18),transparent 20%),radial-gradient(circle at 50% 50%,rgba(10,14,24,0.94),rgba(5,7,14,0.98) 72%,rgba(2,3,7,1) 100%);backdrop-filter:blur(10px);overflow:visible;transition:transform .22s,box-shadow .22s}
    .node-shape::before{content:"";position:absolute;inset:-10%;border-radius:inherit;border:1px solid rgba(255,255,255,0.05);opacity:.4}
    .node-shape::after{content:"";position:absolute;inset:-18%;border-radius:inherit;background:radial-gradient(circle,rgba(255,255,255,0.06),transparent 68%);filter:blur(18px);opacity:.24;z-index:-1}
    .node.active .node-shape{transform:scale(1.06);box-shadow:inset 0 0 36px rgba(180,200,255,0.1),0 0 42px rgba(140,160,255,0.16),0 0 80px rgba(100,120,255,0.1)}
    .node-label{position:absolute;left:50%;top:calc(100% + 10px);transform:translateX(-50%);width:210px;text-align:center;font-size:11px;letter-spacing:.22em;text-transform:uppercase;font-weight:700;color:rgba(255,255,255,0.88);text-shadow:0 0 10px rgba(99,207,255,0.12);pointer-events:none}
    /* ── bottom card ── */
    .bottom-card{position:absolute;left:50%;bottom:22px;transform:translateX(-50%);width:min(820px,90vw);padding:18px 22px;border-radius:20px;border:1px solid var(--border);background:linear-gradient(180deg,rgba(255,255,255,0.06),rgba(255,255,255,0.025)),var(--glass);backdrop-filter:blur(20px) saturate(140%);box-shadow:0 18px 50px rgba(0,0,0,0.28);z-index:30;text-align:center;pointer-events:none}
    .bottom-card .bc-hint{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.24em;color:rgba(255,255,255,.5);margin-bottom:6px}
    .bottom-card .bc-title{font-size:13px;font-weight:700;color:rgba(255,255,255,.92);margin-bottom:6px}
    .bottom-card .bc-text{font-size:13px;color:var(--muted);line-height:1.55}
    .bc-drill{font-size:10px;color:rgba(255,255,255,0.3);margin-top:8px;letter-spacing:.18em;text-transform:uppercase}
    /* ── hover card ── */
    .hover-card{position:absolute;z-index:50;width:min(360px,36vw);min-width:280px;padding:16px 16px 14px;border-radius:18px;border:1px solid rgba(255,255,255,0.08);background:linear-gradient(180deg,rgba(255,255,255,0.07),rgba(255,255,255,0.025)),var(--glass-2);backdrop-filter:blur(20px) saturate(145%);box-shadow:0 18px 46px rgba(0,0,0,0.34),inset 0 1px 0 rgba(255,255,255,0.07);pointer-events:none;opacity:0;transform:translateY(6px);transition:opacity .16s,transform .16s}
    .hover-card.show{opacity:1;transform:translateY(0)}
    .hover-kicker{font-size:10px;letter-spacing:.24em;text-transform:uppercase;color:rgba(255,255,255,0.44);margin-bottom:8px}
    .hover-title{font-size:14px;font-weight:700;letter-spacing:.04em;color:rgba(255,255,255,0.92);margin-bottom:12px}
    .hover-section{margin-top:10px}
    .hover-label{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:rgba(255,255,255,0.42);margin-bottom:6px}
    .hover-copy{font-size:13px;line-height:1.5;color:rgba(255,255,255,0.72)}
    .hover-tags{display:flex;flex-wrap:wrap;gap:6px}
    .hover-tag{padding:6px 10px;border-radius:999px;border:1px solid rgba(255,255,255,0.08);background:rgba(255,255,255,0.04);font-size:11px;color:rgba(255,255,255,0.72);white-space:nowrap}
    .realm-fade-out{animation:realmOut .22s ease forwards}
    .realm-fade-in{animation:realmIn .28s ease forwards}
    @keyframes realmOut{to{opacity:0;transform:scale(1.03);filter:blur(10px)}}
    @keyframes realmIn{from{opacity:0;transform:scale(.975);filter:blur(8px)}to{opacity:1;transform:scale(1);filter:blur(0)}}
  </style>
</head>
<body>
  <canvas id="bg"></canvas>
  <div id="app">
    <div class="brain-shell"></div>

    <!-- top-left: nav controls -->
    <div class="topbar">
      <a id="dashLink" href="ui/executive_dashboard.html" class="lux-btn">
        <div class="icon-wrap">
          <svg viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/><path d="M9 12h10"/></svg>
        </div>
        <span>Dashboard</span>
      </a>
      <button id="backBtn" class="lux-btn" style="display:none">
        <div class="icon-wrap">
          <svg viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/><path d="M9 12h10"/></svg>
        </div>
        <span>Back</span>
      </button>
      <div id="breadcrumb" class="lux-pill">SiteOwlQA Pipeline</div>
    </div>

    <!-- top-right: live stats -->
    <div class="statsbar">
      <div class="stat-blk"><div class="stat-n" id="statNodes">7</div><div class="stat-l">Nodes</div></div>
      <div class="stat-blk"><div class="stat-n" id="statEdges">11</div><div class="stat-l">Edges</div></div>
      <div class="stat-blk"><div class="stat-n" id="clock">—</div><div class="stat-l">Live</div></div>
    </div>

    <svg id="network"></svg>
    <div id="nodes"></div>

    <!-- hover tooltip -->
    <div id="hoverCard" class="hover-card">
      <div class="hover-kicker">Module · SiteOwlQA</div>
      <div id="hoverTitle" class="hover-title"></div>
      <div class="hover-section"><div class="hover-label">What it does</div><div id="hoverDoes" class="hover-copy"></div></div>
      <div class="hover-section"><div class="hover-label">What it manages</div><div id="hoverManages" class="hover-copy"></div></div>
      <div class="hover-section"><div class="hover-label">Connected to</div><div id="hoverConnected" class="hover-tags"></div></div>
    </div>

    <!-- bottom info card -->
    <div id="bottomCard" class="bottom-card" style="display:none">
      <div id="bcHint" class="bc-hint">Selected</div>
      <div id="bcTitle" class="bc-title"></div>
      <div id="bcText" class="bc-text"></div>
      <div id="bcDrill" class="bc-drill"></div>
    </div>
  </div>

  <script>
  // ── SiteOwlQA realm data ─────────────────────────────────────────────────
  const realms = {
    root: {
      id:"root", name:"SiteOwlQA Pipeline",
      nodes:[
        {id:"main",   title:"main.py",          x:50,y:48,size:158,hue:"core",
          summary:"Heartbeat. 60s poll loop, never crashes — exceptions caught at record level. Spawns async worker on startup.",
          manages:"Poll loop · record dispatch · async worker · OS signal handling", realmTarget:null},
        {id:"pval",   title:"Validate & Recall", x:18,y:20,size:108,hue:"blue",
          summary:"Checks all required fields before touching files. Simultaneously recalls past lessons from memory.",
          manages:"Field validation · memory recall · ERROR halting", realmTarget:"pval"},
        {id:"pproc",  title:"Process",           x:76,y:18,size:108,hue:"cyan",
          summary:"Downloads attachment, normalises headers, fetches site-scoped SQL reference rows.",
          manages:"File download · header normalisation · reference fetch", realmTarget:"pproc"},
        {id:"pgrade", title:"Grade & Decide",    x:84,y:50,size:108,hue:"violet",
          summary:"Scores 0–100. status_from_score() is the single PASS/FAIL decision — never duplicated.",
          manages:"Grading · threshold · PASS/FAIL branch", realmTarget:"pgrade"},
        {id:"pout",   title:"Output",            x:70,y:78,size:106,hue:"emerald",
          summary:"Emails vendor. PATCHes Airtable. ALL fields always written — no ghost data from prior runs.",
          manages:"Email · Airtable PATCH · status writeback", realmTarget:"pout"},
        {id:"parc",   title:"Archive & Learn",   x:28,y:78,size:108,hue:"amber",
          summary:"Immutable archive of every run. Internal review. Lesson extraction feeds the next cycle.",
          manages:"JSON archive · reviewer audit · lesson extraction · post-pass correction", realmTarget:"parc"},
        {id:"pasync", title:"Async Workers",     x:12,y:50,size:96,hue:"pink",
          summary:"Background thread. Never blocks poll loop. Triggered by mark_dirty() flag.",
          manages:"MetricsRefreshWorker · CSVs · HTML dashboards", realmTarget:"pasync"}
      ],
      edges:[
        {id:"e1",from:"main",to:"pval",   strength:0.88},{id:"e2",from:"main",to:"pproc",  strength:0.88},
        {id:"e3",from:"main",to:"pgrade", strength:0.88},{id:"e4",from:"main",to:"pout",   strength:0.88},
        {id:"e5",from:"main",to:"parc",   strength:0.88},{id:"e6",from:"main",to:"pasync", strength:0.62},
        {id:"e7",from:"pval",to:"pproc",  strength:0.78},{id:"e8",from:"pproc",to:"pgrade",strength:0.78},
        {id:"e9",from:"pgrade",to:"pout", strength:0.78},{id:"e10",from:"pout",to:"parc",  strength:0.78},
        {id:"e11",from:"parc",to:"pval",  strength:0.52}
      ]
    },
    pval:{
      id:"pval", name:"Validate & Recall",
      nodes:[
        {id:"pollorch",title:"poll_airtable.py", x:50,y:44,size:132,hue:"core",
          summary:"15-step per-record orchestrator. Every exception caught at record level — one bad submission never crashes the pipeline.",
          manages:"15-step flow · exception boundaries · per-record state"},
        {id:"memorymod",title:"memory.py",       x:22,y:28,size:106,hue:"amber",
          summary:"Tag+keyword lesson retrieval. Surfaces vendor/site risk patterns before grading. Makes each run smarter than the last.",
          manages:"Lesson recall · tag ranking · context injection"},
        {id:"fieldchk",title:"Field Validation", x:78,y:28,size:104,hue:"blue",
          summary:"Checks Site Number, Site Name, attachments, vendor info. A single missing field → ERROR, processing halted immediately.",
          manages:"Required fields · early exit · ERROR status"},
        {id:"airtfetch",title:"Airtable Fetch",  x:50,y:76,size:102,hue:"cyan",
          summary:"Polls for QUEUED records every 60s via airtable_client.py. RISK-003: CDN URL expiry is tracked and mitigated.",
          manages:"Record polling · attachment URL retrieval"}
      ],
      edges:[
        {id:"v1",from:"pollorch",to:"memorymod",strength:0.76},
        {id:"v2",from:"pollorch",to:"fieldchk", strength:0.82},
        {id:"v3",from:"pollorch",to:"airtfetch",strength:0.72},
        {id:"v4",from:"memorymod",to:"fieldchk",strength:0.44}
      ]
    },
    pproc:{
      id:"pproc", name:"Process",
      nodes:[
        {id:"dlmod", title:"airtable_client.py", x:22,y:36,size:106,hue:"blue",
          summary:"Downloads XLSX/CSV to temp/. RISK-003 mitigated: OneDrive mirror backs up attachments by Site ID.",
          manages:"HTTP download · file storage · RISK-003 mitigation"},
        {id:"fpmod", title:"file_processor.py",  x:78,y:36,size:106,hue:"cyan",
          summary:"Normalises all headers to lowercase_underscored. ProjectID always overwritten from Airtable Site Number — vendor-supplied IDs never trusted.",
          manages:"Header normalisation · ProjectID authority · pandas transform"},
        {id:"sqlmod2",title:"sql.py",            x:50,y:74,size:106,hue:"violet",
          summary:"Pulls site-scoped reference rows from SQL Server. Read-only. Owns ALL database interactions — nothing else touches the DB.",
          manages:"SQL connection · site-scoped queries · reference data"}
      ],
      edges:[
        {id:"p1",from:"dlmod",to:"fpmod",  strength:0.82},
        {id:"p2",from:"fpmod",to:"sqlmod2",strength:0.74},
        {id:"p3",from:"dlmod",to:"sqlmod2",strength:0.42}
      ]
    },
    pgrade:{
      id:"pgrade", name:"Grade & Decide",
      nodes:[
        {id:"grader",  title:"python_grader.py",x:50,y:42,size:132,hue:"core",
          summary:"Canonical header comparison + column fingerprinting. Weighted score 0–100. Memory recall context shapes the summary narrative.",
          manages:"Score calc · header matching · pass/fail threshold · status_from_score()"},
        {id:"passnode",title:"PASS Branch",     x:24,y:76,size:104,hue:"emerald",
          summary:"score ≥ threshold. Routes → Output → Archive. At score ≥ 95 also triggers post_pass_correction sub-pipeline.",
          manages:"PASS routing · high-score trigger · correction handoff"},
        {id:"failnode",title:"FAIL Branch",     x:76,y:76,size:104,hue:"pink",
          summary:"score < threshold. Routes → Output (FAIL email with specific feedback) → Archive where lesson is extracted.",
          manages:"FAIL routing · vendor feedback · lesson trigger"}
      ],
      edges:[
        {id:"g1",from:"grader",to:"passnode",strength:0.78},
        {id:"g2",from:"grader",to:"failnode",strength:0.78}
      ]
    },
    pout:{
      id:"pout", name:"Output",
      nodes:[
        {id:"emailermod",title:"emailer.py",    x:32,y:46,size:112,hue:"emerald",
          summary:"PASS/FAIL/ERROR email templates with score, summary, and corrective guidance. Bypassed when SMTP_ENABLED=false — Airtable automation handles vendor email instead.",
          manages:"Email composition · SMTP delivery · template selection"},
        {id:"airtpatch",title:"Airtable PATCH", x:68,y:46,size:112,hue:"blue",
          summary:"PATCHes status, True Score, Score%, Fail Summary, Notes. ALL fields always written — never blank. Hard rule to prevent ghost data across resubmissions.",
          manages:"Field writeback · ghost-data prevention · status update"}
      ],
      edges:[{id:"o1",from:"emailermod",to:"airtpatch",strength:0.54}]
    },
    parc:{
      id:"parc", name:"Archive & Learn",
      nodes:[
        {id:"archmod",  title:"archive.py",            x:50,y:42,size:128,hue:"core",
          summary:"Append-only JSON archive + raw file store. Nothing is ever deleted or overwritten. Full audit trail for every run including errors.",
          manages:"Execution records · raw files · append-only guarantee"},
        {id:"correctmod",title:"post_pass_correction", x:18,y:76,size:94,hue:"emerald",
          summary:"Runs only at score ≥ 95. Outputs corrected RAW/CSV/LOG. Never re-grades, never touches Airtable — completely isolated safe sub-pipeline.",
          manages:"Corrected file generation · isolation guarantee"},
        {id:"reviewmod",title:"reviewer.py",           x:50,y:78,size:94,hue:"violet",
          summary:"Internal static audit. Issues classified CRITICAL/HIGH/LOW. Pure observer — never mutates pipeline state.",
          manages:"Audit trail · issue classification · behaviour review"},
        {id:"lessonmod",title:"Extract Lesson",        x:80,y:76,size:94,hue:"amber",
          summary:"Generalised rule extracted with confidence 0.75, tagged by site/vendor/column. Written to archive, recalled on the next run via memory.py.",
          manages:"Lesson generation · tag assignment · learning loop"}
      ],
      edges:[
        {id:"a1",from:"archmod",to:"correctmod",strength:0.62},
        {id:"a2",from:"archmod",to:"reviewmod", strength:0.72},
        {id:"a3",from:"archmod",to:"lessonmod", strength:0.76},
        {id:"a4",from:"lessonmod",to:"correctmod",strength:0.36}
      ]
    },
    pasync:{
      id:"pasync", name:"Async Workers",
      nodes:[
        {id:"metricsmod",title:"metrics.py",   x:32,y:46,size:110,hue:"blue",
          summary:"Computes and exports 3 CSV metric files. Triggered by mark_dirty() flag. Never blocks the main poll loop.",
          manages:"Metric computation · CSV export · dirty-flag pattern"},
        {id:"dashmod",  title:"dashboard.py",  x:68,y:46,size:110,hue:"cyan",
          summary:"Generates HTML dashboards from CSV data. Template: ui/executive_dashboard.html → output/ → served_dashboard/. Only runs when dirty.",
          manages:"HTML generation · template injection · metrics → UI"}
      ],
      edges:[{id:"as1",from:"metricsmod",to:"dashmod",strength:0.68}]
    }
  };

  // ── Colour palette ───────────────────────────────────────────────────────
  const colors={
    core:   {line:"rgba(140,160,255,0.58)",dot:"rgba(230,236,255,0.96)",glow:"rgba(140,160,255,0.22)"},
    blue:   {line:"rgba(0,133,255,0.50)",  dot:"rgba(200,230,255,0.96)",glow:"rgba(0,133,255,0.20)"},
    violet: {line:"rgba(196,181,253,0.46)",dot:"rgba(245,236,255,0.96)",glow:"rgba(167,139,250,0.18)"},
    cyan:   {line:"rgba(34,211,238,0.46)", dot:"rgba(220,254,255,0.96)",glow:"rgba(34,211,238,0.18)"},
    emerald:{line:"rgba(52,211,153,0.46)", dot:"rgba(200,255,230,0.96)",glow:"rgba(42,135,3,0.22)"},
    pink:   {line:"rgba(249,100,100,0.46)",dot:"rgba(255,220,220,0.96)",glow:"rgba(234,17,0,0.18)"},
    amber:  {line:"rgba(255,194,32,0.46)", dot:"rgba(255,251,210,0.96)",glow:"rgba(255,194,32,0.20)"}
  };

  // ── DOM refs ─────────────────────────────────────────────────────────────
  const bgCv=document.getElementById("bg"),bgCtx=bgCv.getContext("2d");
  const app=document.getElementById("app"),network=document.getElementById("network");
  const nodesLayer=document.getElementById("nodes");
  const breadcrumb=document.getElementById("breadcrumb"),backBtn=document.getElementById("backBtn");
  const bottomCard=document.getElementById("bottomCard"),bcTitle=document.getElementById("bcTitle");
  const bcText=document.getElementById("bcText"),bcHint=document.getElementById("bcHint"),bcDrill=document.getElementById("bcDrill");
  const hoverCard=document.getElementById("hoverCard"),hoverTitle=document.getElementById("hoverTitle");
  const hoverDoes=document.getElementById("hoverDoes"),hoverManages=document.getElementById("hoverManages");
  const hoverConnected=document.getElementById("hoverConnected");

  let realmStack=["root"],selectedId="main",transitioning=false,animTick=0;

  // ── Background ───────────────────────────────────────────────────────────
  const stars=Array.from({length:240},()=>({x:Math.random(),y:Math.random(),r:.4+Math.random()*1.3,a:.12+Math.random()*.65,phase:Math.random()*Math.PI*2,drift:.004+Math.random()*.018}));
  const filaments=Array.from({length:20},()=>({x1:Math.random(),y1:Math.random(),cx:Math.random(),cy:Math.random(),x2:Math.random(),y2:Math.random(),alpha:.015+Math.random()*.04}));

  function currentRealm(){return realms[realmStack[realmStack.length-1]]}
  function currentSelectedNode(){const r=currentRealm();return r.nodes.find(n=>n.id===selectedId)||r.nodes[0]}

  function resize(){
    bgCv.width=window.innerWidth*devicePixelRatio; bgCv.height=window.innerHeight*devicePixelRatio;
    bgCv.style.width=`${window.innerWidth}px`; bgCv.style.height=`${window.innerHeight}px`;
    bgCtx.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0);
    network.setAttribute("viewBox","0 0 100 100");
    network.setAttribute("preserveAspectRatio","none");
    network.setAttribute("width",window.innerWidth);
    network.setAttribute("height",window.innerHeight);
  }

  function drawBackground(){
    animTick++;
    const w=window.innerWidth,h=window.innerHeight;
    bgCtx.clearRect(0,0,w,h);
    const g=bgCtx.createRadialGradient(w/2,h/2,0,w/2,h/2,Math.max(w,h)*.75);
    g.addColorStop(0,"rgba(10,12,20,0.98)"); g.addColorStop(.3,"rgba(5,7,13,0.99)"); g.addColorStop(1,"rgba(1,2,5,1)");
    bgCtx.fillStyle=g; bgCtx.fillRect(0,0,w,h);
    filaments.forEach((f,i)=>{
      bgCtx.beginPath(); bgCtx.moveTo(f.x1*w,f.y1*h);
      bgCtx.quadraticCurveTo(f.cx*w+Math.sin(animTick*.01+i)*26,f.cy*h+Math.cos(animTick*.012+i)*26,f.x2*w,f.y2*h);
      bgCtx.strokeStyle=`rgba(110,140,255,${f.alpha})`; bgCtx.lineWidth=1; bgCtx.shadowBlur=20; bgCtx.shadowColor="rgba(110,140,255,0.08)"; bgCtx.stroke();
    });
    stars.forEach(s=>{
      bgCtx.beginPath(); bgCtx.arc(s.x*w,s.y*h,s.r,0,Math.PI*2);
      bgCtx.fillStyle=`rgba(190,220,255,${s.a*(0.8+Math.sin(animTick*s.drift+s.phase)*.18)})`; bgCtx.fill();
    });
    [[w*.32,h*.46,280,"56,189,248"],[w*.68,h*.54,320,"139,92,246"]].forEach(([x,y,r,c])=>{
      const gl=bgCtx.createRadialGradient(x,y,0,x,y,r);
      gl.addColorStop(0,`rgba(${c},0.08)`); gl.addColorStop(1,`rgba(${c},0)`);
      bgCtx.fillStyle=gl; bgCtx.fillRect(0,0,w,h);
    });
    requestAnimationFrame(drawBackground);
  }

  function connectedTitles(nodeId){
    const r=currentRealm(),ids=new Set();
    r.edges.forEach(e=>{if(e.from===nodeId)ids.add(e.to);if(e.to===nodeId)ids.add(e.from)});
    return Array.from(ids).map(id=>r.nodes.find(n=>n.id===id)).filter(Boolean).map(n=>n.title);
  }

  function showHoverCard(node,evt){
    hoverTitle.textContent=node.title;
    hoverDoes.textContent=node.summary||"—";
    hoverManages.textContent=node.manages||"—";
    const conn=connectedTitles(node.id);
    hoverConnected.innerHTML="";
    (conn.length?conn:["No linked nodes"]).forEach(t=>{const d=document.createElement("div");d.className="hover-tag";d.textContent=t;hoverConnected.appendChild(d)});
    const pad=18,cw=Math.min(360,window.innerWidth*.36);
    hoverCard.style.left=`${Math.min(window.innerWidth-cw-pad,evt.clientX+18)}px`;
    hoverCard.style.top=`${Math.min(window.innerHeight-220,evt.clientY-10)}px`;
    hoverCard.classList.add("show");
  }
  function moveHoverCard(evt){
    if(!hoverCard.classList.contains("show"))return;
    const pad=18,cw=Math.min(360,window.innerWidth*.36);
    hoverCard.style.left=`${Math.min(window.innerWidth-cw-pad,evt.clientX+18)}px`;
    hoverCard.style.top=`${Math.min(window.innerHeight-220,evt.clientY-10)}px`;
  }
  function hideHoverCard(){hoverCard.classList.remove("show")}

  function makeCurve(from,to,bend=0,spread=0){
    const dx=to.x-from.x,dy=to.y-from.y,len=Math.max(.001,Math.sqrt(dx*dx+dy*dy)),nx=-dy/len,ny=dx/len;
    return `M ${from.x} ${from.y} C ${from.x+dx*.28+nx*spread} ${from.y+dy*.22+ny*spread-bend}, ${from.x+dx*.72-nx*spread} ${from.y+dy*.78-ny*spread-bend}, ${to.x} ${to.y}`;
  }

  function renderNetwork(){
    const realm=currentRealm();
    const defs=`<defs><filter id="synGlow" x="-300%" y="-300%" width="700%" height="700%"><feGaussianBlur stdDeviation="0.8" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter><filter id="synGlowSoft" x="-300%" y="-300%" width="700%" height="700%"><feGaussianBlur stdDeviation="1.8" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>`;
    const offsets=[-2.6,-1.4,0,1.4,2.6];
    const svg=realm.edges.map(edge=>{
      const from=realm.nodes.find(n=>n.id===edge.from),to=realm.nodes.find(n=>n.id===edge.to);
      if(!from||!to)return"";
      const col=colors[to.hue]||colors.blue,active=selectedId===edge.from||selectedId===edge.to;
      const dx=to.x-from.x,dy=to.y-from.y,dist=Math.sqrt(dx*dx+dy*dy),bend=Math.max(2.5,Math.min(9,dist*.12));
      const trunk=makeCurve(from,to,bend,3.4);
      const ghost=offsets.map(o=>makeCurve(from,to,bend+o*.9,4+Math.abs(o)*1.8)).map(d=>`<path d="${d}" fill="none" stroke="${col.line}" stroke-width="${active?.26:.16}" opacity="${active?.34:.18}" stroke-linecap="round"/>`).join("");
      const mid=[-1.8,1.8].map(o=>makeCurve(from,to,bend+o,2.2)).map(d=>`<path d="${d}" fill="none" stroke="${col.line}" stroke-width="${active?.42:.28}" opacity="${active?.52:.3}" stroke-linecap="round" filter="url(#synGlow)"/>`).join("");
      return `<g>${trunk.replace("M","")? `<path d="${trunk}" fill="none" stroke="${col.line}" stroke-width="${active?1.4:.9}" opacity="${active?.14:.08}" stroke-linecap="round" filter="url(#synGlowSoft)"/>` : ""}${ghost}${mid}<path id="${edge.id}-path" d="${trunk}" fill="none" stroke="${col.line}" stroke-width="${active?.62:.42+edge.strength*.14}" opacity="${active?.98:.62+edge.strength*.15}" stroke-linecap="round" filter="url(#synGlow)"/><circle r="${active?.52:.36}" fill="${col.dot}" opacity="${active?.98:.84}" filter="url(#synGlow)"><animateMotion dur="${active?"1.4s":"2.6s"}" repeatCount="indefinite" rotate="auto"><mpath href="#${edge.id}-path"/></animateMotion></circle><circle r="${active?.34:.26}" fill="${col.dot}" opacity="${active?.46:.26}" filter="url(#synGlow)"><animateMotion dur="${active?"1.4s":"2.6s"}" begin="-0.45s" repeatCount="indefinite" rotate="auto"><mpath href="#${edge.id}-path"/></animateMotion></circle></g>`;
    }).join("");
    network.innerHTML=defs+svg;
  }

  function brainShape(size,hue,x){
    return{width:`${size}px`,height:`${Math.round(size*.82)}px`,borderRadius:"54% 46% 50% 50% / 42% 48% 52% 58%",transform:`rotate(${hue==="core"?0:x<50?-8:8}deg)`,boxShadow:`inset 0 0 30px rgba(130,150,255,0.08),0 0 32px ${colors[hue]?.glow||"rgba(140,160,255,0.12)"}`};
  }

  function renderNodes(){
    const realm=currentRealm();
    nodesLayer.innerHTML="";
    realm.nodes.forEach(node=>{
      const el=document.createElement("div");
      el.className="node"+(node.id===selectedId?" active":"");
      el.style.left=`${node.x}%`; el.style.top=`${node.y}%`;
      const o1=document.createElement("div");
      Object.assign(o1.style,{position:"absolute",inset:"-8%",opacity:".40",borderRadius:"56% 44% 52% 48% / 42% 58% 44% 56%",border:"1px solid rgba(255,255,255,0.06)"});
      const o2=document.createElement("div");
      Object.assign(o2.style,{position:"absolute",inset:"-16%",opacity:".30",filter:"blur(18px)",borderRadius:"58% 42% 50% 50% / 40% 60% 42% 58%",background:"rgba(255,255,255,0.05)"});
      const shape=document.createElement("div");
      shape.className="node-shape";
      Object.assign(shape.style,brainShape(node.size,node.hue,node.x));
      shape.innerHTML=`<div style="position:absolute;inset:10%;border-radius:52% 48% 47% 53%/46% 50% 50% 54%;border:1px solid rgba(255,255,255,0.08)"></div><div style="position:absolute;inset:18%;border-radius:50%/44% 55% 45% 56%;border:1px solid rgba(255,255,255,0.06)"></div><div style="position:absolute;left:18%;top:18%;width:12%;height:12%;border-radius:50%;background:rgba(255,255,255,0.16);filter:blur(2px)"></div><div style="position:absolute;left:34%;top:34%;width:10%;height:10%;border-radius:50%;background:rgba(255,255,255,0.10);filter:blur(2px)"></div><div style="position:absolute;left:54%;top:22%;width:8%;height:8%;border-radius:50%;background:rgba(255,255,255,0.12);filter:blur(2px)"></div>`;
      const label=document.createElement("div");
      label.className="node-label"; label.textContent=node.title;
      el.addEventListener("click",()=>{selectedId=node.id;renderAll()});
      el.addEventListener("dblclick",()=>enterRealm(node));
      el.addEventListener("mouseenter",evt=>showHoverCard(node,evt));
      el.addEventListener("mousemove",moveHoverCard);
      el.addEventListener("mouseleave",hideHoverCard);
      el.appendChild(o1); el.appendChild(o2); el.appendChild(shape); el.appendChild(label);
      nodesLayer.appendChild(el);
    });
  }

  function renderBottomCard(){
    const node=currentSelectedNode();
    if(!node){bottomCard.style.display="none";return}
    bottomCard.style.display="block";
    bcHint.textContent=currentRealm().name+" · Selected";
    bcTitle.textContent=node.title;
    bcText.textContent=node.summary||"";
    bcDrill.textContent=node.realmTarget?"Double-click to drill into this stage":"";
  }

  function renderBreadcrumb(){
    breadcrumb.textContent=realmStack.map(id=>realms[id].name).join(" / ");
    backBtn.style.display=realmStack.length>1?"flex":"none";
    const r=currentRealm();
    document.getElementById("statNodes").textContent=r.nodes.length;
    document.getElementById("statEdges").textContent=r.edges.length;
  }

  function renderAll(){renderBreadcrumb();renderNetwork();renderNodes();renderBottomCard()}

  function enterRealm(node){
    if(!node.realmTarget||!realms[node.realmTarget]||transitioning)return;
    transitioning=true; app.classList.add("realm-fade-out"); hideHoverCard();
    setTimeout(()=>{
      app.classList.remove("realm-fade-out");
      realmStack.push(node.realmTarget);
      selectedId=realms[node.realmTarget].nodes[0]?.id||null;
      renderAll(); app.classList.add("realm-fade-in");
      setTimeout(()=>{app.classList.remove("realm-fade-in");transitioning=false},280);
    },180);
  }

  function goBack(){
    if(realmStack.length<=1||transitioning)return;
    transitioning=true; app.classList.add("realm-fade-out"); hideHoverCard();
    setTimeout(()=>{
      app.classList.remove("realm-fade-out");
      realmStack.pop(); selectedId=currentRealm().nodes[0]?.id||null;
      renderAll(); app.classList.add("realm-fade-in");
      setTimeout(()=>{app.classList.remove("realm-fade-in");transitioning=false},280);
    },180);
  }

  function clockTick(){
    document.getElementById("clock").textContent=new Date().toLocaleTimeString("en-US",{hour:"2-digit",minute:"2-digit",second:"2-digit"});
  }

  backBtn.addEventListener("click",goBack);
  window.addEventListener("resize",()=>{resize();renderAll()});

  resize(); renderAll(); drawBackground();
  setInterval(clockTick,1000); clockTick();
  </script>
</body>
</html>
