<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VUES · Site Map</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet.markercluster@1.4.1/dist/leaflet.markercluster.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: #0f172a; color: #f1f5f9; height: 100vh; overflow: hidden; }
    
    .layout { display: grid; grid-template-columns: 1fr 320px; height: 100vh; }
    #map { width: 100%; height: 100%; }
    
    .controls { position: absolute; top: 16px; left: 16px; z-index: 1000; display: flex; flex-direction: column; gap: 10px; }
    .btn { padding: 10px 16px; border-radius: 8px; border: 1px solid #334155; background: #1e293b; color: #f1f5f9; font-size: 13px; font-weight: 600; cursor: pointer; text-decoration: none; }
    .btn:hover { border-color: #22d3ee; }
    
    .mode-toggle { display: flex; gap: 4px; background: #1e293b; padding: 4px; border-radius: 10px; border: 1px solid #334155; }
    .mode-btn { padding: 10px 20px; border-radius: 8px; border: none; background: transparent; color: #94a3b8; font-size: 13px; font-weight: 700; cursor: pointer; transition: all 0.15s; }
    .mode-btn:hover { color: #f1f5f9; }
    .mode-btn.active.scout { background: #a78bfa; color: #000; }
    .mode-btn.active.survey { background: #22d3ee; color: #000; }
    
    .tiles { position: absolute; bottom: 80px; left: 16px; z-index: 1000; display: flex; gap: 4px; background: #1e293b; padding: 4px; border-radius: 8px; border: 1px solid #334155; }
    .tile-btn { padding: 8px 12px; border-radius: 6px; border: none; background: transparent; color: #94a3b8; font-size: 11px; font-weight: 600; cursor: pointer; }
    .tile-btn.active { background: #22d3ee; color: #000; }
    
    .sidebar { background: #1e293b; border-left: 1px solid #334155; padding: 20px; overflow-y: auto; }
    .sidebar h1 { font-size: 18px; margin-bottom: 4px; display: flex; align-items: center; gap: 8px; }
    .sidebar p { font-size: 12px; color: #94a3b8; margin-bottom: 16px; }
    
    .stat-row { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-bottom: 16px; }
    .stat { background: rgba(255,255,255,0.05); padding: 12px; border-radius: 8px; text-align: center; }
    .stat-val { font-size: 22px; font-weight: 800; }
    .stat-lbl { font-size: 9px; text-transform: uppercase; color: #94a3b8; margin-top: 2px; }
    
    .section-title { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: #64748b; margin: 16px 0 10px; }
    
    .vendor-btn { display: flex; align-items: center; gap: 10px; width: 100%; padding: 10px; margin-bottom: 6px; border-radius: 8px; border: 2px solid transparent; background: rgba(255,255,255,0.03); cursor: pointer; text-align: left; color: #f1f5f9; font-size: 13px; }
    .vendor-btn:hover { background: rgba(255,255,255,0.06); }
    .vendor-btn.active { border-color: var(--c); background: rgba(255,255,255,0.08); }
    .vendor-dot { width: 12px; height: 12px; border-radius: 50%; background: var(--c); }
    .vendor-btn span { flex: 1; font-weight: 600; }
    .vendor-btn strong { font-size: 16px; font-weight: 800; color: var(--c); }
    
    .legend { margin-top: 20px; padding-top: 16px; border-top: 1px solid #334155; }
    .legend-item { display: flex; align-items: center; gap: 10px; padding: 6px 0; font-size: 12px; }
    .legend-dot { width: 14px; height: 14px; border-radius: 50%; border: 2px solid #fff; }
    
    .leaflet-popup-content-wrapper { background: #1e293b; color: #f1f5f9; border-radius: 8px; }
    .leaflet-popup-tip { background: #1e293b; }
    .popup-header { font-size: 14px; font-weight: 700; margin-bottom: 8px; }
    .popup-row { display: flex; justify-content: space-between; padding: 4px 0; font-size: 12px; }
    .popup-badge { display: inline-block; padding: 3px 8px; border-radius: 4px; font-size: 10px; font-weight: 700; margin-top: 8px; }
  </style>
</head>
<body>
  <div class="layout">
    <div style="position:relative">
      <div id="map"></div>
      <div class="controls">
        <a href="routing.html" class="btn">← Routing</a>
        <div class="mode-toggle">
          <button class="mode-btn scout active" data-mode="scout">🔭 Scout</button>
          <button class="mode-btn survey" data-mode="survey">📋 Survey</button>
        </div>
      </div>
      <div class="tiles">
        <button class="tile-btn" data-t="street">Street</button>
        <button class="tile-btn active" data-t="satellite">Satellite</button>
        <button class="tile-btn" data-t="dark">Dark</button>
      </div>
    </div>
    <div class="sidebar">
      <h1 id="sidebarTitle">🔭 Scout Status</h1>
      <p id="sidebarSub">Site scout submission status</p>
      <div class="stat-row" id="stats"></div>
      <div class="section-title">Filter Vendor</div>
      <div id="vendors"></div>
      <div class="legend" id="legend"></div>
    </div>
  </div>

<script>
const VENDOR_COLORS = { 
  'CEI': '#22d3ee', 'Wachter': '#a78bfa', 'Everon': '#4ade80', 
  'TechWise': '#f472b6', 'SAS': '#fbbf24' 
};
const TILES = {
  street: L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 }),
  satellite: L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { maxZoom: 19 }),
  dark: L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { maxZoom: 19 })
};

let map, clusterGroup, siteData, routingData;
let activeVendor = null, currentTile = 'satellite', mode = 'scout';

function initClusterGroup() {
  clusterGroup = L.markerClusterGroup({
    maxClusterRadius: 40,
    spiderfyOnMaxZoom: true,
    showCoverageOnHover: false,
    iconCreateFunction: cluster => {
      const markers = cluster.getAllChildMarkers();
      const total = markers.length;
      const size = total < 10 ? 30 : total < 50 ? 40 : 50;
      
      // Color based on current mode
      let color;
      if (mode === 'scout') {
        const submitted = markers.filter(m => m.options.scoutSubmitted).length;
        const pct = total > 0 ? submitted / total : 0;
        color = pct > 0.7 ? '#ef4444' : pct > 0.3 ? '#f59e0b' : '#22d3ee';
      } else {
        const complete = markers.filter(m => m.options.surveyComplete).length;
        const pct = total > 0 ? complete / total : 0;
        color = pct > 0.7 ? '#22c55e' : pct > 0.3 ? '#f59e0b' : '#64748b';
      }
      
      return L.divIcon({
        html: `<div style="width:${size}px;height:${size}px;background:${color};border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff;font-size:${size/3}px;border:2px solid #fff">${total}</div>`,
        className: '',
        iconSize: [size, size]
      });
    }
  });
}

async function init() {
  // Load both data sources
  const [sitesRes, routingRes] = await Promise.all([
    fetch('site_markers.json'),
    fetch('survey_routing_data.json')
  ]);
  siteData = await sitesRes.json();
  routingData = await routingRes.json();
  
  // Create lookup by site number
  window.routingLookup = {};
  routingData.rows.forEach(r => {
    routingLookup[String(r.site)] = r;
  });
  
  // Init map
  map = L.map('map', { zoomControl: false }).setView([39, -96], 4);
  TILES.satellite.addTo(map);
  L.control.zoom({ position: 'bottomright' }).addTo(map);
  
  initClusterGroup();
  map.addLayer(clusterGroup);
  
  render();
  
  // Mode toggle
  document.querySelectorAll('.mode-btn').forEach(b => {
    b.onclick = () => {
      mode = b.dataset.mode;
      document.querySelectorAll('.mode-btn').forEach(x => x.classList.remove('active'));
      b.classList.add('active');
      // Recreate cluster group with new color logic
      map.removeLayer(clusterGroup);
      initClusterGroup();
      map.addLayer(clusterGroup);
      render();
    };
  });
  
  // Tile toggle
  document.querySelectorAll('.tile-btn').forEach(b => {
    b.onclick = () => {
      const t = b.dataset.t;
      if (t === currentTile) return;
      map.removeLayer(TILES[currentTile]);
      TILES[t].addTo(map);
      currentTile = t;
      document.querySelectorAll('.tile-btn').forEach(x => x.classList.toggle('active', x.dataset.t === t));
    };
  });
}

function render() {
  clusterGroup.clearLayers();
  
  // Update sidebar title
  if (mode === 'scout') {
    document.getElementById('sidebarTitle').textContent = '🔭 Scout Status';
    document.getElementById('sidebarSub').textContent = 'Red = Submitted, Blue = Pending';
  } else {
    document.getElementById('sidebarTitle').textContent = '📋 Survey Status';
    document.getElementById('sidebarSub').textContent = 'Green = Complete, Orange = Pending';
  }
  
  let filtered = siteData.markers;
  if (activeVendor) filtered = filtered.filter(m => m.vendor === activeVendor);
  
  let stats = { total: 0, submitted: 0, complete: 0, pending: 0 };
  
  filtered.forEach(m => {
    const routing = routingLookup[String(m.site)] || {};
    const scoutSubmitted = routing.scout_submitted === true;
    const surveyComplete = routing.survey_complete === true;
    const surveyRequired = routing.survey_required !== 'NO';
    
    stats.total++;
    if (scoutSubmitted) stats.submitted++;
    if (surveyComplete) stats.complete++;
    if (surveyRequired && !surveyComplete) stats.pending++;
    
    // Determine color based on mode
    let color, status;
    if (mode === 'scout') {
      color = scoutSubmitted ? '#ef4444' : '#22d3ee';  // Red = submitted, Cyan = pending
      status = scoutSubmitted ? 'Submitted' : 'Pending';
    } else {
      if (surveyComplete) {
        color = '#22c55e';  // Green = complete
        status = 'Complete';
      } else if (!surveyRequired) {
        color = '#64748b';  // Gray = not required
        status = 'Not Required';
      } else {
        color = '#f59e0b';  // Orange = pending
        status = 'Pending';
      }
    }
    
    const marker = L.circleMarker([m.lat, m.lng], {
      radius: 7,
      fillColor: color,
      fillOpacity: 0.9,
      color: '#fff',
      weight: 1.5,
      scoutSubmitted: scoutSubmitted,
      surveyComplete: surveyComplete
    });
    
    const surveyType = routing.survey_type || 'N/A';
    marker.bindPopup(`
      <div class="popup-header">Site ${m.site}</div>
      <div class="popup-row"><span>Vendor</span><strong>${m.vendor}</strong></div>
      <div class="popup-row"><span>City</span><strong>${m.city || 'N/A'}</strong></div>
      <div class="popup-row"><span>State</span><strong>${m.state}</strong></div>
      <div class="popup-row"><span>Scout</span><strong>${scoutSubmitted ? '✅ Submitted' : '⏳ Pending'}</strong></div>
      <div class="popup-row"><span>Survey</span><strong>${surveyComplete ? '✅ Complete' : surveyRequired ? '⏳ ' + surveyType : '—'}</strong></div>
      <div class="popup-badge" style="background:${color};color:#fff">${status}</div>
    `);
    
    clusterGroup.addLayer(marker);
  });
  
  // Stats
  if (mode === 'scout') {
    const pct = stats.total > 0 ? Math.round((stats.submitted / stats.total) * 100) : 0;
    document.getElementById('stats').innerHTML = `
      <div class="stat"><div class="stat-val" style="color:#22d3ee">${stats.total}</div><div class="stat-lbl">Total Sites</div></div>
      <div class="stat"><div class="stat-val" style="color:#ef4444">${stats.submitted}</div><div class="stat-lbl">Submitted</div></div>
      <div class="stat"><div class="stat-val" style="color:#64748b">${stats.total - stats.submitted}</div><div class="stat-lbl">Pending</div></div>
      <div class="stat"><div class="stat-val" style="color:#22c55e">${pct}%</div><div class="stat-lbl">Complete</div></div>
    `;
  } else {
    const pct = (stats.complete + stats.pending) > 0 ? Math.round((stats.complete / (stats.complete + stats.pending)) * 100) : 0;
    document.getElementById('stats').innerHTML = `
      <div class="stat"><div class="stat-val" style="color:#22d3ee">${stats.total}</div><div class="stat-lbl">Total Sites</div></div>
      <div class="stat"><div class="stat-val" style="color:#22c55e">${stats.complete}</div><div class="stat-lbl">Complete</div></div>
      <div class="stat"><div class="stat-val" style="color:#f59e0b">${stats.pending}</div><div class="stat-lbl">Pending</div></div>
      <div class="stat"><div class="stat-val" style="color:#22c55e">${pct}%</div><div class="stat-lbl">Rate</div></div>
    `;
  }
  
  // Vendor list
  const vendorStats = {};
  siteData.markers.forEach(m => {
    if (!vendorStats[m.vendor]) vendorStats[m.vendor] = { total: 0, submitted: 0, complete: 0 };
    vendorStats[m.vendor].total++;
    const r = routingLookup[String(m.site)] || {};
    if (r.scout_submitted === true) vendorStats[m.vendor].submitted++;
    if (r.survey_complete === true) vendorStats[m.vendor].complete++;
  });
  
  document.getElementById('vendors').innerHTML = Object.entries(vendorStats)
    .sort((a,b) => b[1].total - a[1].total)
    .map(([v, s]) => {
      const color = VENDOR_COLORS[v] || '#94a3b8';
      const sub = mode === 'scout' 
        ? `${s.submitted}/${s.total} submitted`
        : `${s.complete}/${s.total} complete`;
      return `
        <button class="vendor-btn ${activeVendor === v ? 'active' : ''}" data-v="${v}" style="--c:${color}">
          <div class="vendor-dot"></div>
          <span>${v}</span>
          <strong>${s.total}</strong>
        </button>
        <div style="font-size:10px;color:#64748b;margin:-4px 0 8px 34px;">${sub}</div>
      `;
    }).join('');
  
  document.querySelectorAll('.vendor-btn').forEach(b => {
    b.onclick = () => {
      activeVendor = activeVendor === b.dataset.v ? null : b.dataset.v;
      render();
      if (activeVendor) {
        const bounds = filtered.filter(m => m.vendor === activeVendor).map(m => [m.lat, m.lng]);
        if (bounds.length) map.fitBounds(bounds, { padding: [50, 50] });
      } else {
        map.setView([39, -96], 4);
      }
    };
  });
  
  // Legend
  if (mode === 'scout') {
    document.getElementById('legend').innerHTML = `
      <div class="section-title">Legend</div>
      <div class="legend-item"><div class="legend-dot" style="background:#ef4444"></div>Scout Submitted</div>
      <div class="legend-item"><div class="legend-dot" style="background:#22d3ee"></div>Awaiting Scout</div>
    `;
  } else {
    document.getElementById('legend').innerHTML = `
      <div class="section-title">Legend</div>
      <div class="legend-item"><div class="legend-dot" style="background:#22c55e"></div>Survey Complete</div>
      <div class="legend-item"><div class="legend-dot" style="background:#f59e0b"></div>Survey Pending</div>
      <div class="legend-item"><div class="legend-dot" style="background:#64748b"></div>No Survey Required</div>
    `;
  }
}

init();
</script>
</body>
</html>
