<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VUES · Vendor Map</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f172a; --panel: #1e293b; --border: #334155;
      --text: #f1f5f9; --text-soft: #94a3b8;
      --cyan: #22d3ee; --purple: #a78bfa; --green: #4ade80; --amber: #fbbf24; --pink: #f472b6;
    }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }
    
    .layout { display: grid; grid-template-columns: 1fr 320px; height: 100vh; }
    
    #map { width: 100%; height: 100%; }
    
    .controls { position: absolute; top: 16px; left: 16px; z-index: 1000; display: flex; gap: 8px; }
    .btn { padding: 10px 16px; border-radius: 8px; border: 1px solid var(--border); background: var(--panel); color: var(--text); font-size: 13px; font-weight: 600; cursor: pointer; text-decoration: none; display: inline-flex; align-items: center; gap: 6px; transition: all 0.15s; }
    .btn:hover { border-color: var(--cyan); background: #263445; }
    
    .tile-toggle { position: absolute; bottom: 24px; left: 16px; z-index: 1000; display: flex; gap: 4px; background: var(--panel); padding: 4px; border-radius: 8px; border: 1px solid var(--border); }
    .tile-btn { padding: 8px 12px; border-radius: 6px; border: none; background: transparent; color: var(--text-soft); font-size: 12px; font-weight: 600; cursor: pointer; }
    .tile-btn:hover { color: var(--text); }
    .tile-btn.active { background: var(--cyan); color: #000; }
    
    .sidebar { background: var(--panel); border-left: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
    .sidebar-header { padding: 20px; border-bottom: 1px solid var(--border); }
    .sidebar-header h1 { font-size: 18px; font-weight: 800; margin-bottom: 4px; }
    .sidebar-header p { font-size: 12px; color: var(--text-soft); }
    
    .stats { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; padding: 16px; border-bottom: 1px solid var(--border); }
    .stat { padding: 12px; background: rgba(255,255,255,0.03); border-radius: 8px; text-align: center; }
    .stat-value { font-size: 24px; font-weight: 800; }
    .stat-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-soft); margin-top: 2px; }
    
    .section { padding: 16px; border-bottom: 1px solid var(--border); }
    .section-title { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-soft); margin-bottom: 12px; }
    
    .vendor-list { display: flex; flex-direction: column; gap: 6px; }
    .vendor-row { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 8px; cursor: pointer; transition: all 0.15s; border: 2px solid transparent; }
    .vendor-row:hover { background: rgba(255,255,255,0.05); }
    .vendor-row.active { border-color: var(--color); background: rgba(255,255,255,0.05); }
    .vendor-dot { width: 12px; height: 12px; border-radius: 50%; background: var(--color); }
    .vendor-name { flex: 1; font-weight: 600; font-size: 13px; }
    .vendor-count { font-size: 18px; font-weight: 800; color: var(--color); }
    
    .state-list { max-height: 200px; overflow-y: auto; }
    .state-row { display: flex; justify-content: space-between; padding: 6px 0; font-size: 12px; border-bottom: 1px solid rgba(255,255,255,0.05); }
    .state-row:last-child { border-bottom: none; }
    
    /* Leaflet overrides */
    .leaflet-popup-content-wrapper { background: var(--panel); color: var(--text); border-radius: 8px; }
    .leaflet-popup-tip { background: var(--panel); }
    .leaflet-popup-content { margin: 12px; }
    .popup-title { font-size: 14px; font-weight: 700; margin-bottom: 8px; display: flex; align-items: center; gap: 8px; }
    .popup-dot { width: 10px; height: 10px; border-radius: 50%; }
    .popup-stats { font-size: 12px; }
    .popup-stats div { padding: 4px 0; display: flex; justify-content: space-between; }
  </style>
</head>
<body>
  <div class="layout">
    <div style="position: relative;">
      <div id="map"></div>
      <div class="controls">
        <a href="routing.html" class="btn">← Routing</a>
      </div>
      <div class="tile-toggle">
        <button class="tile-btn" data-tile="street">Street</button>
        <button class="tile-btn active" data-tile="satellite">Satellite</button>
        <button class="tile-btn" data-tile="dark">Dark</button>
      </div>
    </div>
    <div class="sidebar">
      <div class="sidebar-header">
        <h1>🗺️ Vendor Coverage</h1>
        <p>Site assignments across the US</p>
      </div>
      <div class="stats" id="stats"></div>
      <div class="section">
        <div class="section-title">Filter by Vendor</div>
        <div class="vendor-list" id="vendors"></div>
      </div>
      <div class="section" style="flex:1; overflow: hidden;">
        <div class="section-title">States</div>
        <div class="state-list" id="states"></div>
      </div>
    </div>
  </div>

<script>
const VENDOR_COLORS = {
  'CEI': '#22d3ee',
  'Wachter': '#a78bfa', 
  'Everon': '#4ade80',
  'Techwise': '#f472b6',
  'SAS': '#fbbf24',
  'PTSI': '#fb923c',
  'alarmhawaii.com': '#f87171'
};

const TILES = {
  street: L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 }),
  satellite: L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { maxZoom: 19 }),
  dark: L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { maxZoom: 19 })
};

let map, markers = [], data = null, activeVendor = null, currentTile = 'satellite';

async function init() {
  // Load data
  const res = await fetch('vendor_locations.json');
  data = await res.json();
  
  // Init map
  map = L.map('map', { zoomControl: false }).setView([39, -96], 4);
  TILES.satellite.addTo(map);
  L.control.zoom({ position: 'bottomright' }).addTo(map);
  
  render();
  
  // Tile toggle
  document.querySelectorAll('.tile-btn').forEach(btn => {
    btn.onclick = () => {
      const tile = btn.dataset.tile;
      if (tile === currentTile) return;
      map.removeLayer(TILES[currentTile]);
      TILES[tile].addTo(map);
      currentTile = tile;
      document.querySelectorAll('.tile-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    };
  });
}

function render() {
  // Clear markers
  markers.forEach(m => map.removeLayer(m));
  markers = [];
  
  // Filter
  let filtered = data.markers;
  if (activeVendor) {
    filtered = filtered.filter(m => m.vendor === activeVendor);
  }
  
  // Add markers
  filtered.forEach(m => {
    const color = VENDOR_COLORS[m.vendor] || '#ffffff';
    const size = Math.max(6, Math.min(25, 6 + Math.sqrt(m.count) * 3));
    
    const marker = L.circleMarker(m.location, {
      radius: size,
      fillColor: color,
      fillOpacity: 0.8,
      color: '#fff',
      weight: 1,
      opacity: 0.9
    });
    
    marker.bindPopup(`
      <div class="popup-title">
        <span class="popup-dot" style="background:${color}"></span>
        ${m.state}
      </div>
      <div class="popup-stats">
        <div><span>Vendor</span><strong>${m.vendor}</strong></div>
        <div><span>Sites</span><strong>${m.count}</strong></div>
      </div>
    `);
    
    marker.addTo(map);
    markers.push(marker);
  });
  
  // Stats
  const totalSites = filtered.reduce((a, m) => a + m.count, 0);
  const states = new Set(filtered.map(m => m.state)).size;
  const vendors = new Set(filtered.map(m => m.vendor)).size;
  
  document.getElementById('stats').innerHTML = `
    <div class="stat"><div class="stat-value" style="color:var(--cyan)">${totalSites}</div><div class="stat-label">Sites</div></div>
    <div class="stat"><div class="stat-value" style="color:var(--green)">${states}</div><div class="stat-label">States</div></div>
    <div class="stat"><div class="stat-value" style="color:var(--purple)">${vendors}</div><div class="stat-label">Vendors</div></div>
    <div class="stat"><div class="stat-value">${filtered.length}</div><div class="stat-label">Markers</div></div>
  `;
  
  // Vendor list
  const vendorTotals = {};
  data.markers.forEach(m => {
    vendorTotals[m.vendor] = (vendorTotals[m.vendor] || 0) + m.count;
  });
  
  document.getElementById('vendors').innerHTML = Object.entries(vendorTotals)
    .sort((a, b) => b[1] - a[1])
    .map(([v, count]) => {
      const color = VENDOR_COLORS[v] || '#fff';
      const isActive = activeVendor === v;
      return `<div class="vendor-row ${isActive ? 'active' : ''}" data-vendor="${v}" style="--color:${color}">
        <div class="vendor-dot"></div>
        <div class="vendor-name">${v}</div>
        <div class="vendor-count">${count}</div>
      </div>`;
    }).join('');
  
  document.querySelectorAll('.vendor-row').forEach(el => {
    el.onclick = () => {
      const v = el.dataset.vendor;
      activeVendor = activeVendor === v ? null : v;
      render();
      
      if (activeVendor) {
        const bounds = filtered.map(m => m.location);
        if (bounds.length) map.fitBounds(bounds, { padding: [30, 30] });
      } else {
        map.setView([39, -96], 4);
      }
    };
  });
  
  // State list
  const stateTotals = {};
  filtered.forEach(m => {
    stateTotals[m.state] = (stateTotals[m.state] || 0) + m.count;
  });
  
  document.getElementById('states').innerHTML = Object.entries(stateTotals)
    .sort((a, b) => b[1] - a[1])
    .map(([state, count]) => `<div class="state-row"><span>${state}</span><strong>${count}</strong></div>`)
    .join('');
}

init();
</script>
</body>
</html>
