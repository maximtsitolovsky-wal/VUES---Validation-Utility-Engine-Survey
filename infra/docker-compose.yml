# SiteOwlQA — Docker Compose (production-like)
# SQL Server and Airtable are external services — not containerized.
# Override with docker-compose.override.yml for local development.
version: "3.9"

services:
  pipeline:
    build:
      context: ..
      dockerfile: infra/Dockerfile
      target: runtime
    image: siteowlqa:latest
    restart: unless-stopped
    env_file: .env
    volumes:
      - archive_data:/app/archive
      - output_data:/app/output
      - logs_data:/app/logs
      - corrections_data:/app/corrections
      # temp is ephemeral — no named volume needed
    networks:
      - backend
    expose:
      - "8765"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8765/executive_dashboard.html || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  proxy:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      pipeline:
        condition: service_healthy
    networks:
      - edge
      - backend
    healthcheck:
      test: ["CMD-SHELL", "nginx -t 2>/dev/null && curl -sf http://localhost/health || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 3

volumes:
  archive_data:
    driver: local
  output_data:
    driver: local
  logs_data:
    driver: local
  corrections_data:
    driver: local

networks:
  edge:
    name: siteowlqa_edge
  backend:
    name: siteowlqa_backend
    internal: true
