<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vendor Assignment Map · VUES</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/cobe@0.6.3/dist/cobe.esm.js" type="module"></script>
  <style>
    :root {
      --bg: #030712;
      --panel: rgba(9, 18, 34, 0.78);
      --line: rgba(145, 185, 255, 0.16);
      --text: #f6f9ff;
      --soft: #c9d5e8;
      --muted: #8191aa;
      --cyan: #2ed7ff;
      --mint: #24e6a0;
      --purple: #a778ff;
      --pink: #ff5fd2;
      --yellow: #ffc857;
      --red: #ff5577;
      --radius-xl: 34px;
      --radius-lg: 24px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at 50% 30%, rgba(46, 215, 255, 0.12), transparent 40%),
        radial-gradient(circle at 80% 70%, rgba(167, 120, 255, 0.1), transparent 35%),
        linear-gradient(180deg, #030712 0%, #06101d 100%);
      z-index: -1;
    }
    
    .shell { max-width: 1600px; margin: 0 auto; padding: 24px; }
    
    .header { display: flex; justify-content: space-between; align-items: center; gap: 20px; margin-bottom: 24px; flex-wrap: wrap; }
    .header-left { display: flex; align-items: center; gap: 16px; }
    .back-link {
      height: 42px; border-radius: 999px; border: 1px solid var(--line);
      background: rgba(9, 18, 34, 0.72); color: var(--soft);
      display: inline-flex; align-items: center; gap: 9px; padding: 0 16px;
      font-size: 12px; font-weight: 900; letter-spacing: 0.04em; text-transform: uppercase;
      text-decoration: none; transition: all 0.2s;
    }
    .back-link:hover { background: rgba(46,215,255,0.12); border-color: rgba(46,215,255,0.3); }
    h1 { font-size: 28px; font-weight: 900; letter-spacing: -0.04em; }
    .subtitle { color: var(--muted); font-size: 14px; margin-top: 4px; }
    
    .pill { height: 36px; border-radius: 999px; border: 1px solid var(--line); background: rgba(9, 18, 34, 0.72); color: var(--soft); display: inline-flex; align-items: center; gap: 8px; padding: 0 14px; font-size: 11px; font-weight: 800; letter-spacing: 0.04em; text-transform: uppercase; }
    .pill.active { border-color: rgba(46,215,255,0.4); background: rgba(46,215,255,0.12); color: var(--cyan); }
    
    .main-grid { display: grid; grid-template-columns: 1fr 380px; gap: 20px; min-height: calc(100vh - 150px); }
    
    .globe-container {
      border-radius: var(--radius-xl);
      border: 1px solid var(--line);
      background: radial-gradient(circle at 50% 20%, rgba(46,215,255,0.08), transparent 50%), var(--panel);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      min-height: 600px;
    }
    
    #globe-canvas {
      width: 100%;
      max-width: 700px;
      aspect-ratio: 1;
      cursor: grab;
      touch-action: none;
    }
    #globe-canvas:active { cursor: grabbing; }
    
    .globe-overlay {
      position: absolute;
      bottom: 20px;
      left: 20px;
      right: 20px;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      pointer-events: none;
    }
    .globe-stats {
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(10px);
      border-radius: 16px;
      padding: 14px 18px;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .globe-stats-title { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 6px; }
    .globe-stats-value { font-size: 28px; font-weight: 900; color: var(--cyan); letter-spacing: -0.04em; }
    .globe-stats-sub { font-size: 11px; color: var(--soft); margin-top: 2px; }
    
    .sidebar {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    
    .panel {
      border-radius: var(--radius-lg);
      border: 1px solid var(--line);
      background: var(--panel);
      padding: 20px;
      backdrop-filter: blur(20px);
    }
    
    .panel-title {
      font-size: 12px;
      font-weight: 900;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text);
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .vendor-legend { display: flex; flex-direction: column; gap: 10px; }
    .vendor-item {
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 12px;
      padding: 12px;
      border-radius: 14px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
      cursor: pointer;
      transition: all 0.2s;
    }
    .vendor-item:hover { background: rgba(255,255,255,0.06); transform: translateX(4px); }
    .vendor-item.active { border-color: var(--vendor-color); background: color-mix(in srgb, var(--vendor-color) 10%, transparent); }
    .vendor-dot { width: 14px; height: 14px; border-radius: 50%; background: var(--vendor-color); box-shadow: 0 0 12px var(--vendor-color); }
    .vendor-name { font-weight: 700; font-size: 14px; }
    .vendor-count { font-size: 18px; font-weight: 900; color: var(--vendor-color); }
    .vendor-pct { font-size: 10px; color: var(--muted); margin-left: 4px; }
    
    .state-list { max-height: 300px; overflow-y: auto; display: flex; flex-direction: column; gap: 6px; }
    .state-item {
      display: grid;
      grid-template-columns: 40px 1fr auto;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
      border-radius: 10px;
      background: rgba(255,255,255,0.025);
      font-size: 13px;
    }
    .state-code { font-weight: 800; color: var(--soft); }
    .state-bar { height: 6px; border-radius: 3px; background: rgba(255,255,255,0.1); overflow: hidden; }
    .state-bar span { display: block; height: 100%; border-radius: inherit; }
    .state-count { font-weight: 700; color: var(--text); }
    
    .controls { display: flex; gap: 8px; flex-wrap: wrap; }
    .control-btn {
      height: 36px; padding: 0 14px; border-radius: 10px;
      border: 1px solid var(--line); background: rgba(255,255,255,0.04);
      color: var(--soft); font-size: 11px; font-weight: 800;
      cursor: pointer; transition: all 0.2s;
    }
    .control-btn:hover { background: rgba(255,255,255,0.08); }
    .control-btn.active { border-color: var(--cyan); background: rgba(46,215,255,0.12); color: var(--cyan); }
    
    @media (max-width: 1100px) {
      .main-grid { grid-template-columns: 1fr; }
      .globe-container { min-height: 500px; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header class="header">
      <div class="header-left">
        <a href="routing.html" class="back-link">← Routing</a>
        <div>
          <h1>🌎 Vendor Assignment Map</h1>
          <p class="subtitle">Scout program coverage across the United States</p>
        </div>
      </div>
      <div class="controls">
        <button class="control-btn active" id="btnAll">All Vendors</button>
        <button class="control-btn" id="btnRotate">Auto-Rotate</button>
        <a href="routing.html" class="control-btn">📋 Table View</a>
      </div>
    </header>
    
    <div class="main-grid">
      <div class="globe-container">
        <canvas id="globe-canvas"></canvas>
        <div class="globe-overlay">
          <div class="globe-stats">
            <div class="globe-stats-title">Total Assignments</div>
            <div class="globe-stats-value" id="totalAssignments">—</div>
            <div class="globe-stats-sub" id="statesCount">Loading...</div>
          </div>
          <div class="globe-stats">
            <div class="globe-stats-title">Active Vendors</div>
            <div class="globe-stats-value" id="vendorCount">5</div>
            <div class="globe-stats-sub">Across US</div>
          </div>
        </div>
      </div>
      
      <div class="sidebar">
        <div class="panel">
          <div class="panel-title">◈ Vendor Legend</div>
          <div class="vendor-legend" id="vendorLegend"></div>
        </div>
        
        <div class="panel" style="flex: 1;">
          <div class="panel-title">📍 Coverage by State</div>
          <div class="state-list" id="stateList"></div>
        </div>
      </div>
    </div>
  </div>

<script type="module">
import createGlobe from 'https://unpkg.com/cobe@0.6.3/dist/cobe.esm.js';

const VENDOR_COLORS = {
  'CEI': [0.18, 0.84, 1],        // cyan
  'Wachter': [0.65, 0.47, 1],    // purple  
  'Techwise': [1, 0.37, 0.82],   // pink
  'Everon': [0.14, 0.9, 0.63],   // mint
  'SAS': [1, 0.78, 0.34],        // yellow
};

const VENDOR_HEX = {
  'CEI': '#2ed7ff',
  'Wachter': '#a778ff',
  'Techwise': '#ff5fd2',
  'Everon': '#24e6a0',
  'SAS': '#ffc857',
};

let locationData = null;
let globe = null;
let phi = 0;
let autoRotate = false;
let activeVendor = null;

async function loadData() {
  try {
    const response = await fetch('vendor_locations.json?t=' + Date.now());
    locationData = await response.json();
    renderUI();
    initGlobe();
  } catch (error) {
    console.error('Failed to load location data:', error);
  }
}

function renderUI() {
  if (!locationData) return;
  
  const total = Object.values(locationData.vendor_totals).reduce((a, b) => a + b, 0);
  document.getElementById('totalAssignments').textContent = total.toLocaleString();
  document.getElementById('statesCount').textContent = `${Object.keys(locationData.state_totals).length} states covered`;
  
  // Vendor legend
  const legend = document.getElementById('vendorLegend');
  legend.innerHTML = Object.entries(locationData.vendor_totals)
    .sort((a, b) => b[1] - a[1])
    .map(([vendor, count]) => {
      const pct = Math.round(count / total * 100);
      return `
        <div class="vendor-item" data-vendor="${vendor}" style="--vendor-color: ${VENDOR_HEX[vendor] || '#fff'}">
          <div class="vendor-dot"></div>
          <div class="vendor-name">${vendor}</div>
          <div><span class="vendor-count">${count}</span><span class="vendor-pct">(${pct}%)</span></div>
        </div>
      `;
    }).join('');
  
  // Click handlers for vendor filter
  legend.querySelectorAll('.vendor-item').forEach(item => {
    item.addEventListener('click', () => {
      const vendor = item.dataset.vendor;
      if (activeVendor === vendor) {
        activeVendor = null;
        item.classList.remove('active');
        document.getElementById('btnAll').classList.add('active');
      } else {
        activeVendor = vendor;
        legend.querySelectorAll('.vendor-item').forEach(i => i.classList.remove('active'));
        item.classList.add('active');
        document.getElementById('btnAll').classList.remove('active');
      }
      updateGlobeMarkers();
    });
  });
  
  // State list
  const stateList = document.getElementById('stateList');
  const stateEntries = Object.entries(locationData.state_totals)
    .map(([state, vendors]) => ({ state, total: Object.values(vendors).reduce((a, b) => a + b, 0), vendors }))
    .sort((a, b) => b.total - a.total);
  
  const maxState = stateEntries[0]?.total || 1;
  
  stateList.innerHTML = stateEntries.map(({ state, total, vendors }) => {
    const barSegments = Object.entries(vendors)
      .map(([vendor, count]) => {
        const width = (count / total) * 100;
        return `<span style="width:${width}%;background:${VENDOR_HEX[vendor]}"></span>`;
      }).join('');
    
    return `
      <div class="state-item">
        <span class="state-code">${state}</span>
        <div class="state-bar" style="width:${(total / maxState) * 100}%">${barSegments}</div>
        <span class="state-count">${total}</span>
      </div>
    `;
  }).join('');
}

function getFilteredMarkers() {
  if (!locationData) return [];
  
  return locationData.markers
    .filter(m => !activeVendor || m.vendor === activeVendor)
    .map(m => ({
      location: m.location,
      size: Math.min(0.03 + (m.count / 100) * 0.05, 0.1),
      color: VENDOR_COLORS[m.vendor] || [1, 1, 1]
    }));
}

function initGlobe() {
  const canvas = document.getElementById('globe-canvas');
  if (!canvas) return;
  
  let pointerInteracting = null;
  let pointerInteractionMovement = 0;
  
  canvas.onpointerdown = (e) => {
    pointerInteracting = e.clientX - pointerInteractionMovement;
    canvas.style.cursor = 'grabbing';
  };
  
  canvas.onpointerup = () => {
    pointerInteracting = null;
    canvas.style.cursor = 'grab';
  };
  
  canvas.onpointerout = () => {
    pointerInteracting = null;
    canvas.style.cursor = 'grab';
  };
  
  canvas.onpointermove = (e) => {
    if (pointerInteracting !== null) {
      const delta = e.clientX - pointerInteracting;
      pointerInteractionMovement = delta;
      phi = delta / 200;
    }
  };
  
  const width = canvas.offsetWidth;
  const markers = getFilteredMarkers();
  
  globe = createGlobe(canvas, {
    devicePixelRatio: Math.min(window.devicePixelRatio, 2),
    width: width * 2,
    height: width * 2,
    phi: 4.5, // Start focused on US
    theta: 0.25,
    dark: 1,
    diffuse: 1.2,
    mapSamples: 20000,
    mapBrightness: 4,
    baseColor: [0.15, 0.18, 0.25],
    markerColor: [0.2, 0.85, 1],
    glowColor: [0.1, 0.15, 0.25],
    markers: markers,
    onRender: (state) => {
      if (!pointerInteracting && autoRotate) {
        phi += 0.002;
      }
      state.phi = phi + 4.5; // Keep US centered
      state.theta = 0.25;
      state.width = canvas.offsetWidth * 2;
      state.height = canvas.offsetWidth * 2;
    }
  });
  
  canvas.style.opacity = '1';
}

function updateGlobeMarkers() {
  if (!globe) return;
  
  const markers = getFilteredMarkers();
  globe.updateData({ markers });
}

// Controls
document.getElementById('btnAll').addEventListener('click', () => {
  activeVendor = null;
  document.querySelectorAll('.vendor-item').forEach(i => i.classList.remove('active'));
  document.getElementById('btnAll').classList.add('active');
  updateGlobeMarkers();
});

document.getElementById('btnRotate').addEventListener('click', (e) => {
  autoRotate = !autoRotate;
  e.target.classList.toggle('active', autoRotate);
});

// Initialize
loadData();

// Handle resize
window.addEventListener('resize', () => {
  if (globe) {
    globe.destroy();
    initGlobe();
  }
});
</script>
</body>
</html>
