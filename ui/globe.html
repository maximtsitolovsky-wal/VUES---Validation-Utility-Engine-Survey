<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VUES · Vendor Map</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0e1a; --panel: rgba(12, 20, 38, 0.95); --panel-border: rgba(100, 140, 255, 0.2);
      --text: #E8F0FF; --text-soft: #8BA4D0; --cyan: #5AE4FF; --purple: #9B7CFF;
      --green: #45E6A5; --amber: #FFC220; --blue: #0053e2; --red: #FF6B6B;
    }
    body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }
    
    .container { display: grid; grid-template-columns: 1fr 360px; height: 100vh; }
    
    #map { width: 100%; height: 100%; z-index: 1; }
    
    .map-overlay { position: absolute; top: 20px; left: 20px; z-index: 1000; display: flex; flex-direction: column; gap: 12px; }
    .back-link { display: inline-flex; align-items: center; gap: 8px; padding: 12px 20px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.15); background: var(--panel); backdrop-filter: blur(12px); color: var(--text); font-size: 14px; font-weight: 600; text-decoration: none; transition: all 0.2s; }
    .back-link:hover { background: rgba(90,228,255,0.15); border-color: var(--cyan); }
    
    .map-style-toggle { display: flex; gap: 4px; background: var(--panel); backdrop-filter: blur(12px); padding: 6px; border-radius: 12px; border: 1px solid var(--panel-border); }
    .style-btn { padding: 10px 16px; border-radius: 8px; font-size: 12px; font-weight: 700; cursor: pointer; border: none; background: transparent; color: var(--text-soft); transition: all 0.2s; }
    .style-btn:hover { color: var(--text); }
    .style-btn.active { background: rgba(90,228,255,0.2); color: var(--cyan); }
    
    .sidebar { background: var(--panel); border-left: 1px solid var(--panel-border); display: flex; flex-direction: column; overflow-y: auto; z-index: 1001; }
    .sidebar-header { padding: 24px; border-bottom: 1px solid rgba(255,255,255,0.08); }
    .sidebar-header h1 { font-size: 22px; font-weight: 900; margin-bottom: 6px; display: flex; align-items: center; gap: 10px; }
    .sidebar-header p { color: var(--text-soft); font-size: 13px; }
    
    .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 20px; border-bottom: 1px solid rgba(255,255,255,0.08); }
    .stat-box { padding: 16px; border-radius: 14px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); text-align: center; }
    .stat-value { font-size: 28px; font-weight: 900; }
    .stat-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-soft); margin-top: 4px; }
    
    .section { padding: 20px; border-bottom: 1px solid rgba(255,255,255,0.08); }
    .section-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.12em; color: var(--text-soft); margin-bottom: 14px; }
    
    .vendor-list { display: flex; flex-direction: column; gap: 10px; }
    .vendor-item { display: flex; align-items: center; gap: 12px; padding: 14px; border-radius: 12px; background: rgba(255,255,255,0.02); border: 2px solid transparent; cursor: pointer; transition: all 0.2s; }
    .vendor-item:hover { background: rgba(255,255,255,0.05); transform: translateX(4px); }
    .vendor-item.active { border-color: var(--vendor-color); background: color-mix(in srgb, var(--vendor-color) 15%, transparent); }
    .vendor-dot { width: 16px; height: 16px; border-radius: 50%; background: var(--vendor-color); box-shadow: 0 0 12px var(--vendor-color); flex-shrink: 0; }
    .vendor-info { flex: 1; }
    .vendor-name { font-weight: 700; font-size: 14px; }
    .vendor-sub { font-size: 11px; color: var(--text-soft); margin-top: 2px; }
    .vendor-count { font-size: 24px; font-weight: 900; color: var(--vendor-color); }
    
    .filter-row { display: flex; gap: 8px; flex-wrap: wrap; }
    .filter-btn { padding: 8px 14px; border-radius: 8px; font-size: 11px; font-weight: 700; cursor: pointer; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.03); color: var(--text-soft); transition: all 0.2s; }
    .filter-btn:hover { border-color: var(--cyan); color: var(--text); }
    .filter-btn.active { background: rgba(90,228,255,0.15); border-color: var(--cyan); color: var(--cyan); }
    
    .legend-item { display: flex; align-items: center; gap: 10px; padding: 8px 0; font-size: 13px; }
    .legend-dot { width: 12px; height: 12px; border-radius: 50%; }
    
    /* Leaflet custom popup */
    .leaflet-popup-content-wrapper { background: var(--panel); color: var(--text); border-radius: 12px; border: 1px solid var(--panel-border); }
    .leaflet-popup-tip { background: var(--panel); }
    .popup-title { font-size: 16px; font-weight: 800; margin-bottom: 8px; }
    .popup-stat { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid rgba(255,255,255,0.08); font-size: 13px; }
    .popup-stat:last-child { border-bottom: none; }
    .popup-vendor { display: inline-flex; align-items: center; gap: 6px; padding: 4px 10px; border-radius: 6px; font-size: 11px; font-weight: 700; margin-top: 8px; }
    
    /* Clean map display */
    .leaflet-container { background: #1a1a2e; }
  </style>
</head>
<body>
  <div class="container">
    <div id="map"></div>
    <div class="map-overlay">
      <a href="routing.html" class="back-link">← Back to Routing</a>
      <div class="map-style-toggle">
        <button class="style-btn" data-style="dark">🌙 Dark</button>
        <button class="style-btn active" data-style="satellite">🛰️ Satellite</button>
        <button class="style-btn" data-style="street">🗺️ Street</button>
      </div>
    </div>
    <div class="sidebar">
      <div class="sidebar-header">
        <h1>🗺️ Vendor Coverage Map</h1>
        <p>Real locations across the United States</p>
      </div>
      <div class="stats-grid" id="statsGrid"></div>
      <div class="section">
        <div class="section-title">Filter by Vendor</div>
        <div class="vendor-list" id="vendorList"></div>
      </div>
      <div class="section">
        <div class="section-title">View Mode</div>
        <div class="filter-row" id="viewMode">
          <button class="filter-btn active" data-mode="all">All Sites</button>
          <button class="filter-btn" data-mode="pending">Pending</button>
          <button class="filter-btn" data-mode="complete">Complete</button>
        </div>
      </div>
      <div class="section" style="flex: 1;">
        <div class="section-title">Legend</div>
        <div id="legend"></div>
      </div>
    </div>
  </div>

<script>
// === VENDOR CONFIG ===
const VENDORS = {
  'CEI': { color: '#5AE4FF', name: 'CEI' },
  'Wachter': { color: '#9B7CFF', name: 'Wachter' },
  'Everon': { color: '#45E6A5', name: 'Everon' },
  'PTSI': { color: '#FFC220', name: 'PTSI' },
  'alarmhawaii.com': { color: '#FF6B6B', name: 'Alarm Hawaii' }
};

// === STATE COORDINATES (centroids) ===
const STATE_COORDS = {
  'AL': [32.806671, -86.791130], 'AK': [61.370716, -152.404419], 'AZ': [33.729759, -111.431221],
  'AR': [34.969704, -92.373123], 'CA': [36.116203, -119.681564], 'CO': [39.059811, -105.311104],
  'CT': [41.597782, -72.755371], 'DE': [39.318523, -75.507141], 'FL': [27.766279, -81.686783],
  'GA': [33.040619, -83.643074], 'HI': [21.094318, -157.498337], 'ID': [44.240459, -114.478828],
  'IL': [40.349457, -88.986137], 'IN': [39.849426, -86.258278], 'IA': [42.011539, -93.210526],
  'KS': [38.526600, -96.726486], 'KY': [37.668140, -84.670067], 'LA': [31.169546, -91.867805],
  'ME': [44.693947, -69.381927], 'MD': [39.063946, -76.802101], 'MA': [42.230171, -71.530106],
  'MI': [43.326618, -84.536095], 'MN': [45.694454, -93.900192], 'MS': [32.741646, -89.678696],
  'MO': [38.456085, -92.288368], 'MT': [46.921925, -110.454353], 'NE': [41.125370, -98.268082],
  'NV': [38.313515, -117.055374], 'NH': [43.452492, -71.563896], 'NJ': [40.298904, -74.521011],
  'NM': [34.840515, -106.248482], 'NY': [42.165726, -74.948051], 'NC': [35.630066, -79.806419],
  'ND': [47.528912, -99.784012], 'OH': [40.388783, -82.764915], 'OK': [35.565342, -96.928917],
  'OR': [44.572021, -122.070938], 'PA': [40.590752, -77.209755], 'RI': [41.680893, -71.511780],
  'SC': [33.856892, -80.945007], 'SD': [44.299782, -99.438828], 'TN': [35.747845, -86.692345],
  'TX': [31.054487, -97.563461], 'UT': [40.150032, -111.862434], 'VT': [44.045876, -72.710686],
  'VA': [37.769337, -78.169968], 'WA': [47.400902, -121.490494], 'WV': [38.491226, -80.954453],
  'WI': [44.268543, -89.616508], 'WY': [42.755966, -107.302490], 'DC': [38.897438, -77.026817],
  'PR': [18.220833, -66.590149]
};

// === SITE DATA BY STATE (aggregated from survey_routing_data.json) ===
const siteData = {
  markers: [
    // CEI territories
    { vendor: 'CEI', state: 'TX', count: 69, pending: 65, complete: 4 },
    { vendor: 'CEI', state: 'FL', count: 52, pending: 48, complete: 4 },
    { vendor: 'CEI', state: 'NC', count: 33, pending: 31, complete: 2 },
    { vendor: 'CEI', state: 'GA', count: 23, pending: 21, complete: 2 },
    { vendor: 'CEI', state: 'TN', count: 22, pending: 20, complete: 2 },
    { vendor: 'CEI', state: 'AL', count: 22, pending: 21, complete: 1 },
    { vendor: 'CEI', state: 'AR', count: 21, pending: 20, complete: 1 },
    { vendor: 'CEI', state: 'CA', count: 21, pending: 19, complete: 2 },
    { vendor: 'CEI', state: 'OK', count: 20, pending: 19, complete: 1 },
    { vendor: 'CEI', state: 'KS', count: 19, pending: 18, complete: 1 },
    { vendor: 'CEI', state: 'AZ', count: 18, pending: 17, complete: 1 },
    { vendor: 'CEI', state: 'VA', count: 17, pending: 16, complete: 1 },
    { vendor: 'CEI', state: 'MO', count: 15, pending: 14, complete: 1 },
    { vendor: 'CEI', state: 'LA', count: 15, pending: 15, complete: 0 },
    { vendor: 'CEI', state: 'SC', count: 14, pending: 13, complete: 1 },
    { vendor: 'CEI', state: 'MD', count: 13, pending: 12, complete: 1 },
    { vendor: 'CEI', state: 'MS', count: 12, pending: 12, complete: 0 },
    { vendor: 'CEI', state: 'WV', count: 7, pending: 7, complete: 0 },
    { vendor: 'CEI', state: 'IL', count: 7, pending: 6, complete: 1 },
    { vendor: 'CEI', state: 'KY', count: 5, pending: 5, complete: 0 },
    { vendor: 'CEI', state: 'NM', count: 1, pending: 1, complete: 0 },
    { vendor: 'CEI', state: 'DC', count: 1, pending: 1, complete: 0 },
    
    // Wachter territories
    { vendor: 'Wachter', state: 'PA', count: 38, pending: 34, complete: 4 },
    { vendor: 'Wachter', state: 'OH', count: 31, pending: 28, complete: 3 },
    { vendor: 'Wachter', state: 'NY', count: 24, pending: 21, complete: 3 },
    { vendor: 'Wachter', state: 'IN', count: 20, pending: 17, complete: 3 },
    { vendor: 'Wachter', state: 'NJ', count: 20, pending: 18, complete: 2 },
    { vendor: 'Wachter', state: 'CT', count: 9, pending: 8, complete: 1 },
    { vendor: 'Wachter', state: 'MA', count: 7, pending: 6, complete: 1 },
    { vendor: 'Wachter', state: 'ME', count: 6, pending: 5, complete: 1 },
    { vendor: 'Wachter', state: 'MI', count: 5, pending: 4, complete: 1 },
    { vendor: 'Wachter', state: 'NH', count: 5, pending: 5, complete: 0 },
    { vendor: 'Wachter', state: 'DE', count: 3, pending: 3, complete: 0 },
    { vendor: 'Wachter', state: 'RI', count: 3, pending: 3, complete: 0 },
    { vendor: 'Wachter', state: 'KY', count: 2, pending: 2, complete: 0 },
    { vendor: 'Wachter', state: 'IL', count: 1, pending: 1, complete: 0 },
    { vendor: 'Wachter', state: 'WV', count: 1, pending: 1, complete: 0 },
    { vendor: 'Wachter', state: 'VT', count: 1, pending: 1, complete: 0 },
    
    // Everon territories
    { vendor: 'Everon', state: 'IL', count: 22, pending: 19, complete: 3 },
    { vendor: 'Everon', state: 'CA', count: 18, pending: 16, complete: 2 },
    { vendor: 'Everon', state: 'NE', count: 13, pending: 12, complete: 1 },
    { vendor: 'Everon', state: 'WA', count: 11, pending: 10, complete: 1 },
    { vendor: 'Everon', state: 'WI', count: 11, pending: 10, complete: 1 },
    { vendor: 'Everon', state: 'IA', count: 11, pending: 10, complete: 1 },
    { vendor: 'Everon', state: 'CO', count: 10, pending: 9, complete: 1 },
    { vendor: 'Everon', state: 'OR', count: 9, pending: 8, complete: 1 },
    { vendor: 'Everon', state: 'MN', count: 9, pending: 8, complete: 1 },
    { vendor: 'Everon', state: 'NV', count: 7, pending: 7, complete: 0 },
    { vendor: 'Everon', state: 'NM', count: 6, pending: 6, complete: 0 },
    { vendor: 'Everon', state: 'UT', count: 6, pending: 5, complete: 1 },
    { vendor: 'Everon', state: 'WY', count: 5, pending: 5, complete: 0 },
    { vendor: 'Everon', state: 'SD', count: 5, pending: 5, complete: 0 },
    { vendor: 'Everon', state: 'ID', count: 4, pending: 4, complete: 0 },
    { vendor: 'Everon', state: 'ND', count: 4, pending: 4, complete: 0 },
    { vendor: 'Everon', state: 'MT', count: 2, pending: 2, complete: 0 },
    { vendor: 'Everon', state: 'IN', count: 1, pending: 1, complete: 0 },
    
    // PTSI
    { vendor: 'PTSI', state: 'TX', count: 3, pending: 3, complete: 0 },
    
    // Alarm Hawaii
    { vendor: 'alarmhawaii.com', state: 'HI', count: 2, pending: 2, complete: 0 }
  ]
};

// === MAP TILE LAYERS ===
const tileLayers = {
  dark: L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> &copy; <a href="https://carto.com/attributions">CARTO</a>',
    subdomains: 'abcd', maxZoom: 19
  }),
  satellite: L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
    attribution: '&copy; Esri', maxZoom: 19
  }),
  street: L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>', maxZoom: 19
  })
};

// === STATE ===
let map, currentLayer = 'satellite', activeVendor = null, viewMode = 'all';
let markers = [];

// === INIT MAP ===
function initMap() {
  map = L.map('map', {
    center: [39.5, -98.5],
    zoom: 4,
    zoomControl: false,
    attributionControl: false
  });
  
  tileLayers.satellite.addTo(map);
  
  // Add zoom control to bottom right
  L.control.zoom({ position: 'bottomright' }).addTo(map);
  
  // Add attribution
  L.control.attribution({ position: 'bottomleft', prefix: false }).addTo(map);
  
  renderMarkers();
  renderSidebar();
}

// === RENDER MARKERS ===
function renderMarkers() {
  // Clear existing markers
  markers.forEach(m => map.removeLayer(m));
  markers = [];
  
  // Filter data
  let data = siteData.markers;
  if (activeVendor) {
    data = data.filter(d => d.vendor === activeVendor);
  }
  
  data.forEach(site => {
    const coords = STATE_COORDS[site.state];
    if (!coords) return;
    
    const vendor = VENDORS[site.vendor] || { color: '#ffffff', name: site.vendor };
    
    // Calculate display value based on view mode
    let displayCount = site.count;
    let opacity = 1;
    if (viewMode === 'pending') {
      displayCount = site.pending;
      if (site.pending === 0) opacity = 0.3;
    } else if (viewMode === 'complete') {
      displayCount = site.complete;
      if (site.complete === 0) opacity = 0.3;
    }
    
    // Size based on count
    const radius = Math.max(8, Math.min(35, 8 + Math.sqrt(displayCount) * 4));
    
    // Create circle marker
    const marker = L.circleMarker(coords, {
      radius: radius,
      fillColor: vendor.color,
      fillOpacity: 0.7 * opacity,
      color: vendor.color,
      weight: 2,
      opacity: opacity
    });
    
    // Popup content
    const popupContent = `
      <div style="min-width: 180px;">
        <div class="popup-title">${site.state}</div>
        <div class="popup-stat"><span>Total Sites</span><strong>${site.count}</strong></div>
        <div class="popup-stat"><span>Pending</span><strong style="color:#FFC220">${site.pending}</strong></div>
        <div class="popup-stat"><span>Complete</span><strong style="color:#45E6A5">${site.complete}</strong></div>
        <div class="popup-vendor" style="background:${vendor.color}22;color:${vendor.color}">
          <span style="width:10px;height:10px;border-radius:50%;background:${vendor.color}"></span>
          ${vendor.name}
        </div>
      </div>
    `;
    
    marker.bindPopup(popupContent);
    marker.addTo(map);
    markers.push(marker);
  });
}

// === RENDER SIDEBAR ===
function renderSidebar() {
  // Calculate totals
  let totals = { sites: 0, pending: 0, complete: 0, states: new Set() };
  let vendorTotals = {};
  
  siteData.markers.forEach(site => {
    if (activeVendor && site.vendor !== activeVendor) return;
    totals.sites += site.count;
    totals.pending += site.pending;
    totals.complete += site.complete;
    totals.states.add(site.state);
    
    if (!vendorTotals[site.vendor]) {
      vendorTotals[site.vendor] = { count: 0, pending: 0, complete: 0 };
    }
    vendorTotals[site.vendor].count += site.count;
    vendorTotals[site.vendor].pending += site.pending;
    vendorTotals[site.vendor].complete += site.complete;
  });
  
  // Stats grid
  document.getElementById('statsGrid').innerHTML = `
    <div class="stat-box"><div class="stat-value" style="color:var(--cyan)">${totals.sites}</div><div class="stat-label">Total Sites</div></div>
    <div class="stat-box"><div class="stat-value" style="color:var(--green)">${totals.states.size}</div><div class="stat-label">States</div></div>
    <div class="stat-box"><div class="stat-value" style="color:var(--amber)">${totals.pending}</div><div class="stat-label">Pending</div></div>
    <div class="stat-box"><div class="stat-value" style="color:var(--green)">${totals.complete}</div><div class="stat-label">Complete</div></div>
  `;
  
  // Vendor list
  const vendorList = document.getElementById('vendorList');
  vendorList.innerHTML = Object.entries(vendorTotals)
    .sort((a, b) => b[1].count - a[1].count)
    .map(([name, data]) => {
      const v = VENDORS[name] || { color: '#fff', name };
      const isActive = activeVendor === name;
      const pct = data.count > 0 ? Math.round((data.complete / data.count) * 100) : 0;
      return `
        <div class="vendor-item ${isActive ? 'active' : ''}" data-vendor="${name}" style="--vendor-color:${v.color}">
          <div class="vendor-dot"></div>
          <div class="vendor-info">
            <div class="vendor-name">${v.name}</div>
            <div class="vendor-sub">${data.complete}/${data.count} complete (${pct}%)</div>
          </div>
          <div class="vendor-count">${data.count}</div>
        </div>
      `;
    }).join('');
  
  // Bind clicks
  vendorList.querySelectorAll('.vendor-item').forEach(el => {
    el.onclick = () => {
      const vendor = el.dataset.vendor;
      activeVendor = activeVendor === vendor ? null : vendor;
      renderMarkers();
      renderSidebar();
      
      // Zoom to vendor territory if selected
      if (activeVendor) {
        const vendorSites = siteData.markers.filter(s => s.vendor === activeVendor);
        if (vendorSites.length > 0) {
          const bounds = vendorSites.map(s => STATE_COORDS[s.state]).filter(Boolean);
          if (bounds.length > 0) {
            map.fitBounds(bounds, { padding: [50, 50] });
          }
        }
      } else {
        map.setView([39.5, -98.5], 4);
      }
    };
  });
  
  // Legend
  document.getElementById('legend').innerHTML = Object.entries(VENDORS).map(([key, v]) => `
    <div class="legend-item">
      <div class="legend-dot" style="background:${v.color};box-shadow:0 0 8px ${v.color}"></div>
      <span>${v.name}</span>
    </div>
  `).join('');
}

// === EVENT HANDLERS ===

// Map style toggle
document.querySelectorAll('.style-btn').forEach(btn => {
  btn.onclick = () => {
    const style = btn.dataset.style;
    if (style === currentLayer) return;
    
    // Remove current layer
    map.removeLayer(tileLayers[currentLayer]);
    
    // Add new layer
    tileLayers[style].addTo(map);
    currentLayer = style;
    
    // Update buttons
    document.querySelectorAll('.style-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  };
});

// View mode toggle
document.getElementById('viewMode').addEventListener('click', e => {
  const btn = e.target.closest('.filter-btn');
  if (!btn) return;
  
  viewMode = btn.dataset.mode;
  document.querySelectorAll('#viewMode .filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderMarkers();
});

// === START ===
initMap();
</script>
</body>
</html>
